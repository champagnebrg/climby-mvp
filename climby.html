<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="theme-color" content="#090D1A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Climby | Pro Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root {
            /* Dark tech theme: electric blue + cyan accents */
            --bg: #090D1A;
            --card: #121A2B;
            --text: #F2F6FF;
            --muted: #9AA8C7;
            --border: #263552;
            --primary: #5B8CFF;
            --primary-dim: rgba(91, 140, 255, 0.22);
            --accent: #22D3EE;
            --danger: #ef4444;
            --yellow: #84CC16;
            --text-on-primary: #F7FAFF;
            --touch: 44px;
            --radius: 16px;
            --radius-sm: 12px;
            --safe-top: env(safe-area-inset-top, 0);
            --safe-bottom: env(safe-area-inset-bottom, 0);
            --safe-left: env(safe-area-inset-left, 0);
            --safe-right: env(safe-area-inset-right, 0);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            font-size: 1rem;
            line-height: 1.5;
            min-height: 100dvh;
            min-height: 100vh;
            overflow-x: hidden;
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
            padding-bottom: var(--safe-bottom);
        }
        .view { display: none; min-height: 100dvh; min-height: 100vh; width: 100%; }
        .view.active { display: flex; flex-direction: column; }
        .container {
            padding: 20px 20px calc(20px + var(--safe-bottom));
            padding-left: max(20px, var(--safe-left));
            padding-right: max(20px, var(--safe-right));
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* UI – touch-optimized */
        .card {
            background: var(--card);
            padding: 18px 20px;
            border-radius: var(--radius);
            margin-bottom: 14px;
            border: 1px solid var(--border);
            min-height: var(--touch);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .card:active { opacity: 0.95; }
        .btn-main {
            width: 100%;
            min-height: 52px;
            padding: 16px 24px;
            background: linear-gradient(180deg, #5B8CFF 0%, #466BFF 100%);
            color: var(--text-on-primary);
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 6px 18px rgba(70, 107, 255, 0.4);
        }
        .btn-main:active { transform: scale(0.98); }
        .btn-sec {
            min-height: var(--touch);
            padding: 12px 18px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.95rem;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-sec:active { background: #1B2842; }
        .btn-update { min-height: 40px; padding: 10px 16px; background: var(--accent); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; }
        .btn-danger { min-height: 52px; background: var(--danger); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; width: 100%; margin-top: 12px; font-weight: 600; font-size: 1rem; }
        input, select, textarea {
            width: 100%;
            min-height: 52px;
            padding: 14px 18px;
            margin: 10px 0;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-sm);
            font-size: 16px;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }
        textarea { min-height: 100px; resize: vertical; }

        /* Dashboard Admin Table */
        table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.9rem; }
        th, td { text-align: left; padding: 14px 12px; border-bottom: 1px solid var(--border); }
        th { color: var(--text); font-weight: 600; font-size: 0.9rem; }
        .admin-coverage-toolbar { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
        .admin-coverage-toolbar select { min-height:44px; max-width:220px; margin:0; }
        .admin-coverage-grid { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:10px; }
        .admin-coverage-kpi { border:1px solid var(--border); border-radius:12px; padding:12px; background:var(--card); }
        .admin-coverage-kpi b { display:block; font-size:1.2rem; color:var(--text); }
        .admin-coverage-kpi span { display:block; margin-top:2px; font-size:0.8rem; color:var(--muted); }
        .admin-donut { width:86px; height:86px; border-radius:50%; display:grid; place-items:center; margin-left:auto; background:conic-gradient(var(--accent) 0 0%, #1B2842 0 100%); }
        .admin-donut-inner { width:62px; height:62px; border-radius:50%; background:var(--card); display:grid; place-items:center; font-size:0.8rem; color:var(--text); border:1px solid var(--border); }
        .admin-trend { margin-top:12px; display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
        .admin-trend-item { border:1px solid var(--border); border-radius:10px; background:var(--card); padding:8px; }
        .admin-trend-bar { height:8px; border-radius:999px; background:#1B2842; overflow:hidden; margin-top:6px; }
        .admin-trend-bar > i { display:block; height:100%; background:linear-gradient(90deg, #2EC4B6 0%, #38bdf8 100%); }
        .admin-sector-coverage-list { margin-top:14px; display:grid; gap:10px; }
        .admin-sector-coverage-card { border:1px solid var(--border); border-radius:12px; background:var(--card); padding:12px; }
        .admin-sector-coverage-head { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:8px; }
        .admin-sector-top-list { margin:8px 0 0 0; padding-left:18px; color:var(--text); font-size:0.9rem; }
        .admin-sector-top-list li { margin:3px 0; }
        .admin-gym-form { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px; }
        .admin-gym-form .full { grid-column: 1 / -1; }
        .admin-gym-form h5 { margin:8px 0 2px; color: var(--text); font-size:0.95rem; }

        /* Overlays */
        #loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
        }
        .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Viewer */
        #viewer-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            z-index: 1000;
            background: #000;
            display: none;
        }
        model-viewer { width: 100%; height: 100%; }
        .hotspot {
            width: 28px;
            height: 28px;
            min-width: 28px;
            min-height: 28px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            max-height: 88vh;
            max-height: 88dvh;
            background: var(--card);
            border-top: 3px solid var(--primary);
            border-radius: 24px 24px 0 0;
            padding: 20px;
            padding-bottom: max(24px, var(--safe-bottom));
            padding-left: max(20px, var(--safe-left));
            padding-right: max(20px, var(--safe-right));
            box-sizing: border-box;
            display: none;
            z-index: 1002;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .bottom-sheet::before {
            content: '';
            display: block;
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 8px auto;
        }
        /* Star System */
        .star-rating { display: flex; gap: 12px; font-size: 36px; margin: 12px 0; cursor: pointer; justify-content: center; }
        .star-rating span { color: #c9c4b8; transition: transform 0.15s, color 0.15s; }
        .star-rating span:active { transform: scale(1.15); }
        .star-rating span.active { color: var(--yellow); }

        /* Landing – catchy hero + how it works (reference style) */
        #view-landing { padding: 0; min-height: 100dvh; }
        .landing-hero {
            min-height: 70vh;
            min-height: 70dvh;
            position: relative;
            background: linear-gradient(180deg, rgba(4,8,18,0.4) 0%, rgba(4,8,18,0.35) 30%, rgba(9,13,26,0.75) 65%, var(--bg) 100%), url('https://images.unsplash.com/photo-1610380184543-2f9912ed6f52?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px 24px 48px;
            padding-top: max(28px, calc(12px + var(--safe-top)));
            padding-left: max(24px, var(--safe-left));
            padding-right: max(24px, var(--safe-right));
            text-align: center;
        }
        .landing-hero-logo {
            position: absolute;
            top: max(24px, calc(8px + var(--safe-top)));
            left: max(24px, var(--safe-left));
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .landing-hero-logo-icon {
            width: 28px;
            height: 20px;
            opacity: 0.95;
        }
        .landing-hero-logo .climby-wordmark {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 300;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        .landing-hero .landing-hero-content { position: relative; z-index: 1; }
        .landing-hero h1.climby-wordmark.landing-hero-title {
            color: #fff;
            font-size: clamp(3rem, 12vw, 5rem);
            font-weight: 300;
            margin: 0 0 12px 0;
            letter-spacing: 0.06em;
            text-shadow: 0 2px 12px rgba(0,0,0,0.25);
        }
        .landing-hero .landing-tagline {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: rgba(255,255,255,0.95);
            font-size: clamp(1rem, 2.5vw, 1.15rem);
            max-width: 360px;
            margin: 0 auto 28px;
            line-height: 1.6;
        }
        .landing-hero .landing-tagline .highlight { color: var(--accent); font-weight: 600; text-shadow: 0 0 20px rgba(34,211,238,0.35); }
        .landing-cta { display: flex; flex-direction: column; gap: 12px; align-items: center; width: 100%; max-width: 320px; }
        .landing-cta .btn-main.landing-cta-primary {
            background: linear-gradient(180deg, #5B8CFF 0%, #466BFF 100%);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            min-height: 56px;
            letter-spacing: 0.03em;
            box-shadow: 0 8px 22px rgba(70,107,255,0.5);
        }
        .landing-cta .btn-sec.landing-cta-sec {
            background: rgba(255,254,249,0.95);
            border: 1px solid rgba(255,255,255,0.8);
            color: #0F172A;
            font-size: 1rem;
            font-weight: 600;
            min-height: 52px;
            backdrop-filter: blur(8px);
        }
        .landing-cta .btn-sec.landing-cta-sec:active {
            background: rgba(226, 232, 240, 0.98);
            color: #0B1220;
        }
        .landing-gallery {
            padding: 48px 20px 56px;
            padding-left: max(20px, var(--safe-left));
            padding-right: max(20px, var(--safe-right));
            padding-bottom: max(56px, calc(28px + var(--safe-bottom)));
            background: var(--bg);
        }
        .landing-gallery h3.headline-brand {
            font-size: 1.5rem;
            letter-spacing: 0.02em;
            margin: 0 0 8px 0;
            text-align: center;
        }
        .landing-gallery .headline-underline {
            width: 48px;
            height: 3px;
            background: var(--accent);
            margin: 0 auto 32px;
            border-radius: 2px;
        }
        .landing-gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 880px; margin: 0 auto; }
        @media (max-width: 600px) { .landing-gallery-grid { grid-template-columns: 1fr; gap: 28px; } }
        .landing-feature-card {
            position: relative;
            border-radius: var(--radius);
            overflow: visible;
            background: var(--card);
            border: 2px solid var(--accent);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
            padding-top: 36px;
        }
        .landing-feature-card:active { transform: scale(0.98); }
        .landing-feature-icon {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(132,204,22,0.35);
        }
        .landing-feature-icon svg { width: 24px; height: 24px; }
        .landing-feature-card .landing-feature-img {
            height: 100px;
            background: var(--bg) center/cover no-repeat;
            margin: 0 12px 12px;
            border-radius: 10px;
            border: 1px solid rgba(91,140,255,0.28);
            position: relative;
            overflow: hidden;
        }
        .landing-feature-card .landing-feature-img::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(9,13,26,0.12) 0%, rgba(9,13,26,0.6) 100%);
        }
        .landing-feature-img.feature-3d {
            background-image: radial-gradient(circle at 22% 28%, rgba(34,211,238,0.95) 0 6px, transparent 7px),
                              radial-gradient(circle at 52% 52%, rgba(91,140,255,0.85) 0 7px, transparent 8px),
                              radial-gradient(circle at 78% 34%, rgba(132,204,22,0.9) 0 6px, transparent 7px),
                              linear-gradient(135deg, #132544 0%, #1a2f54 55%, #0f213f 100%);
        }
        .landing-feature-img.feature-route {
            background-image: linear-gradient(115deg, rgba(9,13,26,0.05) 0 36%, rgba(9,13,26,0.42) 37% 100%),
                              url('https://images.unsplash.com/photo-1522163182402-834f871fd851?auto=format&fit=crop&w=900&q=80');
        }
        .landing-feature-img.feature-training {
            background-image: radial-gradient(circle at 18% 70%, rgba(132,204,22,0.85) 0 7px, transparent 8px),
                              radial-gradient(circle at 46% 34%, rgba(34,211,238,0.85) 0 7px, transparent 8px),
                              radial-gradient(circle at 78% 64%, rgba(91,140,255,0.9) 0 7px, transparent 8px),
                              linear-gradient(120deg, #10203d 0%, #182f58 58%, #112647 100%);
        }
        .landing-feature-card .landing-feature-body { padding: 0 20px 20px; flex: 1; }
        .landing-feature-card h4 {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
            margin: 0 0 8px 0;
        }
        .landing-feature-card p { color: var(--muted); font-size: 0.9rem; line-height: 1.5; margin: 0; }
        .landing-social {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-top: 40px;
            padding-right: 0;
        }
        .landing-social-link {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, opacity 0.2s;
        }
        .landing-social-link:hover, .landing-social-link:focus { opacity: 0.9; transform: scale(1.05); }
        .landing-social-link:active { transform: scale(0.98); }

        /* Language switcher */
        .lang-switcher { display: flex; gap: 0; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
        .lang-switcher button {
            min-height: var(--touch);
            padding: 10px 18px;
            background: var(--card);
            color: var(--muted);
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .lang-switcher button.active { background: var(--primary); color: var(--text-on-primary); font-weight: 700; }
        .lang-switcher button:active { opacity: 0.9; }
        .landing-hero .lang-switcher-hero {
            border-color: rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
        }
        .landing-hero .lang-switcher-hero button {
            color: rgba(255,255,255,0.9);
            background: transparent;
        }
        .landing-hero .lang-switcher-hero button.active {
            background: rgba(255,255,255,0.95);
            color: #0F172A;
        }

        /* User panel – search & favourites */
        .user-search-input { margin-top: 14px; margin-bottom: 0; min-height: 52px; font-size: 16px; }
        .user-main-tabs { display: flex; gap: 8px; margin: 8px 0 14px; }
        .user-main-tab {
            flex: 1;
            min-height: 46px;
            border: 1px solid var(--border);
            background: var(--card);
            border-radius: 12px;
            color: var(--muted);
            font-weight: 600;
            cursor: pointer;
        }
        .user-main-tab.active { border-color: var(--primary); color: var(--primary); }
        .user-main-section { display: none; }
        .user-main-section.active { display: block; }
        .profile-dashboard { margin-bottom: 18px; padding: 16px; display: block; }
        .profile-header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
        .profile-header h4 { margin: 0; font-size: 1.1rem; }
        .profile-max-grade { color: var(--primary); font-weight: 700; }
        .profile-kpis { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 12px; }
        .profile-kpi { border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
        .profile-kpi b { display: block; font-size: 1.1rem; color: var(--text); }
        .profile-kpi span { font-size: 0.78rem; color: var(--muted); }
        .profile-list { display: flex; flex-direction: column; gap: 8px; }
        .profile-log { border: 1px solid var(--border); border-radius: 10px; padding: 10px; font-size: 0.9rem; }
        .profile-log small { color: var(--muted); }
        .profile-empty { color: var(--muted); font-size: 0.9rem; }
        .community-wrap { margin: 22px 0 8px; }
        .gym-progress-wrap { margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 10px; width: 100%; }
        .following-search { margin-top: 0; }
        .following-section-title { margin: 4px 0 10px; font-size: 1rem; color: var(--text); }
        .following-user-row { display:flex; justify-content:space-between; align-items:center; gap:10px; }
        .following-user-meta { display:flex; align-items:center; gap:10px; min-width:0; }
        .following-avatar { width:36px; height:36px; border-radius:999px; object-fit:cover; border:1px solid var(--border); background:#1B2842; display:grid; place-items:center; color:var(--muted); font-size:0.75rem; font-weight:700; }
        .social-public-card { display:block; }
        .social-user-item { display:flex; align-items:center; justify-content:space-between; gap:10px; }
        .social-user-meta { display:flex; align-items:center; gap:10px; min-width:0; flex:1; cursor:pointer; }
        .social-user-meta b { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .social-public-header { display:flex; gap:12px; align-items:center; margin-bottom:12px; }
        .social-public-avatar { width:56px; height:56px; border-radius:999px; border:1px solid var(--border); background:#1B2842; object-fit:cover; display:grid; place-items:center; font-weight:700; }
        .social-public-stats { display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:8px; margin:10px 0; }
        .social-stat-btn { border:1px solid var(--border); border-radius:10px; background:var(--card); color:var(--text); min-height:52px; font-weight:600; }
        .social-stat-btn span { display:block; color:var(--muted); font-size:0.75rem; font-weight:500; }
        .social-public-list { margin-top:10px; }
        .social-modal { position:fixed; inset:0; z-index:1500; background:rgba(4,8,18,0.72); display:none; align-items:flex-end; }
        .social-modal.active { display:flex; }
        .social-modal-sheet { width:100%; max-height:74dvh; overflow:auto; background:var(--card); border-top:1px solid var(--border); border-radius:18px 18px 0 0; padding:16px; }
        .username-hint { margin: -2px 0 8px; min-height: 20px; font-size: 0.86rem; color: var(--muted); text-align: left; }
        .username-hint.ok { color: #15803d; }
        .username-hint.error { color: var(--danger); }
        .user-section-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 500;
            font-size: 1.2rem;
            color: var(--text);
            margin: 0 0 12px 0;
        }
        .user-gym-card { display:block; width:100%; }
        .gym-3d-card {
            position: relative;
            border: 1px solid rgba(34,211,238,0.38);
            background: linear-gradient(140deg, rgba(18,26,43,0.95) 0%, rgba(20,32,56,0.96) 55%, rgba(14,22,42,0.98) 100%);
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(7, 14, 30, 0.36), inset 0 0 0 1px rgba(91,140,255,0.18);
            transition: transform 0.15s ease, box-shadow 0.2s ease;
        }
        .gym-3d-card:active { transform: translateY(1px) scale(0.995); box-shadow: 0 6px 14px rgba(7,14,30,0.3), inset 0 0 0 1px rgba(91,140,255,0.24); }
        .gym-3d-overlay { position:absolute; inset:0; pointer-events:none; background: radial-gradient(circle at 88% 18%, rgba(34,211,238,0.18), transparent 44%), radial-gradient(circle at 14% 82%, rgba(91,140,255,0.14), transparent 46%); }
        .gym-3d-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; position:relative; z-index:1; }
        .user-gym-card .user-gym-name { flex:1; font-size:1.08rem; line-height:1.3; }
        .gym-3d-badge { display:inline-flex; align-items:center; gap:6px; border-radius:999px; border:1px solid rgba(34,211,238,0.45); padding:6px 10px; font-size:0.78rem; color:#d6f8ff; background:rgba(10,24,45,0.6); font-weight:600; }
        .gym-3d-badge.off { border-color: rgba(154,168,199,0.38); color: #b8c3db; background: rgba(16,27,45,0.45); }
        .gym-3d-surface { margin:10px 0 12px; height:8px; border-radius:999px; background: linear-gradient(90deg, rgba(34,211,238,0.28) 0%, rgba(91,140,255,0.42) 50%, rgba(132,204,22,0.3) 100%); border:1px solid rgba(91,140,255,0.26); }
        .gym-3d-actions { display:flex; align-items:center; justify-content:space-between; gap:10px; position:relative; z-index:1; }
        .gym-3d-cta { flex:1; min-height:48px; border:none; border-radius:12px; background: linear-gradient(180deg, #22D3EE 0%, #3B82F6 100%); color:#081225; font-weight:700; letter-spacing:0.01em; box-shadow:0 6px 18px rgba(34,211,238,0.28); }
        .gym-3d-cta:active { transform: scale(0.99); }
        .user-gym-card .btn-fav { background: rgba(9,16,31,0.5); border:1px solid var(--border); color: var(--muted); cursor: pointer; padding: 10px; min-width: 44px; min-height: 44px; font-size: 1.25rem; display:flex; align-items:center; justify-content:center; border-radius:12px; }
        .user-gym-card .btn-fav.fav { color: var(--danger); border-color: rgba(239,68,68,0.5); }
        .user-detail-view { margin-top: 0; }
        .gym-detail-overview {
            display: block;
            margin: 12px 0 16px;
            background: linear-gradient(180deg, #121A2B 0%, #0F1628 100%);
            border: 1px solid rgba(91,140,255,0.3);
        }
        .gym-detail-overview { box-shadow: 0 12px 24px rgba(7,14,30,0.3); }
        .gym-detail-hero-cta { margin-top: 12px; padding: 12px; border-radius: 14px; border: 1px solid rgba(34,211,238,0.38); background: linear-gradient(140deg, rgba(16,29,52,0.92) 0%, rgba(18,39,70,0.9) 55%, rgba(12,26,49,0.95) 100%); }
        .gym-detail-hero-cta b { display:block; font-size: 1rem; margin-bottom: 4px; }
        .gym-detail-hero-cta p { margin: 0 0 10px; color: var(--muted); font-size: 0.88rem; }
        .gym-detail-hero-cta .btn-main { min-height: 50px; }
        #user-gym-detail-sectors-list .card { border:1px solid rgba(91,140,255,0.26); background: linear-gradient(140deg, rgba(18,26,43,0.95) 0%, rgba(20,32,56,0.96) 100%); box-shadow: 0 8px 16px rgba(7,14,30,0.24); }
        .gym-detail-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 500;
            font-size: 1.6rem;
            color: var(--text);
            margin: 0 0 10px 0;
        }
        .gym-detail-meta { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin: 0; }
        .gym-meta-chip { border: 1px solid var(--border); background: #141F33; border-radius: 12px; padding: 10px 12px; display: flex; flex-direction: column; gap: 2px; }
        .gym-meta-chip b { font-size: 1rem; color: var(--text); }
        .gym-meta-chip span { font-size: 0.78rem; color: var(--muted); }
        .gym-detail-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .gym-tab {
            flex: 1;
            min-height: 48px;
            padding: 14px 8px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.03em;
        }
        .gym-tab.active { color: var(--primary); border-color: var(--primary); background: #141F33; }
        .gym-tab-panel { margin-bottom: 28px; }
        .user-gym-detail-desc { color: var(--muted); font-size: 1rem; line-height: 1.6; margin: 0 0 14px 0; }
        .gym-info-block { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 14px; background: #141F33; padding: 14px; }
        .gym-info-heading {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 500;
            font-size: 1.1rem;
            color: var(--text);
            margin: 0 0 10px 0;
        }
        .gym-sectors-header { margin-bottom: 14px; }
        .gym-sectors-header p { margin: 6px 0 0; color: var(--muted); font-size: 0.9rem; }
        .gym-about-content { color: var(--text); font-size: 0.95rem; line-height: 1.6; display: flex; flex-direction: column; gap: 8px; }
        .gym-about-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: #18253D; }
        .gym-about-label { color: var(--muted); min-width: 92px; }
        .gym-about-value { color: var(--text); text-align: right; word-break: break-word; }
        .gym-about-content a { color: var(--accent); text-decoration: none; }
        .gym-gallery-empty { color: var(--muted); font-size: 0.9rem; margin: 0; }
        .gym-climbing-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .gym-climbing-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        .gym-climbing-table th, .gym-climbing-table td { text-align: left; padding: 14px 12px; border-bottom: 1px solid var(--border); }
        .gym-climbing-table th { color: var(--muted); font-weight: 600; }
        .user-gym-detail-gallery { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 12px; margin-top: 10px; -webkit-overflow-scrolling: touch; }
        .user-gym-detail-gallery img { width: 200px; min-width: 200px; height: 150px; object-fit: cover; border-radius: var(--radius-sm); display: block; }
        .gym-coverage-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 12px; }
        .gym-coverage-kpi { border: 1px solid var(--border); border-radius: 10px; background: #141F33; padding: 10px; text-align: center; }
        .gym-coverage-kpi b { display:block; font-size: 1.1rem; color: var(--text); }
        .gym-coverage-kpi span { display:block; font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
        .gym-coverage-bar { width: 100%; height: 12px; border-radius: 999px; background: #1B2842; overflow: hidden; border: 1px solid var(--border); }
        .gym-coverage-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #2EC4B6 0%, #38bdf8 100%); transition: width 0.25s ease; }
        .gym-coverage-meta { margin-top: 8px; font-size: 0.86rem; color: var(--muted); }
        #user-gym-detail-sectors-list .card { min-height: 56px; }
        #user-gym-detail-sectors-list { margin-bottom: 20px; }

        /* Social panel – log send */
        .social-form { margin-top: 22px; border-top: 1px solid var(--border); padding-top: 22px; }
        .social-field { margin-bottom: 22px; }
        .social-label { display: block; color: var(--text); font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; }
        .social-input { min-height: 52px; padding: 14px 18px; font-size: 16px; border-radius: var(--radius-sm); }
        .social-textarea { min-height: 100px; padding: 14px 18px; font-size: 16px; border-radius: var(--radius-sm); }
        .social-tabs { display:flex; gap:8px; margin:14px 0 10px; }
        .social-tab { flex:1; min-height:44px; border:1px solid var(--border); border-radius:10px; background:var(--card); color:var(--muted); font-weight:600; }
        .social-tab.active { border-color: var(--primary); color: var(--primary); }
        .social-panel-section { display:none; }
        .social-panel-section.active { display:block; }
        .tracker-state-actions { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
        .tracker-state-pill { padding:8px 12px; border:1px solid var(--border); border-radius:999px; font-size:0.82rem; color:var(--muted); }
        .tracker-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px; }
        .tracker-grid .full { grid-column: 1 / -1; }
        .profile-filter-row { display:flex; justify-content:space-between; align-items:center; gap:8px; margin:8px 0; }
        .profile-filter-row select { margin:0; min-height:40px; max-width:200px; }
        .send-date-quick { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .btn-date-quick {
            min-height: 44px;
            padding: 12px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            cursor: pointer;
        }
        .btn-date-quick:active { border-color: var(--primary); color: var(--primary); }
        .tries-stepper { display: flex; align-items: center; gap: 16px; }
        .tries-btn {
            width: 48px;
            height: 48px;
            min-width: 48px;
            min-height: 48px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 22px;
            cursor: pointer;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tries-btn:active { border-color: var(--primary); color: var(--primary); }
        .tries-num { min-width: 40px; text-align: center; font-weight: 700; font-size: 1.2rem; }

        /* Dash header & viewer close – safe area + touch */
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-top: var(--safe-top);
            flex-wrap: wrap;
            gap: 12px;
        }
        .dash-header .lang-switcher { flex-shrink: 0; }
        .viewer-close {
            position: absolute;
            top: max(16px, var(--safe-top));
            left: max(16px, var(--safe-left));
            z-index: 1100;
            min-height: 48px;
            min-width: 48px;
            padding: 12px 18px;
            background: rgba(0,0,0,0.7);
            color: #E6EEFF;
            border-radius: var(--radius-sm);
        }
        .auth-toggle { cursor: pointer; color: var(--muted); margin-top: 22px; font-size: 1rem; min-height: 44px; display: inline-flex; align-items: center; }
        .auth-toggle:active { color: var(--primary); }

        /* Brand typography – consistent with wordmark */
        .climby-wordmark {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-style: italic;
            font-weight: 300;
            letter-spacing: 0.02em;
        }
        .headline-brand {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 500;
            font-style: normal;
            letter-spacing: 0.01em;
            color: var(--text);
        }
        .headline-brand.primary { color: var(--primary); }
        .subhead {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            color: var(--text);
        }
        .subhead.muted { color: var(--muted); }
    </style>
</head>
<body>

    <div id="loading-overlay" style="display:none"><div class="spinner"></div><p id="loading-text" data-i18n="loading.init" style="margin-top:15px">Inizializzazione...</p><button id="loading-retry-btn" type="button" class="btn-sec" style="display:none; margin-top:10px;" data-i18n="loading.retry" onclick="window.retryOpen3D()"></button></div>

            </div>
            <div id="social-list-modal-body" class="social-public-list"></div>
        </div>

    <div id="view-auth" class="view">
        <div class="container">
            <div class="card" style="text-align:center; margin-top:50px; padding: 30px;">
                <div class="lang-switcher" style="margin-bottom:15px; justify-content:center;">
                    <button type="button" id="lang-it-auth" onclick="window.setLang('it')">IT</button>
                    <button type="button" id="lang-en-auth" onclick="window.setLang('en')">EN</button>
                </div>
                <h1 class="climby-wordmark" style="color:var(--primary)">Climby</h1>
                <div id="reg-fields">
                    <input type="text" id="f-name" data-i18n-placeholder="auth.username" autocomplete="off" autocapitalize="none" spellcheck="false">
                    <p id="username-status" class="username-hint" aria-live="polite"></p>
                    <select id="role-select" onchange="document.getElementById('gym-box').style.display = this.value=='admin'?'block':'none'">
                        <option value="user" id="opt-role-user">Scalatore</option>
                        <option value="admin" id="opt-role-admin">Gestore Palestra (Admin)</option>
                    </select>
                    <div id="gym-box" style="display:none"><input type="text" id="gym-input" data-i18n-placeholder="auth.gymName"></div>

                <button class="btn-main" id="auth-btn">ACCEDI / REGISTRATI</button>

            </div>
        </div>

    <div id="view-dash" class="view">
        <div class="container">
            <div class="dash-header">
                <h2 class="climby-wordmark" style="color:var(--primary); margin:0; font-size:1.5rem; font-weight:300;">Climby</h2>
                <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                    <div class="lang-switcher">
                        <button type="button" id="lang-it-dash" onclick="window.setLang('it')">IT</button>
                        <button type="button" id="lang-en-dash" onclick="window.setLang('en')">EN</button>
                    </div>
                    <button class="btn-sec" id="btn-mode-toggle" onclick="window.switchMode()" data-i18n="dash.switchView"></button>
                    <button class="btn-sec" onclick="window.logout()" data-i18n="dash.logout"></button>
                </div>
            </div>

            <div id="admin-panel" style="display:none;">
                <div class="card" style="border: 2px dashed var(--border);">
                    <h4 style="margin:0 0 10px 0;" data-i18n="admin.createSector"></h4>
                    <input type="text" id="new-sector-name" data-i18n-placeholder="admin.sectorNamePlaceholder">
                    <input type="file" id="file-mesh-new" accept=".glb">
                    <button class="btn-main" onclick="window.handleUpload(null)" data-i18n="admin.publish"></button>
                </div>

                <h3 class="headline-brand" data-i18n="admin.gymProfileTitle"></h3>
                <div class="card" style="display:block;">
                    <div class="admin-gym-form">
                        <input class="full" type="text" id="admin-gym-description" data-i18n-placeholder="admin.gymDescription">

            }

        let currentLang = localStorage.getItem(LANG_KEY) || 'it';
        const t = (key) => { const parts = key.split('.'); let v = translations[currentLang]; for (const p of parts) v = v?.[p]; return v != null ? v : key; };
        function applyLang() {

            const lt = document.getElementById('loading-text'); if (lt) lt.innerText = t('loading.init');
        }
        window.setLang = (lang) => { currentLang = lang; localStorage.setItem(LANG_KEY, lang); applyLang(); populateAdminColorOptions(); if (typeof loadAdminStats === 'function') loadAdminStats(); if (typeof renderProfileDashboard === 'function') renderProfileDashboard(); if (typeof renderUserGymList === 'function') renderUserGymList(); if (typeof renderFollowingSection === 'function') renderFollowingSection(); if (typeof renderActivePublicProfile === 'function') renderActivePublicProfile(); if (activeGymDetailId) renderGymCoverage(currentGymCoverage); if (currentMode === 'admin' && realUserGymId) renderAdminCoverage(); };

        const showLoading = (msg, showRetry = false) => {

        applyLang();

        // --- AUTH ---
        const USERNAME_PATTERN = /^[a-zA-Z0-9_.-]{3,20}$/;
        let usernameCheckTimer = null;
        let lastCheckedUsername = '';
        let lastUsernameAvailable = false;

        function normalizeUsername(v) {
            const raw = (v || '').trim();
            if (!raw) return '';
            const ascii = raw.normalize('NFKD').replace(/[̀-ͯ]/g, '');
            const compact = ascii.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_.-]/g, '');
            return compact;
        }
        function usernameLower(v) { return normalizeUsername(v).toLowerCase(); }
        function isValidUsername(v) { return USERNAME_PATTERN.test(normalizeUsername(v)); }
        function setUsernameStatus(message, kind = '') {
            const status = document.getElementById('username-status');
            if (!status) return;

            status.className = `username-hint${kind ? ` ${kind}` : ''}`;

        function populateAdminColorOptions() {
            const colorSelect = document.getElementById('route-color');
            if (!colorSelect) return;
            const prevValue = colorSelect.value;
            colorSelect.innerHTML = AVAILABLE_COLORS.map(c => {
                const label = c.labels?.[currentLang] || c.labels?.it || c.value;
                return `<option value="${c.value}">● ${label}</option>`;
            }).join('');
            if (prevValue) {
                ensureRouteColorOption(prevValue);
                colorSelect.value = prevValue;
            }
        }

        function ensureRouteColorOption(colorValue) {
            const colorSelect = document.getElementById('route-color');
            if (!colorSelect || !colorValue) return;
            const exists = Array.from(colorSelect.options).some(opt => opt.value.toLowerCase() === colorValue.toLowerCase());
            if (exists) return;
            const legacy = document.createElement('option');
            legacy.value = colorValue;
            legacy.textContent = `● ${colorValue.toUpperCase()}`;
            colorSelect.appendChild(legacy);
        }
        async function checkUsernameAvailability(rawUsername) {
            const normalized = normalizeUsername(rawUsername);
            const lower = usernameLower(normalized);
            if (!normalized) {
                lastCheckedUsername = '';
                lastUsernameAvailable = false;
                setUsernameStatus(t('auth.usernameHint'));
                return { available: false, reason: 'empty' };
            }
            if (!isValidUsername(normalized)) {
                lastCheckedUsername = lower;
                lastUsernameAvailable = false;
                setUsernameStatus(t('auth.usernameInvalid'), 'error');
                return { available: false, reason: 'invalid' };
            }
            setUsernameStatus(t('auth.usernameChecking'));
            try {
                const qRef = query(collection(db, 'users'), where('usernameLower', '==', lower), limit(1));
                const snap = await getDocs(qRef);
                const taken = !snap.empty;
                lastCheckedUsername = lower;
                lastUsernameAvailable = !taken;
                setUsernameStatus(taken ? t('auth.usernameTaken') : t('auth.usernameAvailable'), taken ? 'error' : 'ok');
                return { available: !taken, reason: taken ? 'taken' : 'ok' };
            } catch (_) {
                setUsernameStatus(t('auth.usernameHint'));
                return { available: true, reason: 'skip' };
            }
        }
        function resolveUsername(userId, fallbackName = 'Climber') {
            if (userId && lastUsersSnap) {
                const found = lastUsersSnap.docs.find(d => d.id === userId);
                if (found) {
                    const data = found.data() || {};
                    if (data.username) return data.username;
                }
            }
            return fallbackName;
        }

        const usernameInput = document.getElementById('f-name');
        if (usernameInput) {
            usernameInput.addEventListener('input', () => {
                const isReg = document.getElementById('reg-fields')?.style.display !== 'none';
                if (!isReg) return;
                if (usernameCheckTimer) clearTimeout(usernameCheckTimer);
                usernameCheckTimer = setTimeout(() => {
                    const normalized = normalizeUsername(usernameInput.value);
                    if (normalized !== usernameInput.value) usernameInput.value = normalized;
                    checkUsernameAvailability(usernameInput.value).catch(() => setUsernameStatus(t('auth.usernameInvalid'), 'error'));
                }, 320);
            });
            usernameInput.addEventListener('blur', () => {
                const isReg = document.getElementById('reg-fields')?.style.display !== 'none';
                if (!isReg) return;
                const normalized = normalizeUsername(usernameInput.value);
                if (normalized !== usernameInput.value) usernameInput.value = normalized;
                checkUsernameAvailability(usernameInput.value).catch(() => setUsernameStatus(t('auth.usernameInvalid'), 'error'));
            });
        }

        window.toggleAuthMode = () => {

        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('email').value, pass = document.getElementById('pass').value;
            showLoading(t('loading.verifying'));
            try {

                    const usernameField = document.getElementById('f-name');
                    const username = normalizeUsername(usernameField?.value || '');
                    if (usernameField && usernameField.value !== username) usernameField.value = username;
                    if (!username) throw new Error(t('errors.usernameRequired'));
                    if (!isValidUsername(username)) throw new Error(t('errors.usernameInvalid'));
                    const lower = usernameLower(username);
                    let cleanGymId = role === 'admin' ? gymName.trim().replace(/\s+/g, '-') : null;
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    try {
                        const qRef = query(collection(db, 'users'), where('usernameLower', '==', lower), limit(1));
                        const existsSnap = await getDocs(qRef);
                        const taken = existsSnap.docs.some(d => d.id !== res.user.uid);
                        if (taken) throw new Error('USERNAME_TAKEN');
                        await setDoc(doc(db, "users", res.user.uid), { role, gymManaged: cleanGymId, username, usernameLower: lower, following: [], favouriteGyms: [] });
                    } catch (e) {
                        try { await deleteUser(res.user); } catch (_) {}
                        if (e?.message === 'USERNAME_TAKEN') throw new Error(t('errors.usernameTaken'));
                        if (e?.code === 'permission-denied' || /insufficient permissions/i.test(String(e?.message || ''))) {
                            throw new Error('Permessi Firestore insufficienti: abilita lettura/scrittura su users per utenti autenticati.');
                        }
                        throw e;
                    }
                    if(role === 'admin') await setDoc(doc(db, "gyms", cleanGymId), { name: gymName, owner: res.user.uid });
                }
            } catch(e) { alert(e.message); hideLoading(); }
        };

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                const snap = await getDoc(doc(db, "users", user.uid));

        function stopGym3DSubscriptions() {
            while (gym3DUnsubscribers.length) {

        function startGym3DSubscriptions(gymsSnapshot) {
            stopGym3DSubscriptions();

                const unsub = onSnapshot(collection(db, 'gyms', g.id, 'Sectors'), (snap) => {

        function buildGym3DCard(g, isFav) {
            const status = gym3DStatusMap.get(g.id) || { has3D: false };

        function renderUserGymList() {

        function renderGymProgressForDetail(gymId, gymName) {

            const entries = Array.from(profileEntriesMap.values())

                .sort((a,b)=>new Date(b.sendDate||b.date||0)-new Date(a.sendDate||a.date||0));
            const isOpen = openGymProgress.has(gymId);
            const btn = `<button type="button" class="btn-sec" data-action="toggle-detail-progress" data-gym-id="${gymId}">${isOpen ? t('dash.hideGymProgress') : t('dash.openGymProgress')}</button>`;
            if (!isOpen) {
                progressWrap.innerHTML = btn;
                progressWrap.querySelector('[data-action="toggle-detail-progress"]').onclick = () => {
                    openGymProgress.add(gymId);

                };

            }
            const logs = entries.slice(0,6).map(e => `<div class="profile-log"><div><b>${escapeHtml(resolveUsername(e.userId, e.userName || 'Climber'))}</b> · ${escapeHtml(e.grade || '-')} · ${e.outcome === 'project' ? t('viewer.project') : t('viewer.climbed')}</div><small>${escapeHtml(e.sectorName || '-')} · ${escapeHtml(formatProfileDate(e.sendDate))}</small></div>`).join('') || `<p class="profile-empty">${t('dash.communityEmpty')}</p>`;
            progressWrap.innerHTML = `${btn}<div class="profile-list" style="margin-top:10px;"><b>${t('dash.recentCommunity')}</b>${logs}</div>`;
            progressWrap.querySelector('[data-action="toggle-detail-progress"]').onclick = () => {
                openGymProgress.delete(gymId);
                renderGymProgressForDetail(gymId, gymName);
            };
        }
        function escapeHtml(s) { const div = document.createElement('div'); div.textContent = s; return div.innerHTML; }
        function gradeIndex(grade) { return GRADE_SCALE.indexOf((grade || '').toLowerCase()); }
        function formatProfileDate(v) {

            return d.toLocaleDateString(currentLang === 'it' ? 'it-IT' : 'en-US');

        function destroyProfileListeners() { while (profileUnsubscribers.length) { const u = profileUnsubscribers.pop(); if (typeof u === 'function') u(); } }
        function setUserMainTab(tab) {

        function computeProfileData(entries) {
            const sorted = entries.slice().sort((a, b) => new Date(b.sendDate || b.date || 0) - new Date(a.sendDate || a.date || 0));
            let maxGrade = null;
            for (const e of sorted) {
                if (!maxGrade || gradeIndex(e.grade) > gradeIndex(maxGrade)) maxGrade = e.grade;
            }
            const daySet = new Set(sorted.map(e => e.sendDate || '').filter(Boolean));
            const gymSet = new Set(sorted.map(e => e.gymName || '').filter(Boolean));
            return { sorted, maxGrade: maxGrade || '-', totalSends: sorted.length, activeDays: daySet.size, reviewedGyms: gymSet.size };
        }

        function normalizeDateFromReview(reviewData) {
            if (reviewData?.sendDate) {
                const dt = new Date(reviewData.sendDate);
                if (!Number.isNaN(dt.getTime())) return dt;
            }
            if (reviewData?.date?.toDate) {
                const dt = reviewData.date.toDate();
                if (!Number.isNaN(dt.getTime())) return dt;
            }
            if (reviewData?.date) {
                const dt = new Date(reviewData.date);
                if (!Number.isNaN(dt.getTime())) return dt;
            }
            return null;
        }

        function renderGymCoverage(stats) {
            const wrap = document.getElementById('user-gym-detail-coverage');
            if (!wrap) return;
            const totalUsers = stats?.totalUsers || 0;
            const activeUsers = stats?.activeUsers || 0;
            const coveragePct = stats?.coveragePct || 0;
            const legendTemplate = t('gym.coverageLegend');

                .replace('{{active}}', String(activeUsers))
                .replace('{{total}}', String(totalUsers));
            wrap.innerHTML = `
                <div class="gym-coverage-grid">
                    <div class="gym-coverage-kpi"><b>${totalUsers}</b><span>${t('gym.totalGymUsers')}</span></div>

                </div>
                <div class="gym-coverage-bar" aria-label="${t('gym.coveragePercent')}">
                    <div class="gym-coverage-fill" style="width:${coveragePct}%"></div>
                </div>
                <div class="gym-coverage-meta">${escapeHtml(legend)}</div>
            `;
        }

        function subscribeGymCoverage(gymId) {
            activeGymDetailId = gymId;
            stopGymCoverageListeners();
            currentGymCoverage = { totalUsers: 0, activeUsers: 0, coveragePct: 0 };
            renderGymCoverage(currentGymCoverage);

            const sectorRouteUnsubs = new Map();
            const routeReviewUnsubs = new Map();
            const reviewEntries = new Map();
            const activeAfter = new Date();
            activeAfter.setDate(activeAfter.getDate() - 30);

            function recalcCoverage() {
                const allUsers = new Set();
                const activeUsers = new Set();
                for (const entry of reviewEntries.values()) {
                    if (!entry?.uid) continue;
                    allUsers.add(entry.uid);
                    if (entry.active) activeUsers.add(entry.uid);
                }
                const total = allUsers.size;
                const active = activeUsers.size;
                const pct = total > 0 ? Math.round((active / total) * 100) : 0;
                currentGymCoverage = { totalUsers: total, activeUsers: active, coveragePct: pct };
                renderGymCoverage(currentGymCoverage);
            }

            function clearRouteReviewEntries(routeKey) {
                const prefix = `${routeKey}::`;
                for (const k of Array.from(reviewEntries.keys())) {
                    if (k.startsWith(prefix)) reviewEntries.delete(k);
                }
            }

            function removeRoute(routeKey) {
                const unsub = routeReviewUnsubs.get(routeKey);
                if (typeof unsub === 'function') unsub();
                routeReviewUnsubs.delete(routeKey);
                clearRouteReviewEntries(routeKey);
            }

            function removeSector(sectorId) {
                const routesUnsub = sectorRouteUnsubs.get(sectorId);
                if (typeof routesUnsub === 'function') routesUnsub();
                sectorRouteUnsubs.delete(sectorId);
                for (const routeKey of Array.from(routeReviewUnsubs.keys())) {
                    if (routeKey.startsWith(`${sectorId}/`)) removeRoute(routeKey);
                }
            }

            const sectorsUnsub = onSnapshot(collection(db, `gyms/${gymId}/Sectors`), (sectorsSnap) => {
                const validSectors = new Set(sectorsSnap.docs.map(d => d.id));

                sectorsSnap.forEach((sectorDoc) => {
                    if (sectorRouteUnsubs.has(sectorDoc.id)) return;
                    const routesPath = `gyms/${gymId}/Sectors/${sectorDoc.id}/routes`;
                    const routesUnsub = onSnapshot(collection(db, routesPath), (routesSnap) => {
                        const validRoutes = new Set(routesSnap.docs.map(d => `${sectorDoc.id}/${d.id}`));

                        routesSnap.forEach((routeDoc) => {
                            const routeKey = `${sectorDoc.id}/${routeDoc.id}`;
                            if (routeReviewUnsubs.has(routeKey)) return;
                            const reviewsPath = `gyms/${gymId}/Sectors/${sectorDoc.id}/routes/${routeDoc.id}/reviews`;
                            const reviewsUnsub = onSnapshot(collection(db, reviewsPath), (reviewsSnap) => {
                                clearRouteReviewEntries(routeKey);
                                reviewsSnap.forEach((revDoc) => {
                                    const review = revDoc.data() || {};
                                    const uid = review.userId || null;
                                    const dt = normalizeDateFromReview(review);
                                    const active = !!(dt && dt >= activeAfter);
                                    reviewEntries.set(`${routeKey}::${revDoc.id}`, { uid, active });
                                });
                                recalcCoverage();
                            });
                            routeReviewUnsubs.set(routeKey, reviewsUnsub);
                        });

                        for (const existingRouteKey of Array.from(routeReviewUnsubs.keys())) {
                            if (!existingRouteKey.startsWith(`${sectorDoc.id}/`)) continue;
                            if (!validRoutes.has(existingRouteKey)) removeRoute(existingRouteKey);
                        }
                        recalcCoverage();
                    });
                    sectorRouteUnsubs.set(sectorDoc.id, routesUnsub);
                });

        function buildCoverageStats(days) {
            const now = new Date();
            const afterDays = new Date(now);
            afterDays.setDate(afterDays.getDate() - days);
            const after30 = new Date(now);
            after30.setDate(after30.getDate() - 30);
            const periods = [7, 30, 90];

            const gymUsers = new Set();
            const gymActive30 = new Set();
            const gymActivePeriod = new Set();
            const gymTrend = new Map(periods.map(d => [d, new Set()]));
            const sectors = new Map();

            for (const [routeKey, reviewsMap] of adminCoverageSnapshot.reviewsByRoute.entries()) {
                const [sectorId] = routeKey.split('/');
                if (!sectors.has(sectorId)) {
                    sectors.set(sectorId, {
                        sectorId,
                        sectorName: adminCoverageSnapshot.sectorNames.get(sectorId) || sectorId,
                        users: new Set(),
                        active30: new Set(),
                        activePeriod: new Set(),
                        trend: new Map(periods.map(d => [d, new Set()])),
                        userActivity: new Map()
                    });
                }
                const sec = sectors.get(sectorId);

                for (const review of reviewsMap.values()) {
                    if (!review.uid) continue;
                    gymUsers.add(review.uid);
                    sec.users.add(review.uid);
                    if (review.dt && review.dt >= after30) { gymActive30.add(review.uid); sec.active30.add(review.uid); }
                    if (review.dt && review.dt >= afterDays) { gymActivePeriod.add(review.uid); sec.activePeriod.add(review.uid); }
                    for (const p of periods) {
                        const ap = new Date(now);
                        ap.setDate(ap.getDate() - p);
                        if (review.dt && review.dt >= ap) {
                            gymTrend.get(p).add(review.uid);
                            sec.trend.get(p).add(review.uid);
                        }
                    }
                    sec.userActivity.set(review.uid, (sec.userActivity.get(review.uid) || 0) + 1);
                }
            }

            const sectorsData = Array.from(sectors.values()).map(sec => {
                const topUsers = Array.from(sec.userActivity.entries())
                    .sort((a,b) => b[1]-a[1])
                    .slice(0, 3)
                    .map(([uid, count]) => ({ username: resolveUsername(uid, 'Climber'), count }));
                const total = sec.users.size;
                const active = sec.activePeriod.size;
                const coverage = total > 0 ? Math.round((active/total)*100) : 0;
                return {
                    sectorId: sec.sectorId,
                    sectorName: sec.sectorName,
                    totalUsers: total,
                    active30: sec.active30.size,
                    activePeriod: active,
                    coveragePct: coverage,
                    trend: periods.map(p => ({ days: p, users: sec.trend.get(p).size })),
                    topUsers
                };
            }).sort((a,b)=>b.activePeriod-a.activePeriod);

            const gymTotal = gymUsers.size;
            const gymPeriodActive = gymActivePeriod.size;
            return {
                periodDays: days,
                totalUsersGym: gymTotal,
                activeUsersLast30Days: gymActive30.size,
                selectedCoverage: gymTotal > 0 ? Math.round((gymPeriodActive/gymTotal)*100) : 0,
                trend: periods.map(p => ({ days: p, users: gymTrend.get(p).size })),
                sectors: sectorsData
            };
        }

        function startAdminCoverageSubscriptions(gymId) {
            stopAdminCoverageListeners();
            adminCoverageSnapshot.gymId = gymId;
            const routeReviewUnsubs = new Map();
            const routeUnsubs = new Map();

            function dropRoute(routeKey) {
                const unsub = routeReviewUnsubs.get(routeKey);
                if (typeof unsub === 'function') unsub();
                routeReviewUnsubs.delete(routeKey);
                adminCoverageSnapshot.reviewsByRoute.delete(routeKey);
            }

            const sectorsUnsub = onSnapshot(collection(db, `gyms/${gymId}/Sectors`), (sectorsSnap) => {
                const currentSectors = new Set();
                sectorsSnap.forEach((sectorDoc) => {
                    const sectorId = sectorDoc.id;
                    currentSectors.add(sectorId);
                    adminCoverageSnapshot.sectorNames.set(sectorId, sectorDoc.data()?.name || sectorId);
                    if (routeUnsubs.has(sectorId)) return;

                    const routesUnsub = onSnapshot(collection(db, `gyms/${gymId}/Sectors/${sectorId}/routes`), (routesSnap) => {
                        const currentRoutes = new Set();
                        routesSnap.forEach((routeDoc) => {
                            const routeKey = `${sectorId}/${routeDoc.id}`;
                            currentRoutes.add(routeKey);
                            if (routeReviewUnsubs.has(routeKey)) return;

                            const reviewsUnsub = onSnapshot(collection(db, `gyms/${gymId}/Sectors/${sectorId}/routes/${routeDoc.id}/reviews`), (reviewsSnap) => {
                                const m = new Map();
                                reviewsSnap.forEach((rvDoc) => {
                                    const d = rvDoc.data() || {};
                                    m.set(rvDoc.id, { uid: d.userId || null, dt: normalizeDateFromReview(d) });
                                });
                                adminCoverageSnapshot.reviewsByRoute.set(routeKey, m);
                                renderAdminCoverage();
                            });
                            routeReviewUnsubs.set(routeKey, reviewsUnsub);
                        });

                        for (const existing of Array.from(routeReviewUnsubs.keys())) {
                            if (!existing.startsWith(`${sectorId}/`)) continue;
                            if (!currentRoutes.has(existing)) dropRoute(existing);
                        }
                        renderAdminCoverage();
                    });

                    routeUnsubs.set(sectorId, routesUnsub);
                });

                for (const sectorId of Array.from(routeUnsubs.keys())) {
                    if (currentSectors.has(sectorId)) continue;
                    const unsub = routeUnsubs.get(sectorId);
                    if (typeof unsub === 'function') unsub();
                    routeUnsubs.delete(sectorId);
                    adminCoverageSnapshot.sectorNames.delete(sectorId);
                    for (const routeKey of Array.from(routeReviewUnsubs.keys())) {
                        if (routeKey.startsWith(`${sectorId}/`)) dropRoute(routeKey);
                    }
                }
                renderAdminCoverage();
            });

            adminCoverageUnsubscribers.push(() => {
                sectorsUnsub();
                for (const unsub of routeUnsubs.values()) if (typeof unsub === 'function') unsub();
                for (const unsub of routeReviewUnsubs.values()) if (typeof unsub === 'function') unsub();
            });

            const filter = document.getElementById('admin-coverage-period');
            if (filter) filter.onchange = () => renderAdminCoverage();
        }
