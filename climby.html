<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="theme-color" content="#0F1720">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Climby | Pro Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root {
            --bg: #0F1720;
            --card: #16202A;
            --surface-elevated: #1B2632;
            --text: #F5F7FA;
            --muted: #A8B3C2;
            --text-disabled: #6B7785;
            --border: rgba(255,255,255,0.08);
            --primary: #2BE07D;
            --primary-hover: #20C96B;
            --primary-dim: rgba(43, 224, 125, 0.12);
            --accent: #2BE07D;
            --danger: #FF5C5C;
            --yellow: #2BE07D;
            --text-on-primary: #0F1720;
            --touch: 44px;
            --radius: 16px;
            --radius-sm: 12px;
            --safe-top: env(safe-area-inset-top, 0);
            --safe-bottom: env(safe-area-inset-bottom, 0);
            --safe-left: env(safe-area-inset-left, 0);
            --safe-right: env(safe-area-inset-right, 0);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            min-height: 100dvh;
            min-height: 100vh;
            overflow-x: hidden;
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
            padding-bottom: var(--safe-bottom);
        }
        h1 { font-size: 28px; font-weight: 600; line-height: 1.2; }
        h2 { font-size: 22px; font-weight: 600; line-height: 1.25; }
        h3, h4 { font-weight: 600; }
        .view { display: none; min-height: 100dvh; min-height: 100vh; width: 100%; }
        .view.active { display: flex; flex-direction: column; }
        .container {
            padding: 20px 20px calc(20px + var(--safe-bottom));
            padding-left: max(20px, var(--safe-left));
            padding-right: max(20px, var(--safe-right));
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* UI – touch-optimized */
        .card {
            background: var(--card);
            padding: 18px 20px;
            border-radius: var(--radius);
            margin-bottom: 14px;
            border: 1px solid var(--border);
            min-height: var(--touch);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .card:active { opacity: 0.95; }
        .btn-main {
            width: 100%;
            min-height: 52px;
            padding: 16px 24px;
            background: var(--primary);
            color: var(--text-on-primary);
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: normal;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.18);
        }
        .btn-main:hover { background: var(--primary-hover); }
        .btn-main:active { transform: scale(0.98); }
        .btn-sec {
            min-height: var(--touch);
            padding: 12px 18px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.95rem;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-sec:active { background: var(--surface-elevated); }
        .btn-update { min-height: 40px; padding: 10px 16px; background: var(--accent); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; }
        .btn-danger { min-height: 52px; background: var(--danger); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; width: 100%; margin-top: 12px; font-weight: 600; font-size: 1rem; }
        input, select, textarea {
            width: 100%;
            min-height: 52px;
            padding: 14px 18px;
            margin: 10px 0;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-sm);
            font-size: 16px;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }
        textarea { min-height: 100px; resize: vertical; }

        /* Dashboard Admin Table */
        table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.9rem; }
        th, td { text-align: left; padding: 14px 12px; border-bottom: 1px solid var(--border); }
        th { color: var(--text); font-weight: 600; font-size: 0.9rem; }
        .admin-coverage-toolbar { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
        .admin-coverage-toolbar select { min-height:44px; max-width:220px; margin:0; }
        .admin-coverage-grid { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:10px; }
        .admin-coverage-kpi { border:1px solid var(--border); border-radius:12px; padding:12px; background:var(--card); }
        .admin-coverage-kpi b { display:block; font-size:1.2rem; color:var(--text); }
        .admin-coverage-kpi span { display:block; margin-top:2px; font-size:0.8rem; color:var(--muted); }
        .admin-donut { width:86px; height:86px; border-radius:50%; display:grid; place-items:center; margin-left:auto; background:conic-gradient(var(--accent) 0 0%, rgba(255,255,255,0.06) 0 100%); }
        .admin-donut-inner { width:62px; height:62px; border-radius:50%; background:var(--card); display:grid; place-items:center; font-size:0.8rem; color:var(--text); border:1px solid var(--border); }
        .admin-trend { margin-top:12px; display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
        .admin-trend-item { border:1px solid var(--border); border-radius:10px; background:var(--card); padding:8px; }
        .admin-trend-bar { height:8px; border-radius:999px; background:rgba(255,255,255,0.06); overflow:hidden; margin-top:6px; }
        .admin-trend-bar > i { display:block; height:100%; background: var(--primary); }
        .admin-sector-coverage-list { margin-top:14px; display:grid; gap:10px; }
        .admin-sector-coverage-card { border:1px solid var(--border); border-radius:12px; background:var(--card); padding:12px; }
        .admin-sector-coverage-head { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:8px; }
        .admin-sector-top-list { margin:8px 0 0 0; padding-left:18px; color:var(--text); font-size:0.9rem; }
        .admin-sector-top-list li { margin:3px 0; }
        .admin-gym-form { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px; }
        .admin-gym-form .full { grid-column: 1 / -1; }
        .admin-gym-form h5 { margin:8px 0 2px; color: var(--text); font-size:0.95rem; }
        .admin-grade-setup-card textarea { min-height: 140px; }
        .admin-layout { display:grid; grid-template-columns:220px minmax(0,1fr); gap:18px; align-items:start; }
        .admin-sidebar { position:sticky; top:14px; border:1px solid var(--border); background:var(--card); border-radius:14px; padding:10px; display:grid; gap:8px; }
        .admin-sidebar button { width:100%; text-align:left; min-height:44px; border-radius:10px; border:1px solid transparent; background:transparent; color:var(--muted); font-weight:600; cursor:pointer; }
        .admin-sidebar button.active { background:var(--primary-dim); border-color:rgba(43,224,125,0.35); color:var(--text); }
        .admin-tab-panel { display:none; }
        .admin-tab-panel.active { display:block; }
        .admin-kpi-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-bottom:14px; }
        .admin-kpi-card { border:1px solid var(--border); border-radius:12px; background:var(--card); padding:12px; }
        .admin-kpi-card i { font-style:normal; color:var(--muted); font-size:0.8rem; display:block; margin-bottom:6px; }
        .admin-kpi-card b { font-size:1.35rem; display:block; line-height:1.1; }
        .admin-highlight { color:var(--primary); }
        .admin-section-title { margin:0 0 8px 0; font-size:1.05rem; }
        .admin-sector-table-wrap { overflow:auto; border:1px solid var(--border); border-radius:12px; }
        .admin-sector-badge { border-radius:999px; padding:4px 8px; font-size:0.75rem; background:rgba(255,92,92,0.14); color:#ff9c9c; border:1px solid rgba(255,92,92,0.25); }
        .admin-activity-trend { margin-top:8px; font-size:0.88rem; color:var(--muted); }
        .admin-settings-block { margin-bottom:14px; }
        @media (max-width: 900px) {
            .admin-layout { grid-template-columns:1fr; }
            .admin-sidebar { position:static; grid-template-columns:repeat(2,minmax(0,1fr)); }
            .admin-kpi-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
        }

        /* Overlays */
        #loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
        }
        .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Viewer */
        #viewer-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            z-index: 1000;
            background: #000;
            display: none;
        }
        model-viewer { width: 100%; height: 100%; }
        .hotspot {
            width: 28px;
            height: 28px;
            min-width: 28px;
            min-height: 28px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            max-height: 88vh;
            max-height: 88dvh;
            background: var(--card);
            border-top: 3px solid var(--primary);
            border-radius: 24px 24px 0 0;
            padding: 20px;
            padding-bottom: max(24px, var(--safe-bottom));
            padding-left: max(20px, var(--safe-left));
            padding-right: max(20px, var(--safe-right));
            box-sizing: border-box;
            display: none;
            z-index: 1002;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .bottom-sheet::before {
            content: '';
            display: block;
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 8px auto;
        }
        /* Star System */
        .star-rating { display: flex; gap: 12px; font-size: 36px; margin: 12px 0; cursor: pointer; justify-content: center; }
        .star-rating span { color: var(--muted); transition: transform 0.15s, color 0.15s; }
        .star-rating span:active { transform: scale(1.15); }
        .star-rating span.active { color: var(--yellow); }

        /* Landing – catchy hero + how it works (reference style) */
        #view-landing { padding: 0; min-height: 100dvh; }
        .landing-hero {
            min-height: 70vh;
            min-height: 70dvh;
            position: relative;
            background: linear-gradient(180deg, rgba(4,8,18,0.4) 0%, rgba(4,8,18,0.35) 30%, rgba(9,13,26,0.75) 65%, var(--bg) 100%), url('https://images.unsplash.com/photo-1610380184543-2f9912ed6f52?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px 24px 48px;
            padding-top: max(28px, calc(12px + var(--safe-top)));
            padding-left: max(24px, var(--safe-left));
            padding-right: max(24px, var(--safe-right));
            text-align: center;
        }
        .landing-hero-logo {
            position: absolute;
            top: max(24px, calc(8px + var(--safe-top)));
            left: max(24px, var(--safe-left));
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .landing-hero-logo-icon {
            width: 28px;
            height: 20px;
            opacity: 0.95;
        }
        .landing-hero-logo .climby-wordmark {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        .landing-hero .landing-hero-content { position: relative; z-index: 1; }
        .landing-hero h1.climby-wordmark.landing-hero-title {
            color: #fff;
            font-size: clamp(3rem, 12vw, 5rem);
            font-weight: 600;
            margin: 0 0 12px 0;
            letter-spacing: 0.06em;
            text-shadow: 0 2px 12px rgba(0,0,0,0.25);
        }
        .landing-hero .landing-tagline {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color: rgba(255,255,255,0.95);
            font-size: clamp(1rem, 2.5vw, 1.15rem);
            max-width: 360px;
            margin: 0 auto 28px;
            line-height: 1.6;
        }
        .landing-hero .landing-tagline .highlight { color: var(--accent); font-weight: 600; }
        .landing-cta { display: flex; flex-direction: column; gap: 12px; align-items: center; width: 100%; max-width: 320px; }
        .landing-cta .btn-main.landing-cta-primary {
            background: var(--primary);
            color: var(--text-on-primary);
            font-size:18px;
            font-weight: 600;
            min-height: 56px;
            letter-spacing: normal;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
        }
        .landing-cta .btn-sec.landing-cta-sec {
            background: rgba(255,254,249,0.95);
            border: 1px solid rgba(255,255,255,0.8);
            color: #0F1720;
            font-size: 1rem;
            font-weight: 600;
            min-height: 52px;
            backdrop-filter: blur(8px);
        }
        .landing-cta .btn-sec.landing-cta-sec:active {
            background: rgba(226, 232, 240, 0.98);
            color: #0F1720;
        }
        .landing-gallery {
            padding: 48px 20px 56px;
            padding-left: max(20px, var(--safe-left));
            padding-right: max(20px, var(--safe-right));
            padding-bottom: max(56px, calc(28px + var(--safe-bottom)));
            background: var(--bg);
        }
        .landing-gallery h3.headline-brand {
            font-size: 1.5rem;
            letter-spacing: normal;
            margin: 0 0 8px 0;
            text-align: center;
        }
        .landing-gallery .headline-underline {
            width: 48px;
            height: 3px;
            background: var(--accent);
            margin: 0 auto 32px;
            border-radius: 2px;
        }
        .landing-gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 880px; margin: 0 auto; }
        @media (max-width: 600px) { .landing-gallery-grid { grid-template-columns: 1fr; gap: 28px; } }
        .landing-feature-card {
            position: relative;
            border-radius: var(--radius);
            overflow: visible;
            background: var(--card);
            border: 2px solid var(--accent);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
            padding-top: 36px;
        }
        .landing-feature-card:active { transform: scale(0.98); }
        .landing-feature-icon {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(132,204,22,0.35);
        }
        .landing-feature-icon svg { width: 24px; height: 24px; }
        .landing-feature-card .landing-feature-img {
            height: 100px;
            background: var(--bg) center/cover no-repeat;
            margin: 0 12px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .landing-feature-card .landing-feature-img::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(15,23,32,0.15) 0%, rgba(15,23,32,0.65) 100%);
        }
        .landing-feature-img.feature-3d {
            background-image: radial-gradient(circle at 22% 28%, rgba(43,224,125,0.65) 0 6px, transparent 7px),
                              radial-gradient(circle at 52% 52%, rgba(43,224,125,0.55) 0 7px, transparent 8px),
                              radial-gradient(circle at 78% 34%, rgba(43,224,125,0.6) 0 6px, transparent 7px),
                              linear-gradient(135deg, #16202A 0%, #1B2632 55%, #0F1720 100%);
        }
        .landing-feature-img.feature-route {
            background-image: linear-gradient(115deg, rgba(9,13,26,0.05) 0 36%, rgba(9,13,26,0.42) 37% 100%),
                              url('https://images.unsplash.com/photo-1522163182402-834f871fd851?auto=format&fit=crop&w=900&q=80');
        }
        .landing-feature-img.feature-training {
            background-image: radial-gradient(circle at 18% 70%, rgba(43,224,125,0.6) 0 7px, transparent 8px),
                              radial-gradient(circle at 46% 34%, rgba(43,224,125,0.55) 0 7px, transparent 8px),
                              radial-gradient(circle at 78% 64%, rgba(43,224,125,0.65) 0 7px, transparent 8px),
                              linear-gradient(120deg, #16202A 0%, #1B2632 58%, #0F1720 100%);
        }
        .landing-feature-card .landing-feature-body { padding: 0 20px 20px; flex: 1; }
        .landing-feature-card h4 {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 700;
            font-size:18px;
            color: var(--text);
            margin: 0 0 8px 0;
        }
        .landing-feature-card p { color: var(--muted); font-size: 0.9rem; line-height: 1.5; margin: 0; }
        .landing-social {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-top: 40px;
            padding-right: 0;
        }
        .landing-social-link {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, opacity 0.2s;
        }
        .landing-social-link:hover, .landing-social-link:focus { opacity: 0.9; transform: scale(1.05); }
        .landing-social-link:active { transform: scale(0.98); }

        /* Language switcher */
        .lang-switcher { display: flex; gap: 0; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
        .lang-switcher button {
            min-height: var(--touch);
            padding: 10px 18px;
            background: var(--card);
            color: var(--muted);
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .lang-switcher button.active { background: var(--primary); color: var(--text-on-primary); font-weight: 600; }
        .lang-switcher button:active { opacity: 0.9; }
        .landing-hero .lang-switcher-hero {
            border-color: rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
        }
        .landing-hero .lang-switcher-hero button {
            color: rgba(255,255,255,0.9);
            background: transparent;
        }
        .landing-hero .lang-switcher-hero button.active {
            background: rgba(255,255,255,0.95);
            color: #0F1720;
        }

        /* User panel – search & favourites */
        .user-search-input { margin-top: 14px; margin-bottom: 0; min-height: 52px; font-size: 16px; }
        .user-main-tabs { display: flex; gap: 8px; margin: 8px 0 14px; }
        .user-main-tab {
            flex: 1;
            min-height: 46px;
            border: 1px solid var(--border);
            background: var(--card);
            border-radius: 12px;
            color: var(--muted);
            font-weight: 600;
            cursor: pointer;
        }
        .user-main-tab.active { border-color: var(--primary); color: var(--primary); }
        .user-main-section { display: none; }
        .user-main-section.active { display: block; }
        .profile-dashboard { margin-bottom: 18px; padding: 16px; display: block; }
        .profile-header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
        .profile-header h4 { margin: 0; font-size:18px; }
        .profile-max-grade { color: var(--primary); font-weight: 700; }
        .profile-kpis { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-bottom: 12px; }
        .profile-kpi { border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
        .profile-kpi b { display: block; font-size:18px; color: var(--text); }
        .profile-kpi span { font-size:13px; color: var(--muted); }
        .profile-list { display: flex; flex-direction: column; gap: 8px; }
        .profile-log { border: 1px solid var(--border); border-radius: 10px; padding: 10px; font-size: 0.9rem; }
        .profile-log small { color: var(--muted); }
        .profile-empty { color: var(--muted); font-size: 0.9rem; }
        .community-wrap { margin: 22px 0 8px; }
        .gym-progress-wrap { margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 10px; width: 100%; }
        .following-search { margin-top: 0; }
        .following-section-title { margin: 4px 0 10px; font-size: 1rem; color: var(--text); }
        .following-user-row { display:flex; justify-content:space-between; align-items:center; gap:10px; }
        .following-user-meta { display:flex; align-items:center; gap:10px; min-width:0; }

        // --- AUTH ---
        const USERNAME_PATTERN = /^[a-zA-Z0-9_.-]{3,20}$/;
        let usernameCheckTimer = null;
        let lastCheckedUsername = '';
        let lastUsernameAvailable = false;

        function normalizeUsername(v) {
            const raw = (v || '').trim();
            if (!raw) return '';
            const ascii = raw.normalize('NFKD').replace(/[̀-ͯ]/g, '');
            const compact = ascii.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_.-]/g, '');
            return compact;
        }
        function usernameLower(v) { return normalizeUsername(v).toLowerCase(); }
        function isValidUsername(v) { return USERNAME_PATTERN.test(normalizeUsername(v)); }
        function setUsernameStatus(message, kind = '') {
            const status = document.getElementById('username-status');
            if (!status) return;
            status.textContent = message || '';
            status.className = `username-hint${kind ? ` ${kind}` : ''}`;
        }

        function populateAdminColorOptions() {
            const colorSelect = document.getElementById('route-color');
            if (!colorSelect) return;
            const prevValue = colorSelect.value;
            colorSelect.innerHTML = AVAILABLE_COLORS.map(c => {
                const label = c.labels?.[currentLang] || c.labels?.it || c.value;
                return `<option value="${c.value}">● ${label}</option>`;
            }).join('');
            if (prevValue) {
                ensureRouteColorOption(prevValue);
                colorSelect.value = prevValue;
            }
        }

        function ensureRouteColorOption(colorValue) {
            const colorSelect = document.getElementById('route-color');
            if (!colorSelect || !colorValue) return;
            const exists = Array.from(colorSelect.options).some(opt => opt.value.toLowerCase() === colorValue.toLowerCase());
            if (exists) return;
            const legacy = document.createElement('option');
            legacy.value = colorValue;
            legacy.textContent = `● ${colorValue.toUpperCase()}`;
            colorSelect.appendChild(legacy);
        }
        async function checkUsernameAvailability(rawUsername) {
            const normalized = normalizeUsername(rawUsername);
            const lower = usernameLower(normalized);
            if (!normalized) {
                lastCheckedUsername = '';
                lastUsernameAvailable = false;
                setUsernameStatus(t('auth.usernameHint'));
                return { available: false, reason: 'empty' };
            }
            if (!isValidUsername(normalized)) {
                lastCheckedUsername = lower;
                lastUsernameAvailable = false;
                setUsernameStatus(t('auth.usernameInvalid'), 'error');
                return { available: false, reason: 'invalid' };
            }
            setUsernameStatus(t('auth.usernameChecking'));
            try {
                const qRef = query(collection(db, 'users'), where('usernameLower', '==', lower), limit(1));
                const snap = await getDocs(qRef);
                const taken = !snap.empty;
                lastCheckedUsername = lower;
                lastUsernameAvailable = !taken;
                setUsernameStatus(taken ? t('auth.usernameTaken') : t('auth.usernameAvailable'), taken ? 'error' : 'ok');
                return { available: !taken, reason: taken ? 'taken' : 'ok' };
            } catch (_) {
                setUsernameStatus(t('auth.usernameHint'));
                return { available: true, reason: 'skip' };
            }
        }
        function resolveUsername(userId, fallbackName = 'Climber') {
            if (userId && lastUsersSnap) {
                const found = lastUsersSnap.docs.find(d => d.id === userId);
                if (found) {
                    const data = found.data() || {};
                    if (data.username) return data.username;
                }
            }
            return fallbackName;
        }

        const usernameInput = document.getElementById('f-name');
        if (usernameInput) {
            usernameInput.addEventListener('input', () => {
                const isReg = document.getElementById('reg-fields')?.style.display !== 'none';
                if (!isReg) return;
                if (usernameCheckTimer) clearTimeout(usernameCheckTimer);
                usernameCheckTimer = setTimeout(() => {
                    const normalized = normalizeUsername(usernameInput.value);
                    if (normalized !== usernameInput.value) usernameInput.value = normalized;
                    checkUsernameAvailability(usernameInput.value).catch(() => setUsernameStatus(t('auth.usernameInvalid'), 'error'));
                }, 320);
            });
            usernameInput.addEventListener('blur', () => {
                const isReg = document.getElementById('reg-fields')?.style.display !== 'none';
                if (!isReg) return;
                const normalized = normalizeUsername(usernameInput.value);
                if (normalized !== usernameInput.value) usernameInput.value = normalized;
                checkUsernameAvailability(usernameInput.value).catch(() => setUsernameStatus(t('auth.usernameInvalid'), 'error'));
            });
        }

        window.toggleAuthMode = () => {

        document.getElementById('auth-btn').onclick = async () => {

                    if (!username) throw new Error(t('errors.usernameRequired'));
                    if (!isValidUsername(username)) throw new Error(t('errors.usernameInvalid'));
                    const lower = usernameLower(username);
                    let cleanGymId = role === 'admin' ? gymName.trim().replace(/\s+/g, '-') : null;
                    const res = await createUserWithEmailAndPassword(auth, email, pass);

                    } catch (e) {
                        try { await deleteUser(res.user); } catch (_) {}

        function parseGradeSystemInput(text) {

        async function saveGymGradeSystem(gymId, text) {
            const rows = parseGradeSystemInput(text);
            if (!rows.length) throw new Error('Inserisci almeno un grado.');
            const unique = new Set(rows.map(r => r.label.toLowerCase()));
            if (unique.size !== rows.length) throw new Error('I gradi devono essere univoci.');
            const snap = await getDoc(doc(db, 'gyms', gymId));
            const gymData = snap.exists() ? (snap.data() || {}) : {};
            if (gymData.gradeSystemLocked && gymData.gradeSystemConfigured) throw new Error('Sistema gradi bloccato.');
            await setDoc(doc(db, 'gyms', gymId), { gradeSystem: rows, gradeSystemConfigured: true }, { merge: true });

        function isPermissionDeniedError(err) {

        function formatProfileDate(v) {
            if (!v) return '';
            const d = new Date(v);
            if (Number.isNaN(d.getTime())) return v;
            return d.toLocaleDateString(currentLang === 'it' ? 'it-IT' : 'en-US');
        }

        function areConsecutiveDays(prevYmd, nextYmd) {
            if (!prevYmd || !nextYmd) return false;
            const p = new Date(`${prevYmd}T00:00:00`);
            const n = new Date(`${nextYmd}T00:00:00`);
            if (Number.isNaN(p.getTime()) || Number.isNaN(n.getTime())) return false;
            const diff = Math.round((n.getTime() - p.getTime()) / (24*60*60*1000));
            return diff === 1;
        }

        async function upsertUserGymStats(userId, gymId, gymName, grade, gradeOrder, attempts = 1) {
            if (!userId || !gymId) return { isNewMax: false, streakDays: 0 };
            const statsRef = doc(db, 'users', userId, 'gymStats', gymId);
            const snap = await getDoc(statsRef);
            const prev = snap.exists() ? (snap.data() || {}) : {};
            const today = toYYYYMMDD(new Date());
            const prevOrder = Number.isFinite(prev.max_grade_order) ? prev.max_grade_order : -1;
            const nextOrder = Number.isFinite(gradeOrder) ? gradeOrder : prevOrder;
            const isNewMax = Number.isFinite(nextOrder) && nextOrder > prevOrder;
            const prevStreak = Number(prev.streak_days || 0);
            const streakDays = prev.last_activity_day === today
                ? Math.max(1, prevStreak)
                : areConsecutiveDays(prev.last_activity_day, today) ? Math.max(1, prevStreak + 1) : 1;
            const payload = {
                user_id: userId,
                gym_id: gymId,
                gym_name: gymName || gymId,
                max_grade: isNewMax ? (grade || prev.max_grade || '-') : (prev.max_grade || grade || '-'),
                max_grade_order: isNewMax ? nextOrder : prevOrder,
                total_routes: Number(prev.total_routes || 0) + 1,
                active_days: prev.last_activity_day === today ? Number(prev.active_days || 1) : Number(prev.active_days || 0) + 1,
                streak_days: streakDays,
                last_activity_day: today,
                updated_at: new Date().toISOString()
            };
            await setDoc(statsRef, payload, { merge: true });
            await setDoc(doc(db, 'users', userId), {
                mainGymName: prev.gym_name || gymName || gymId,
                mainGymMaxGrade: payload.max_grade
            }, { merge: true });
            return { isNewMax, streakDays };
        }

                last_viewed_at: new Date().toISOString()
            });
        }
        function getPublicProfileUidFromRoute() {

            const raw = hash.slice(SOCIAL_PROFILE_ROUTE_PREFIX.length).split('/')[0].trim();
            if (!raw) return null;

        function setPublicProfileRoute(uid, opts = {}) {

            if (window.location.hash === nextHash) return;

        async function handlePublicProfileRoute() {
            const uid = getPublicProfileUidFromRoute();
            if (!activeUser) return;
            if (!uid) {
                if ((window.location.hash || '').startsWith('#/social')) {
                    setUserMainTab('social');
                    setSocialSubView('main');

        function normalizeLevelValue(v) {
            return String(v || '').trim();
        }

        function gradeOrderForEntry(entry, orderMap) {
            if (Number.isFinite(entry?.gradeOrder)) return Number(entry.gradeOrder);
            if (!orderMap) return -1;
            const val = normalizeLevelValue(entry?.grade);
            return orderMap.has(val) ? orderMap.get(val) : -1;
        }

        function gradeSystemArrayToMap(gradeSystem) {
            const map = new Map();
            (Array.isArray(gradeSystem) ? gradeSystem : []).forEach(item => {
                const label = normalizeLevelValue(item?.label);
                const order = Number(item?.order);
                if (label && Number.isFinite(order)) map.set(label, order);
            });
            return map;
        }

        function normalizeProgressValue(localRank, scaleSize) {
            if (localRank < 0 || !scaleSize || scaleSize <= 1) return 0;
            return localRank / (scaleSize - 1);
        }

        function computeProfileData(entries) {
            const sorted = entries.slice().sort((a, b) => new Date(b.sendDate || b.date || 0) - new Date(a.sendDate || a.date || 0));
            const daySet = new Set(sorted.map(e => e.sendDate || '').filter(Boolean));
            const gymSet = new Set(sorted.map(e => e.gymName || '').filter(Boolean));

            const groups = new Map();
            for (const e of sorted) {
                const gk = e.gymId || e.gymName || 'unknown';
                if (!groups.has(gk)) groups.set(gk, []);
                groups.get(gk).push(e);
            }

            let globalMaxNorm = -1;
            let globalMaxLabel = '-';
            const byGym = [];
            const enriched = [];

            for (const [gymKey, gymEntries] of groups.entries()) {
                const gymId = gymEntries[0]?.gymId;
                const orderMap = gymId ? gymLevelOrderMap.get(gymId) : null;
                const scaleSize = Math.max(2, (orderMap?.size || 1));
                let localMaxRank = -1;
                let localMaxLabel = '-';
                for (const e of gymEntries) {
                    const rank = gradeOrderForEntry(e, orderMap);
                    const norm = normalizeProgressValue(rank, scaleSize);
                    enriched.push({ ...e, _rank: rank, _norm: norm, _gymKey: gymKey });
                    if (rank > localMaxRank) {
                        localMaxRank = rank;
                        localMaxLabel = normalizeLevelValue(e.grade) || '-';
                    }
                    if (norm > globalMaxNorm) {
                        globalMaxNorm = norm;
                        globalMaxLabel = normalizeLevelValue(e.grade) || '-';
                    }
                }
                byGym.push({ gymName: gymEntries[0]?.gymName || gymKey, localMax: localMaxLabel });
            }

            const normPct = Math.max(0, Math.round((globalMaxNorm < 0 ? 0 : globalMaxNorm) * 100));
            const atMaxCount = enriched.filter(e => Math.abs(e._norm - globalMaxNorm) < 1e-6).length;
            const targetAtMax = 5;
            const progressPct = Math.max(0, Math.min(100, Math.round((atMaxCount / targetAtMax) * 100)));

            const ascByDate = enriched.slice().sort((a, b) => new Date(a.sendDate || a.date || 0) - new Date(b.sendDate || b.date || 0));
            let bestNorm = -1;
            const milestones = [];
            for (const e of ascByDate) {
                if (e._norm > bestNorm) {
                    bestNorm = e._norm;
                    milestones.push({ label: normalizeLevelValue(e.grade) || '-', normPct: Math.round(e._norm * 100), date: e.sendDate || e.date || '' });
                }
            }

            return {
                sorted,
                totalSends: sorted.length,
                activeDays: daySet.size,
                reviewedGyms: gymSet.size,
                globalMaxLabel,
                globalMaxNormPct: normPct,
                atMaxCount,
                targetAtMax,
                progressPct,
                milestones,
                byGym
            };
        }

            box.innerHTML = `

                        ${spark}

                        </div>
                    </div>
                </div>
            `;
        }
        function followDocId(followerId, followingId) { return `${followerId}__${followingId}`; }

        async function toggleFollowUser(targetUid) {
            if (!activeUser) { alert(t('errors.authRequired')); return; }
            if (!targetUid || targetUid === activeUser.uid) return;
            const isFollowing = userFollowingIds.includes(targetUid);
            const followRef = doc(db, 'follows', followDocId(activeUser.uid, targetUid));

                if (typeof unsub === 'function') unsub();
            }
            stopSocialFeedSubscription();
            stopMyPostsSubscription();

        function stopMyPostsSubscription() {
            while (socialMyPostsUnsubscribers.length) {
                const unsub = socialMyPostsUnsubscribers.pop();
                if (typeof unsub === 'function') unsub();

            socialMyPostsActivities = [];

            socialMyPostsError = null;

        function startMyPostsSubscription() {
            stopMyPostsSubscription();
            if (!activeUser?.uid) {
                renderMyPublicationsFeed();
                return;
            }
            socialMyPostsLoading = true;
            socialMyPostsError = null;
            renderMyPublicationsFeed();

            const byUserId = query(collection(db, 'socialActivities'), where('user_id', '==', activeUser.uid), limit(250));
            const byLegacyUserId = query(collection(db, 'socialActivities'), where('userId', '==', activeUser.uid), limit(250));
            let primaryRows = [];
            let legacyRows = [];

            const applyMerged = () => {
                const merged = new Map();
                [...primaryRows, ...legacyRows].forEach(item => merged.set(item.id, item));
                socialMyPostsActivities = Array.from(merged.values()).sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
                socialMyPostsLoading = false;
                renderMyPublicationsFeed();
            };

            const unsubPrimary = onSnapshot(byUserId, (snap) => {
                primaryRows = snap.docs.map(d => ({ id: d.id, ...(d.data() || {}) }));
                applyMerged();
            }, (err) => {
                socialMyPostsError = err;
                socialMyPostsLoading = false;
                socialMyPostsActivities = socialFeedActivities.filter(a => (a.user_id || a.userId || null) === activeUser.uid);
                renderMyPublicationsFeed();
            });

            const unsubLegacy = onSnapshot(byLegacyUserId, (snap) => {
                legacyRows = snap.docs.map(d => ({ id: d.id, ...(d.data() || {}) }));
                applyMerged();
            }, (err) => {
                socialMyPostsError = err;
                socialMyPostsLoading = false;
                socialMyPostsActivities = socialFeedActivities.filter(a => (a.user_id || a.userId || null) === activeUser.uid);
                renderMyPublicationsFeed();
            });

            socialMyPostsUnsubscribers.push(unsubPrimary, unsubLegacy);
        }

        function stopSocialFeedSubscription() {
            if (typeof socialFeedUnsubscriber === 'function') socialFeedUnsubscriber();
            socialFeedUnsubscriber = null;
            socialFeedActivities = [];
            socialFeedError = null;

        function startSocialFeedSubscription() {
            stopSocialFeedSubscription();
            socialFeedUnsubscriber = onSnapshot(query(collection(db, 'socialActivities'), limit(250)), (snap) => {
                socialFeedError = null;
                socialFeedActivities = snap.docs.map(d => ({ id: d.id, ...(d.data() || {}) }));

        function buildFollowingFeedItems() {
            const selectedGym = socialSelectedGymId || document.getElementById('social-gym-filter')?.value || null;
            const followed = new Set(userFollowingIds || []);
            const buildFallbackActivityId = (v) => `fallback__${v.userId || 'u'}__${v.routeId || 'r'}__${v.eventDate || v.updatedAt || ''}`;
            const community = socialFeedActivities.filter(a => selectedGym && a.gym_id === selectedGym);
            const friends = socialFeedActivities.filter(a => followed.has(a.user_id));
            const fallbackFriends = Array.from(followingFeedMap.values()).map(v => {
                const fallbackId = buildFallbackActivityId(v);
                const localState = socialFeedInteractionState.get(fallbackId) || {};
                return ({
                id: fallbackId,
                user_id: v.userId,
                user_name: v.username || v.userName || 'Climber',
                gym_id: v.gymId,
                gym_name: v.gymName || v.gymId,
                activity_type: v.state === 'project' ? 'streak' : 'route',
                grade: v.finalGrade || v.routeGrade || '-',
                attempts: v.attemptCount || 1,
                timestamp: v.eventDate || v.updatedAt || v.completionDate || v.firstAttemptDate || '',
                is_new_max: false,
                streak_days: null,
                applause_count: Number(localState.applause_count || 0),
                comment_count: Number(localState.comment_count || 0),
                is_fallback: true
            });
            });
            const merged = [...fallbackFriends.filter(f => followed.has(f.user_id)), ...community, ...friends];
            const uniq = new Map();
            merged.forEach(a => uniq.set(a.id, a));
            return Array.from(uniq.values()).sort((a,b) => {
                if (!!b.is_new_max !== !!a.is_new_max) return b.is_new_max ? 1 : -1;
                return new Date(b.timestamp || 0) - new Date(a.timestamp || 0);
            });
        }

        function updateLocalInteractionState(activityId, patch = {}) {
            if (!activityId) return;
            const current = socialFeedInteractionState.get(activityId) || {};
            socialFeedInteractionState.set(activityId, { ...current, ...patch });
        }

        async function ensureSocialActivityDoc(activityId) {
            if (!activityId) return null;
            const activityRef = doc(db, 'socialActivities', activityId);
            const snap = await getDoc(activityRef);
            if (snap.exists()) return activityRef;
            const fallback = socialFeedById.get(activityId) || {};
            await setDoc(activityRef, {
                user_id: fallback.user_id || activeUser?.uid || null,
                user_name: fallback.user_name || resolveUsername(fallback.user_id, 'Climber') || 'Climber',
                gym_id: fallback.gym_id || null,
                gym_name: fallback.gym_name || fallback.gym_id || '-',
                activity_type: fallback.activity_type || 'route',
                grade: fallback.grade || '-',
                attempts: fallback.attempts || 1,
                timestamp: fallback.timestamp || new Date().toISOString(),
                is_new_max: !!fallback.is_new_max,
                streak_days: fallback.streak_days || null,
                applause_count: Number(fallback.applause_count || 0),
                comment_count: Number(fallback.comment_count || 0)
            }, { merge: true });
            return activityRef;
        }

        async function preloadApplauseState(activityId) {
            if (!activeUser || !activityId) return false;
            if (socialApplauseByActivity.has(activityId) || socialApplauseLoadingIds.has(activityId)) {
                return !!socialApplauseByActivity.get(activityId);
            }
            socialApplauseLoadingIds.add(activityId);
            try {
                const ref = doc(db, 'socialActivities', activityId, 'applause', activeUser.uid);
                const snap = await getDoc(ref);
                socialApplauseByActivity.set(activityId, snap.exists());
                return snap.exists();
            } finally {
                socialApplauseLoadingIds.delete(activityId);
            }
        }

        function getActivityApplauseCount(activityId, fallback = 0) {
            return Number(socialFeedInteractionState.get(activityId)?.applause_count ?? socialFeedById.get(activityId)?.applause_count ?? fallback ?? 0);
        }

        async function toggleActivityApplause(activityId) {
            if (!activeUser || !activityId) return;
            const activityRef = await ensureSocialActivityDoc(activityId);
            const ref = doc(db, 'socialActivities', activityId, 'applause', activeUser.uid);
            let wasApplauded = socialApplauseByActivity.get(activityId);
            if (typeof wasApplauded !== 'boolean') {
                const snap = await getDoc(ref);
                wasApplauded = snap.exists();
            }
            const currentApplause = getActivityApplauseCount(activityId, 0);
            const nextApplause = wasApplauded ? Math.max(0, currentApplause - 1) : currentApplause + 1;

            socialApplauseByActivity.set(activityId, !wasApplauded);
            updateLocalInteractionState(activityId, { applause_count: nextApplause });
            socialMyPostsInteractionMeta.delete(activityId);
            renderFollowingFeed();
            renderMyPublicationsFeed();

            try {
                if (wasApplauded) {
                    await deleteDoc(ref);
                    await updateDoc(activityRef, { applause_count: increment(-1), last_interaction_at: new Date().toISOString() });
                } else {
                    await setDoc(ref, { user_id: activeUser.uid, timestamp: new Date().toISOString() }, { merge: true });
                    await updateDoc(activityRef, { applause_count: increment(1), last_interaction_at: new Date().toISOString() });
                }
            } catch (e) {
                socialApplauseByActivity.set(activityId, wasApplauded);
                updateLocalInteractionState(activityId, { applause_count: currentApplause });
                renderFollowingFeed();
                renderMyPublicationsFeed();
                throw e;
            }
        }

        async function addActivityComment(activityId, textValue = null) {
            if (!activeUser || !activityId) return;
            const text = (textValue ?? '').trim();
            if (!text) return;
            const activityRef = await ensureSocialActivityDoc(activityId);
            const nowIso = new Date().toISOString();
            await addDoc(collection(db, 'socialActivities', activityId, 'comments'), {
                user_id: activeUser.uid,
                user_name: currentUserName || 'Climber',
                text,
                timestamp: nowIso
            });
            await updateDoc(activityRef, { comment_count: increment(1), last_interaction_at: nowIso });
            const currentComments = Number(socialFeedById.get(activityId)?.comment_count || socialFeedInteractionState.get(activityId)?.comment_count || 0);
            updateLocalInteractionState(activityId, { comment_count: currentComments + 1 });
            socialMyPostsInteractionMeta.delete(activityId);
            renderFollowingFeed();
            renderMyPublicationsFeed();
        }

        function sanitizeSocialCount(value) {
            return Math.max(0, Number(value || 0));
        }

        function renderSocialFeedCard(activity) {
            const e = activity || {};
            const ts = escapeHtml(formatProfileDate(e.timestamp || e.sendDate || ''));
            const recent24 = (Date.now() - new Date(e.timestamp || 0).getTime()) <= (24*60*60*1000);
            const applauseCount = sanitizeSocialCount(getActivityApplauseCount(e.id, e.applause_count));
            const commentCount = sanitizeSocialCount(socialFeedInteractionState.get(e.id)?.comment_count ?? e.comment_count);
            const isApplauded = !!socialApplauseByActivity.get(e.id);
            const actionButtons = `<div class="social-feed-actions"><button class="social-action-btn ${isApplauded ? 'active' : ''}" data-action="applause" data-id="${e.id}">🔥 ${applauseCount}</button><button class="social-action-btn" data-action="comment" data-id="${e.id}">💬 ${commentCount}</button></div>`;
            if (e.activity_type === 'new_max') {
                return `<div class="social-feed-card ${recent24 ? 'highlight' : ''}"><div class="social-feed-head"><div class="social-feed-title">🔥 Nuovo massimo personale!</div><small>${ts}</small></div><div class="social-feed-grade">${escapeHtml(e.grade || '-')}</div><div class="social-feed-meta">${escapeHtml(e.user_name || 'Climber')} · ${escapeHtml(e.gym_name || e.gym_id || '-')}</div>${actionButtons}</div>`;
            }
            if (e.activity_type === 'streak') {
                return `<div class="social-feed-card highlight"><div class="social-feed-head"><div class="social-feed-title">🔁 ${escapeHtml(e.user_name || 'Climber')} è a ${e.streak_days || 1} giorni consecutivi</div><small>${ts}</small></div><div class="social-feed-meta">${escapeHtml(e.gym_name || e.gym_id || '-')}</div>${actionButtons}</div>`;
            }
            return `<div class="social-feed-card"><div class="social-feed-head"><div class="social-feed-title">${escapeHtml(e.user_name || 'Climber')} ha scalato ${escapeHtml(e.grade || '-')} a ${escapeHtml(e.gym_name || e.gym_id || '-')}</div><small>${ts}</small></div><div class="social-feed-meta">Tentativi: ${e.attempts || 1}</div>${actionButtons}</div>`;
        }

        function bindSocialFeedActions(root) {
            if (!root) return;
            root.querySelectorAll('[data-action="applause"]').forEach(btn => {
                preloadApplauseState(btn.dataset.id).then(() => {
                    btn.classList.toggle('active', !!socialApplauseByActivity.get(btn.dataset.id));
                }).catch(() => {});
                btn.onclick = () => toggleActivityApplause(btn.dataset.id).catch(alertWriteError);
            });
            root.querySelectorAll('[data-action="comment"]').forEach(btn => btn.onclick = () => openSocialCommentsModal(btn.dataset.id).catch(alertWriteError));
        }

        async function loadMyPostInteractionMeta(activityId) {
            if (!activityId || socialMyPostsInteractionMeta.get(activityId)?.loading) return;
            const current = socialMyPostsInteractionMeta.get(activityId) || {};
            socialMyPostsInteractionMeta.set(activityId, { ...current, loading: true });
            try {
                const commentsRef = collection(db, 'socialActivities', activityId, 'comments');
                const commentsSnap = await getDocs(query(commentsRef, orderBy('timestamp', 'desc'), limit(2)));
                const latestCommentSnap = await getDocs(query(commentsRef, orderBy('timestamp', 'desc'), limit(1)));
                const applauseSnap = await getDocs(query(collection(db, 'socialActivities', activityId, 'applause'), orderBy('timestamp', 'desc'), limit(1)));
                const latestComments = commentsSnap.docs.map(d => ({ id: d.id, ...(d.data() || {}) }));
                const latestCommentTs = latestCommentSnap.docs[0]?.data()?.timestamp || null;
                const latestApplauseTs = applauseSnap.docs[0]?.data()?.timestamp || null;
                const source = socialMyPostsActivities.find(a => a.id === activityId) || socialFeedById.get(activityId) || {};
                const lastViewed = source.last_viewed_at || null;
                const lastInteractionTs = [latestCommentTs, latestApplauseTs].filter(Boolean).sort().slice(-1)[0] || null;
                const hasNew = !!(lastInteractionTs && (!lastViewed || new Date(lastInteractionTs).getTime() > new Date(lastViewed).getTime()));
                socialMyPostsInteractionMeta.set(activityId, { loading: false, latestComments, latestCommentTs, latestApplauseTs, hasNew });
                renderMyPublicationsFeed();
            } catch (_) {
                socialMyPostsInteractionMeta.set(activityId, { ...(socialMyPostsInteractionMeta.get(activityId) || {}), loading: false });
            }
        }

        async function markMyPostViewed(activityId) {
            if (!activityId || !activeUser?.uid) return;
            const row = socialMyPostsActivities.find(a => a.id === activityId);
            if (!row || (row.user_id || row.userId) !== activeUser.uid) return;
            const nowIso = new Date().toISOString();
            await updateDoc(doc(db, 'socialActivities', activityId), { last_viewed_at: nowIso });
            socialMyPostsActivities = socialMyPostsActivities.map(a => a.id === activityId ? { ...a, last_viewed_at: nowIso } : a);
            const meta = socialMyPostsInteractionMeta.get(activityId) || {};
            socialMyPostsInteractionMeta.set(activityId, { ...meta, hasNew: false });
        }

        async function deleteMyPost(activityId) {
            if (!activityId || !activeUser?.uid) return;
            const row = socialMyPostsActivities.find(a => a.id === activityId);
            if (!row || (row.user_id || row.userId) !== activeUser.uid) return;
            if (!confirm('Eliminare questa pubblicazione?')) return;
            await deleteDoc(doc(db, 'socialActivities', activityId));
            socialMyPostsActivities = socialMyPostsActivities.filter(a => a.id !== activityId);
            socialMyPostsInteractionMeta.delete(activityId);
            socialMyPostsExpanded.delete(activityId);
            renderMyPublicationsFeed();
            renderFollowingFeed();
        }

        async function deleteActivityComment(activityId, commentId) {
            if (!activityId || !commentId || !activeUser?.uid) return;
            const row = socialMyPostsActivities.find(a => a.id === activityId) || socialFeedById.get(activityId);
            if (!row || (row.user_id || row.userId) !== activeUser.uid) return;
            await deleteDoc(doc(db, 'socialActivities', activityId, 'comments', commentId));
            const activityRef = await ensureSocialActivityDoc(activityId);
            await updateDoc(activityRef, { comment_count: increment(-1) });
            const currentComments = Number(socialFeedById.get(activityId)?.comment_count || socialFeedInteractionState.get(activityId)?.comment_count || 0);
            updateLocalInteractionState(activityId, { comment_count: Math.max(0, currentComments - 1) });
            socialMyPostsInteractionMeta.delete(activityId);
            renderMyPublicationsFeed();
            renderFollowingFeed();
        }

        function renderMyPublicationCard(e) {
            const ts = escapeHtml(formatProfileDate(e.timestamp || e.sendDate || ''));
            const applauseCount = sanitizeSocialCount(getActivityApplauseCount(e.id, e.applause_count));
            const commentCount = sanitizeSocialCount(socialFeedInteractionState.get(e.id)?.comment_count ?? e.comment_count);
            const totalInteractions = applauseCount + commentCount;
            const meta = socialMyPostsInteractionMeta.get(e.id) || {};
            if (!meta.loading && !meta.latestComments) loadMyPostInteractionMeta(e.id);
            const hasNew = !!meta.hasNew;
            const expanded = socialMyPostsExpanded.has(e.id);
            const latestComments = Array.isArray(meta.latestComments) ? meta.latestComments : [];
            const previewRows = latestComments.slice(0, 2).map(c => {
                const canDelete = ((e.user_id || e.userId || null) === activeUser?.uid);
                return `<div class="profile-log"><div><b>${escapeHtml(c.user_name || resolveUsername(c.user_id, 'Climber') || 'Climber')}</b></div><div>${escapeHtml(c.text || '')}</div><small>${escapeHtml(formatProfileDate(c.timestamp || ''))}</small>${canDelete ? `<div style="margin-top:6px;"><button type="button" class="btn-sec" data-action="delete-comment" data-activity-id="${e.id}" data-comment-id="${c.id}">Elimina commento</button> <button type="button" class="btn-sec" data-action="reply-comment" data-activity-id="${e.id}" data-username="${escapeHtml(c.user_name || 'Climber')}">Rispondi</button></div>` : ''}</div>`;
            }).join('') || '<p class="profile-empty">Nessun commento.</p>';
            const newBadge = hasNew ? '<span class="social-chip new">Nuovo</span>' : '';
            const maxBadge = e.is_new_max ? '<span class="social-chip">🔥 Nuovo massimo</span>' : '';
            return `<div class="social-feed-card ${totalInteractions > 5 ? 'engaged' : ''}" data-my-post-id="${e.id}"><div class="social-feed-head"><div class="social-feed-title">Hai scalato ${escapeHtml(e.grade || '-')} a ${escapeHtml(e.gym_name || e.gym_id || '-')}</div><div style="display:flex;gap:6px;align-items:center;">${newBadge}${maxBadge}<small>${ts}</small></div></div><div class="social-feed-meta">Tentativi: ${e.attempts || 1}</div><div class="social-feed-actions"><button class="social-action-btn ${socialApplauseByActivity.get(e.id) ? 'active' : ''}" data-action="applause" data-id="${e.id}">🔥 ${applauseCount} applausi</button><button class="social-action-btn" data-action="comment" data-id="${e.id}">💬 ${commentCount} commenti</button><button class="social-action-btn" data-action="toggle-comments" data-id="${e.id}">${expanded ? 'Nascondi commenti' : 'Mostra commenti'}</button><button class="social-action-btn" data-action="delete-post" data-id="${e.id}">Elimina post</button></div><div class="social-my-comments-preview" style="display:${expanded ? 'block' : 'none'};">${previewRows}<button type="button" class="btn-sec" data-action="open-all-comments" data-id="${e.id}">Mostra tutti i commenti</button></div></div>`;
        }

        function renderMyPublicationsFeed() {
            const myList = document.getElementById('social-my-posts-list');
            if (!myList) return;
            if (!activeUser?.uid) {
                myList.innerHTML = '<p class="profile-empty">Accedi per vedere le tue pubblicazioni.</p>';
                return;
            }
            if (socialMyPostsLoading) {
                myList.innerHTML = '<p class="profile-empty">Caricamento pubblicazioni...</p>';
                return;
            }
            const feed = socialMyPostsActivities
                .filter(a => (a.user_id || a.userId || null) === activeUser.uid)
                .sort((a,b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
            if (socialMyPostsError && !feed.length) {
                myList.innerHTML = '<p class="profile-empty">Impossibile caricare le tue pubblicazioni.</p>';
                return;
            }
            myList.innerHTML = feed.map(renderSocialFeedCard).join('') || '<p class="profile-empty">Scala una via per comparire nel feed</p>';
            bindSocialFeedActions(myList);
        }

        function renderFollowingFeed() {
            const progList = document.getElementById('following-progress-list');
            if (!progList) return;
            const feed = buildFollowingFeedItems();
            socialFeedById = new Map(feed.map(e => [e.id, e]));
            const lastMine = feed.filter(a => a.user_id === activeUser?.uid).sort((a,b)=> new Date(b.timestamp||0)-new Date(a.timestamp||0))[0];
            const mineInactive = !lastMine || ((Date.now() - new Date(lastMine.timestamp || 0).getTime()) > (7*24*60*60*1000));
            const recentFriendCount = new Set(feed.filter(a => userFollowingIds.includes(a.user_id) && (Date.now()-new Date(a.timestamp||0).getTime()) <= (7*24*60*60*1000)).map(a => a.user_id)).size;
            const inactivityMsg = mineInactive && recentFriendCount > 0 ? `<div class="profile-log" style="margin-bottom:10px;">${recentFriendCount} amici hanno scalato questa settimana</div>` : '';
            const rulesWarn = socialFeedError && isPermissionDeniedError(socialFeedError) ? `<div class="profile-log" style="margin-bottom:10px;">Permessi feed limitati: mostra attività condivise degli amici.</div>` : '';

            progList.innerHTML = rulesWarn + inactivityMsg + (feed.slice(0, 60).map(renderSocialFeedCard).join('') || `<p class="profile-empty">${t('dash.noFollowingProgress')}</p>`);
            bindSocialFeedActions(progList);
        }

        function syncFollowingProgressSubscriptions() {
            while (followingProgressUnsubscribers.length) {
                const unsub = followingProgressUnsubscribers.pop();
                if (typeof unsub === 'function') unsub();
            }
            followingFeedMap = new Map();
            startSocialFeedSubscription();
            startMyPostsSubscription();

            const followed = [...new Set(userFollowingIds)].filter(Boolean);
            followed.forEach(uid => {
                const qRef = query(collection(db, 'users', uid, 'routeProgress'), where('shareOnFeed', '==', true));
                const unsub = onSnapshot(qRef, (snap) => {
                    for (const key of Array.from(followingFeedMap.keys())) {
                        if (key.startsWith(`${uid}__`)) followingFeedMap.delete(key);
                    }
                    snap.forEach(d => {
                        const v = d.data() || {};
                        followingFeedMap.set(`${uid}__${d.id}`, {
                            ...v,
                            userId: uid,
                            username: resolveUsername(uid, v.userName || 'Climber'),
                            eventDate: v.completionDate || v.firstAttemptDate || v.updatedAt || v.sendDate || ''
                        });
                    });
                    renderFollowingFeed();
                });
                followingProgressUnsubscribers.push(unsub);
            });
        }

        async function searchUsersByUsername(queryText) {
            if (!lastUsersSnap) return [];
            const q = (queryText || '').trim().toLowerCase();
            if (!q) return [];
            const users = [];
            lastUsersSnap.forEach(d => users.push({ id: d.id, ...d.data() }));
            return users.filter(u => u.id !== activeUser?.uid && ((u.usernameLower || (u.username || '').toLowerCase()).includes(q))).slice(0, 20);
        }

        async function getFollowingSharedProgress() {
            syncFollowingProgressSubscriptions();
            return buildFollowingFeedItems();
        }

        async function safeGetDocs(qRef, fallback = null) {
            try {
                return await getDocs(qRef);
            } catch (e) {
                if (isPermissionDeniedError(e)) return fallback;
                throw e;
            }
        }

        async function getFollowCounts(uid) {
            const [followersSnap, followingSnap] = await Promise.all([
                safeGetDocs(query(collection(db, 'follows'), where('followingId', '==', uid))),
                safeGetDocs(query(collection(db, 'follows'), where('followerId', '==', uid)))
            ]);
            return { followers: followersSnap?.size || 0, following: followingSnap?.size || 0 };
        }

        async function getPublicFeedbackCount(uid) {
            const fb = await safeGetDocs(query(collectionGroup(db, 'reviews'), where('userId', '==', uid), limit(50)));
            return fb?.size || 0;
        }

        async function openPublicProfile(uid, opts = {}) {
            if (!uid) return;
            setUserMainTab('social');
            setSocialSubView('profile');
            if (opts.updateRoute !== false) setPublicProfileRoute(uid);
            try {
                await renderPublicProfile(uid);
            } catch (e) {
                alertWriteError(e);
                return;
            }
            const wrap = document.getElementById('social-public-profile');
            if (wrap) wrap.scrollIntoView({ behavior: opts.smooth === false ? 'auto' : 'smooth', block: 'start' });
            if (opts.closeModal) window.closeSocialListModal();
        }

        async function renderPublicProfile(uid) {
            const wrap = document.getElementById('social-public-profile');
            if (!wrap || !uid) return;
            let data = null;
            if (lastUsersSnap) {
                const snap = lastUsersSnap.docs.find(d => d.id === uid);
                if (snap) data = snap.data() || {};
            }
            if (!data) {
                const direct = await getDoc(doc(db, 'users', uid));
                if (!direct.exists()) return;
                data = direct.data() || {};
            }

            const username = data.username || 'Climber';
            const avatar = data.avatarUrl ? `<img class="social-public-avatar" src="${escapeHtml(data.avatarUrl)}" alt="">` : `<div class="social-public-avatar">${escapeHtml((username || 'U').slice(0,2).toUpperCase())}</div>`;
            const counts = await getFollowCounts(uid);
            const isFollowing = userFollowingIds.includes(uid);

            const statsSnap = await safeGetDocs(query(collection(db, 'users', uid, 'gymStats'), limit(30)));
            const stats = statsSnap ? statsSnap.docs.map(d => ({ id: d.id, ...(d.data() || {}) })) : [];
            const mainGym = stats[0]?.gym_name || data.mainGymName || data.gymManaged || '-';
            const streakNow = Math.max(0, ...stats.map(s => Number(s.streak_days || 0)));
            const totalRoutes = stats.reduce((a,s)=> a + Number(s.total_routes || 0), 0);
            const activeDays = stats.reduce((a,s)=> a + Number(s.active_days || 0), 0);
            const maxByGym = stats.map(s => `<div class="profile-timeline-row" style="${(activeGymDetailId && s.gym_id===activeGymDetailId) ? 'border-color:var(--primary);' : ''}"><b>${escapeHtml(s.gym_name || s.gym_id || '-')}</b><small>${escapeHtml(s.max_grade || '-')}</small></div>`).join('');

            const actsSnap = await safeGetDocs(query(collection(db, 'socialActivities'), where('user_id', '==', uid), limit(20)));
            const acts = actsSnap ? actsSnap.docs.map(d => d.data() || {}).sort((a,b)=> new Date(b.timestamp||0)-new Date(a.timestamp||0)) : [];
            const latestRows = acts.slice(0,8).map(a => `<div class="profile-log"><div><b>${escapeHtml(a.grade || (a.activity_type==='streak' ? `🔁 ${a.streak_days || 1} giorni` : '-'))}</b> · ${escapeHtml(a.gym_name || a.gym_id || '-')}</div><small>${escapeHtml(formatProfileDate(a.timestamp || ''))} · ${escapeHtml(a.activity_type || 'route')}</small></div>`).join('');

            wrap.style.display = 'block';
            wrap.innerHTML = `
                <div class="social-public-header">
                    ${avatar}
                    <div style="min-width:0; flex:1;">
                        <b>${escapeHtml(username)}</b>
                        <div style="color:var(--muted); font-size:0.86rem;">${t('dash.socialPublicProfile')}</div>
                    </div>
                    <button type="button" class="btn-sec" data-action="public-follow-toggle" data-uid="${uid}">${isFollowing ? t('dash.unfollow') : t('dash.follow')}</button>
                </div>
                <div class="social-public-stats">
                    <button type="button" class="social-stat-btn" data-action="open-follow-list" data-kind="followers" data-uid="${uid}"><b>${counts.followers}</b><span>${t('dash.followers')}</span></button>
                    <button type="button" class="social-stat-btn" data-action="open-follow-list" data-kind="following" data-uid="${uid}"><b>${counts.following}</b><span>${t('dash.followingCount')}</span></button>
                    <div class="social-stat-btn" style="display:grid; place-items:center;"><b>${streakNow}</b><span>Streak</span></div>
                </div>
                <div class="profile-list social-public-list">
                    <b>Palestra principale</b>
                    <div class="profile-log">${escapeHtml(mainGym)}</div>
                    <b>Max grade per palestra</b>
                    <div class="profile-timeline">${maxByGym || `<p class="profile-empty">-</p>`}</div>
                    <div class="profile-kpis" style="margin-top:10px;">
                        <div class="profile-kpi"><b>${totalRoutes}</b><span>${t('dash.totalSends')}</span></div>
                        <div class="profile-kpi"><b>${activeDays}</b><span>${t('dash.activeDays')}</span></div>
                        <div class="profile-kpi"><b>${streakNow}</b><span>Streak attuale</span></div>
                    </div>
                    <b style="margin-top:8px; display:block;">${t('dash.latestActivities')}</b>
                    ${latestRows || `<p class="profile-empty">${t('dash.noPublicContent')}</p>`}
                </div>
            `;
            activePublicProfileUid = uid;
            wrap.querySelector('[data-action="public-follow-toggle"]')?.addEventListener('click', () => toggleFollowUser(uid));
            wrap.querySelectorAll('[data-action="open-follow-list"]').forEach(btn => btn.addEventListener('click', () => openSocialListModal(uid, btn.dataset.kind)));
        }

        function renderActivePublicProfile() {
            if (!activePublicProfileUid) return;
            const profileWrap = document.getElementById('social-profile-view');
            if (!profileWrap || profileWrap.style.display === 'none') return;
            renderPublicProfile(activePublicProfileUid).catch(() => {});
        }

        function stopSocialCommentsSubscription() {
            if (typeof socialCommentsUnsubscriber === 'function') socialCommentsUnsubscriber();
            socialCommentsUnsubscriber = null;
        }

        async function openSocialCommentsModal(activityId) {
            if (!activityId || !activeUser) return;
            await ensureSocialActivityDoc(activityId);
            activeSocialCommentsActivityId = activityId;
            await markMyPostViewed(activityId).catch(() => {});
            const modal = document.getElementById('social-comments-modal');
            const list = document.getElementById('social-comments-list');
            const input = document.getElementById('social-comments-input');
            const sendBtn = document.getElementById('social-comments-send');
            if (!modal || !list || !input || !sendBtn) return;
            stopSocialCommentsSubscription();
            socialCommentsUnsubscriber = onSnapshot(
                query(collection(db, 'socialActivities', activityId, 'comments'), orderBy('timestamp', 'asc'), limit(200)),
                (snap) => {
                    const ownerRow = socialMyPostsActivities.find(a => a.id === activityId) || socialFeedById.get(activityId) || {};
                    const owner = ownerRow.user_id || ownerRow.userId || null;
                    const rows = snap.docs.map(d => ({ id: d.id, ...(d.data() || {}) }));
                    const commentCount = rows.length;
                    updateLocalInteractionState(activityId, { comment_count: commentCount });
                    list.innerHTML = rows.map(c => {
                        const canDelete = !!owner && owner === activeUser.uid;
                        const actions = canDelete ? `<div style="margin-top:6px;"><button type="button" class="btn-sec" data-action="modal-delete-comment" data-activity-id="${activityId}" data-comment-id="${c.id}">Elimina</button> <button type="button" class="btn-sec" data-action="modal-reply-comment" data-username="${escapeHtml(c.user_name || 'Climber')}">Rispondi</button></div>` : '';
                        return `<div class="profile-log"><div><b>${escapeHtml(c.user_name || resolveUsername(c.user_id, 'Climber') || 'Climber')}</b></div><div>${escapeHtml(c.text || '')}</div><small>${escapeHtml(formatProfileDate(c.timestamp || ''))}</small>${actions}</div>`;
                    }).join('') || '<p class="profile-empty">Nessun commento.</p>';
                    list.querySelectorAll('[data-action="modal-delete-comment"]').forEach(btn => btn.onclick = () => deleteActivityComment(btn.dataset.activityId, btn.dataset.commentId).catch(alertWriteError));
                    list.querySelectorAll('[data-action="modal-reply-comment"]').forEach(btn => btn.onclick = () => { input.value = `@${btn.dataset.username} `; input.focus(); });
                    renderFollowingFeed();
                    renderMyPublicationsFeed();
                    list.scrollTop = list.scrollHeight;
                },
                () => {
                    list.innerHTML = '<p class="profile-empty">Impossibile caricare i commenti.</p>';
                }
            );
            sendBtn.onclick = async () => {
                const text = (input.value || '').trim();
                if (!text) return;
                sendBtn.disabled = true;
                try {
                    await addActivityComment(activityId, text);
                    input.value = '';
                } catch (e) {
                    alertWriteError(e);
                } finally {
                    sendBtn.disabled = false;
                }
            };
            input.onkeydown = (ev) => {
                if (ev.key === 'Enter') {
                    ev.preventDefault();
                    sendBtn.click();
                }
            };
            modal.classList.add('active');
            input.focus();
        }

            }

        async function renderFollowingSection() {
            const usersList = document.getElementById('following-users-list');
            const progList = document.getElementById('following-progress-list');
            if (!usersList || !progList) return;

            const tabCommunity = document.getElementById('social-top-tab-community');
            const tabUsers = document.getElementById('social-top-tab-users');
            const tabMyPosts = document.getElementById('social-top-tab-my-posts');
            const panelCommunity = document.getElementById('social-community-panel');
