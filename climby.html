            showLoading(t('loading.updatingMesh'));
            // Reset vie
            const rSnap = await getDocs(collection(db, `gyms/${realUserGymId}/Sectors/${sId}/routes`));
            await Promise.all(rSnap.docs.map(d => deleteDoc(d.ref)));
            // Upload
            const sRef = ref(storage, `meshes/${realUserGymId}/${sId}.glb`);
            await uploadBytes(sRef, file);
            const url = await getDownloadURL(sRef);
            await setDoc(doc(db, "gyms", realUserGymId, "Sectors", sId), { name, meshUrl: url }, { merge: true });
            hideLoading();
            open3D(realUserGymId, sId);
        };

        // --- VIEWER & STARS ---
        function cleanupModelLoadGuards() {
            if (typeof currentModelLoadCleanup === 'function') currentModelLoadCleanup();
            currentModelLoadCleanup = null;
            if (currentModelLoadTimeout) {
                clearTimeout(currentModelLoadTimeout);
                currentModelLoadTimeout = null;
            }
        }

        function failModelLoad(message, token) {
            if (token !== currentModelLoadToken) return;
            cleanupModelLoadGuards();
            showLoading(message || t('errors.modelLoadFailed'), true);
        }

        window.retryOpen3D = () => {
            if (!lastOpen3DRequest) return;
            open3D(lastOpen3DRequest.gId, lastOpen3DRequest.sId);
        };

        window.open3D = async (gId, sId) => {
            const viewer = document.getElementById('main-viewer');
            const token = ++currentModelLoadToken;
            lastOpen3DRequest = { gId, sId };
            cleanupModelLoadGuards();
            showLoading(t('loading.loading3d'));
            activeGymId = gId; activeSectorId = sId;

            const onLoad = () => {
                if (token !== currentModelLoadToken) return;
                cleanupModelLoadGuards();
                hideLoading();
            };
            const onError = () => failModelLoad(t('errors.modelLoadFailed'), token);

            viewer.addEventListener('load', onLoad);
            viewer.addEventListener('error', onError);
            currentModelLoadCleanup = () => {
                viewer.removeEventListener('load', onLoad);
                viewer.removeEventListener('error', onError);
            };
            currentModelLoadTimeout = setTimeout(() => failModelLoad(t('errors.modelLoadTimeout'), token), 15000);

            try {
                const snap = await getDoc(doc(db, "gyms", gId, "Sectors", sId));
                const meshUrl = snap.exists() ? snap.data()?.meshUrl : null;
                if (!meshUrl) {
                    failModelLoad(t('errors.modelMeshMissing'), token);
                    return;
                }
                document.getElementById('viewer-container').style.display = 'block';
                viewer.src = '';
                viewer.src = meshUrl;
            } catch (e) {
                failModelLoad(t('errors.modelLoadFailed'), token);
            }

            onSnapshot(collection(db, `gyms/${gId}/Sectors/${sId}/routes`), (s) => {
                document.querySelectorAll('.hotspot:not(#ghost)').forEach(h => h.remove());
                s.forEach(rd => {
                    const r = rd.data(), btn = document.createElement('button');
                    btn.className = 'hotspot'; btn.slot = `hotspot-${rd.id}`;
                    btn.dataset.position = r.position; btn.dataset.normal = r.normal;
                    btn.style.backgroundColor = r.color;
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        if(currentMode === 'admin' && activeGymId === realUserGymId) {
                            activeRouteId = rd.id;
                            document.getElementById('route-grade').value = r.grade;
                            ensureRouteColorOption(r.color);
                            document.getElementById('route-color').value = r.color;
                            document.getElementById('btn-delete-route').style.display = 'block';
                            document.getElementById('admin-editor-panel').style.display = 'block';
                        } else openSocial(rd.id, r);
                    };
                    viewer.appendChild(btn);
                });
            });
        };

        document.querySelectorAll('#star-selector span').forEach(s => {
            s.onclick = () => {
                selectedStars = s.dataset.v;
                document.querySelectorAll('#star-selector span').forEach(st => {
                    st.classList.toggle('active', st.dataset.v <= selectedStars);
                });
            };
        });

        function toYYYYMMDD(d) { const y = d.getFullYear(); const m = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0'); return y + '-' + m + '-' + day; }
        function lastSaturday() { const d = new Date(); const day = d.getDay(); const diff = day === 6 ? 0 : day === 0 ? -1 : 6 - day; d.setDate(d.getDate() - 7 + diff); return d; }
        function lastSunday() { const d = new Date(); const day = d.getDay(); const diff = day === 0 ? -7 : -day; d.setDate(d.getDate() + diff); return d; }

        async function openSocial(id, data) {
            activeRouteId = id; selectedStars = 0;
            socialRouteContext = {
                gymId: activeGymId,
                sectorId: activeSectorId,
                routeId: id,
                routeGrade: data?.grade || '-'
            };
            document.querySelectorAll('#star-selector span').forEach(st => st.classList.remove('active'));
            document.getElementById('social-grade').innerText = t('viewer.grade') + ": " + (data?.grade || '-');
            document.getElementById('user-comment').value = '';
            document.getElementById('public-proposed-grade').value = '';
            document.getElementById('social-panel').style.display = 'block';

            document.getElementById('social-tab-public').onclick = () => {
                document.getElementById('social-tab-public').classList.add('active');
                document.getElementById('social-tab-tracker').classList.remove('active');
                document.getElementById('social-public-section').classList.add('active');
                document.getElementById('social-tracker-section').classList.remove('active');
            };
            document.getElementById('social-tab-tracker').onclick = () => {
                document.getElementById('social-tab-tracker').classList.add('active');
                document.getElementById('social-tab-public').classList.remove('active');
                document.getElementById('social-tracker-section').classList.add('active');
                document.getElementById('social-public-section').classList.remove('active');
            };

            if (typeof currentRouteProgressUnsubscriber === 'function') currentRouteProgressUnsubscriber();
            const progressRef = doc(db, 'users', activeUser.uid, 'routeProgress', `${activeGymId}__${activeSectorId}__${id}`);
            currentRouteProgressUnsubscriber = onSnapshot(progressRef, (snap) => {
                socialTrackerState = snap.exists() ? (snap.data() || null) : null;
                renderTrackerStateUI();
            });

            onSnapshot(collection(db, `gyms/${activeGymId}/Sectors/${activeSectorId}/routes/${id}/reviews`), (sn) => {
                const list = document.getElementById('comments-list');
                list.innerHTML = ""; let sum = 0;
                sn.forEach(d => {
                    const r = d.data();
                    sum += parseInt(r.rating);
                    let line = `<b>⭐ ${r.rating}</b>`;
                    line += ` · <b>${escapeHtml(resolveUsername(r.userId, r.userName || 'Climber'))}</b>`;
                    if (r.proposedGrade) line += ` · ${t('viewer.proposedGrade')}: <b>${escapeHtml(r.proposedGrade)}</b>`;
                    if (r.text) line += ` — ${r.text}`;
                    else line += ` ${t('viewer.noComment')}`;
                    list.innerHTML += `<div class="card" style="font-size:12px">${line}</div>`;
                });
                document.getElementById('avg-stars-view').innerText = sn.size > 0 ? t('viewer.avgRating') + ": " + (sum/sn.size).toFixed(1) + " ⭐" : t('viewer.noVotesYet');
            });
        }

        function renderTrackerStateUI() {
            const actions = document.getElementById('tracker-state-actions');
            const form = document.getElementById('tracker-form-grid');
            const saveBtn = document.getElementById('tracker-save-btn');
            if (!actions || !form || !saveBtn) return;
            const state = socialTrackerState?.state || null;
            const isProject = state === 'project';
            const isClimbed = state === 'climbed';

            actions.innerHTML = '';
            form.style.display = state ? 'grid' : 'none';
            saveBtn.style.display = state ? 'block' : 'none';
            document.getElementById('tracker-final-grade-wrap').style.display = isClimbed ? 'block' : 'none';
            document.getElementById('tracker-completion-wrap').style.display = isClimbed ? 'block' : 'none';

            if (!state) {
                actions.innerHTML = `
                    <button type="button" class="btn-sec" id="tracker-add-project">${t('viewer.addToProject')}</button>
                    <button type="button" class="btn-sec" id="tracker-add-climbed">${t('viewer.markAsClimbed')}</button>
                `;
                document.getElementById('tracker-add-project').onclick = () => upsertRouteProgress('project', true);
                document.getElementById('tracker-add-climbed').onclick = () => upsertRouteProgress('climbed', true);
                return;
            }

            actions.innerHTML = `<span class="tracker-state-pill">${isClimbed ? t('viewer.climbed') : t('viewer.project')}</span>${isProject ? `<button type="button" class="btn-sec" id="tracker-mark-climbed">${t('viewer.markAsClimbed')}</button>` : ''}`;
            if (isProject) {
                const mk = document.getElementById('tracker-mark-climbed');
                if (mk) mk.onclick = () => upsertRouteProgress('climbed', false);
            }

            document.getElementById('tracker-attempt-count').value = socialTrackerState?.attemptCount || 1;
            document.getElementById('tracker-final-grade').value = socialTrackerState?.finalGrade || '';
            document.getElementById('tracker-first-attempt').value = socialTrackerState?.firstAttemptDate || toYYYYMMDD(new Date());
            document.getElementById('tracker-completion-date').value = socialTrackerState?.completionDate || toYYYYMMDD(new Date());
            document.getElementById('tracker-notes').value = socialTrackerState?.notes || '';
            document.getElementById('tracker-share-feed').checked = !!socialTrackerState?.shareOnFeed;
            saveBtn.textContent = isClimbed ? t('viewer.saveClimbed') : t('viewer.saveProject');
            saveBtn.onclick = () => upsertRouteProgress(state, false);
        }

        async function upsertRouteProgress(targetState, isInitial) {
            if (!activeUser || !socialRouteContext) return;
            const key = `${socialRouteContext.gymId}__${socialRouteContext.sectorId}__${socialRouteContext.routeId}`;
            const nowDate = toYYYYMMDD(new Date());
            const prev = socialTrackerState || {};
            const nextState = targetState;
            const attempt = parseInt(document.getElementById('tracker-attempt-count')?.value || (prev.attemptCount || 1), 10) || 1;
            const finalGrade = nextState === 'climbed' ? (document.getElementById('tracker-final-grade')?.value || prev.finalGrade || null) : null;
            const firstAttemptDate = document.getElementById('tracker-first-attempt')?.value || prev.firstAttemptDate || nowDate;
            const completionDate = nextState === 'climbed' ? (document.getElementById('tracker-completion-date')?.value || prev.completionDate || nowDate) : null;
            const notes = document.getElementById('tracker-notes')?.value || prev.notes || '';
            const shareOnFeed = !!document.getElementById('tracker-share-feed')?.checked;
            const payload = {
                userId: activeUser.uid,
                gymId: socialRouteContext.gymId,
                sectorId: socialRouteContext.sectorId,
                routeId: socialRouteContext.routeId,
                state: nextState,
                attemptCount: attempt,
                finalGrade,
                firstAttemptDate,
                completionDate,
                notes,
                shareOnFeed,
                routeGrade: socialRouteContext.routeGrade,
                routeLabel: socialRouteContext.routeGrade,
                gymName: document.getElementById('user-gym-detail-name')?.textContent || socialRouteContext.gymId,
                sectorName: document.querySelector('#main-list-user .card b')?.textContent || socialRouteContext.sectorId,
                updatedAt: new Date().toISOString()
            };
            await setDoc(doc(db, 'users', activeUser.uid, 'routeProgress', key), payload, { merge: true });
            if (shareOnFeed) {
                await setDoc(doc(db, `gyms/${socialRouteContext.gymId}/Sectors/${socialRouteContext.sectorId}/routes/${socialRouteContext.routeId}/progressFeed`, activeUser.uid), {
                    userId: activeUser.uid,
                    userName: currentUserName || 'Climber',
                    state: nextState,
                    date: new Date(),
                    notes: notes || ''
                }, { merge: true });
            }
            alert(t('viewer.trackerSaved'));
            renderProfileDashboard();
        }

        async function getRouteProgress(routeId) {
            if (!activeUser || !socialRouteContext) return null;
            const key = `${socialRouteContext.gymId}__${socialRouteContext.sectorId}__${routeId}`;
            const snap = await getDoc(doc(db, 'users', activeUser.uid, 'routeProgress', key));
            return snap.exists() ? snap.data() : null;
        }
        async function createOrUpdateRouteProgress(routeId, payload) {
            if (!activeUser || !socialRouteContext) return;
            const key = `${socialRouteContext.gymId}__${socialRouteContext.sectorId}__${routeId}`;
            await setDoc(doc(db, 'users', activeUser.uid, 'routeProgress', key), payload, { merge: true });
        }
        window.getRouteProgressEndpoint = getRouteProgress;
        window.updateRouteProgressEndpoint = createOrUpdateRouteProgress;

        window.submitReview = async () => {
            if(selectedStars === 0) return alert(t('viewer.selectStar'));
            const text = document.getElementById('user-comment').value;
            const proposedGrade = (document.getElementById('public-proposed-grade')?.value || '').trim();
            const reviewsRef = collection(db, `gyms/${activeGymId}/Sectors/${activeSectorId}/routes/${activeRouteId}/reviews`);
            const alreadyReviewed = await getDocs(query(reviewsRef, where('userId', '==', activeUser?.uid || null), limit(1)));
            if (!alreadyReviewed.empty) {
                alert(t('viewer.reviewAlreadySent'));
                return;
            }
            await addDoc(reviewsRef, {
                rating: selectedStars,
                text: text || "",
                proposedGrade: proposedGrade || null,
                date: new Date(),
                userId: activeUser?.uid || null,
                userName: currentUserName || 'Climber'
            });
            document.getElementById('user-comment').value = "";
            document.getElementById('public-proposed-grade').value = "";
            alert(t('viewer.reviewSuccess'));
        };

        // --- EDITOR ADMIN ---
        const tapGestureState = {
            isPointerDown: false,
            isDragging: false,
            isMultiTouch: false,
            startX: 0,
            startY: 0,
            startTime: 0,
            pointerId: null,
            pointerType: null
        };
        const activeTouchPointers = new Set();

        const TAP_MAX_DISTANCE_PX = 10;
        const TAP_MAX_DURATION_MS = 300;

        function resetTapGestureState() {
            tapGestureState.isPointerDown = false;
            tapGestureState.isDragging = false;
            tapGestureState.isMultiTouch = false;
            tapGestureState.startX = 0;
            tapGestureState.startY = 0;
            tapGestureState.startTime = 0;
            tapGestureState.pointerId = null;
            tapGestureState.pointerType = null;
        }

        function isTapGesture(endX, endY, endTime) {
            if (tapGestureState.isDragging || tapGestureState.isMultiTouch) return false;
            const distance = Math.hypot(endX - tapGestureState.startX, endY - tapGestureState.startY);
            const duration = endTime - tapGestureState.startTime;
            return distance < TAP_MAX_DISTANCE_PX && duration <= TAP_MAX_DURATION_MS;
        }

        function handleAdminTap(clientX, clientY) {
            if(currentMode !== 'admin' || activeGymId !== realUserGymId) return;
            const hit = mainViewer.positionAndNormalFromPoint(clientX, clientY);
            if(!hit) return;
            activeRouteId = null;
            tempPos = hit.position.toString();
            tempNorm = hit.normal.toString();
            const ghost = document.getElementById('ghost');
            ghost.dataset.position = tempPos;
            ghost.dataset.normal = tempNorm;
            ghost.style.display = 'block';
            document.getElementById('btn-delete-route').style.display = 'none';
            document.getElementById('admin-editor-panel').style.display = 'block';
        }

        const mainViewer = document.getElementById('main-viewer');

        mainViewer.addEventListener('pointerdown', (e) => {
            if (e.pointerType === 'touch') {
                activeTouchPointers.add(e.pointerId);
                if (activeTouchPointers.size > 1) {
                    tapGestureState.isMultiTouch = true;
                    tapGestureState.isDragging = true;
                    return;
                }
            }
            tapGestureState.isPointerDown = true;
            tapGestureState.isDragging = false;
            tapGestureState.isMultiTouch = false;
            tapGestureState.startX = e.clientX;
            tapGestureState.startY = e.clientY;
            tapGestureState.startTime = performance.now();
            tapGestureState.pointerId = e.pointerId;
            tapGestureState.pointerType = e.pointerType;
        }, { passive: true });

        mainViewer.addEventListener('pointermove', (e) => {
            if (!tapGestureState.isPointerDown || tapGestureState.pointerId !== e.pointerId) return;
            if (tapGestureState.pointerType === 'touch' && activeTouchPointers.size > 1) {
                tapGestureState.isMultiTouch = true;
                tapGestureState.isDragging = true;
                return;
            }
            const distance = Math.hypot(e.clientX - tapGestureState.startX, e.clientY - tapGestureState.startY);
            if (distance >= TAP_MAX_DISTANCE_PX) tapGestureState.isDragging = true;
        }, { passive: true });

        mainViewer.addEventListener('pointerup', (e) => {
            if (e.pointerType === 'touch') activeTouchPointers.delete(e.pointerId);
            if (!tapGestureState.isPointerDown || tapGestureState.pointerId !== e.pointerId) {
                resetTapGestureState();
                return;
            }
            const isValidTap = isTapGesture(e.clientX, e.clientY, performance.now());
            if (isValidTap) handleAdminTap(e.clientX, e.clientY);
            resetTapGestureState();
        }, { passive: true });

        mainViewer.addEventListener('pointercancel', (e) => {
            if (e.pointerType === 'touch') activeTouchPointers.delete(e.pointerId);
            resetTapGestureState();
        }, { passive: true });

        mainViewer.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) {
                tapGestureState.isMultiTouch = true;
                tapGestureState.isDragging = true;
            }
        }, { passive: true });

        window.saveRoute = async () => {
            const gradeValue = document.getElementById('route-grade').value.trim();
            if (!gradeValue) return alert(t('errors.completeData'));
            const data = { grade: gradeValue, color: document.getElementById('route-color').value };
            if(activeRouteId) await updateDoc(doc(db, `gyms/${activeGymId}/Sectors/${activeSectorId}/routes`, activeRouteId), data);
            else await addDoc(collection(db, `gyms/${activeGymId}/Sectors/${activeSectorId}/routes`), { ...data, position: tempPos, normal: tempNorm });
            window.cancelAdminEdit();
        };

        window.deleteRoute = async () => { if(confirm(t('viewer.confirmDelete'))) { await deleteDoc(doc(db, `gyms/${activeGymId}/Sectors/${activeSectorId}/routes`, activeRouteId)); window.cancelAdminEdit(); } };

        window.goToAuth = () => showView('view-auth');
        window.logout = () => { stopFollowingProgressSubscriptions(); stopFollowsSubscription(); signOut(auth).then(() => location.reload()); };
        window.switchMode = () => {
            if (userRole !== 'admin') return;
            currentMode = currentMode === 'admin' ? 'user' : 'admin';
            initDashboard();
        };
        window.closeViewer = () => { cleanupModelLoadGuards(); document.getElementById('viewer-container').style.display = 'none'; hideLoading(); };
        window.cancelAdminEdit = () => { document.getElementById('admin-editor-panel').style.display = 'none'; document.getElementById('ghost').style.display = 'none'; };
        function showView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
