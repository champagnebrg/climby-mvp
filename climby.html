        function buildFollowingFeedItems() {
            const followed = new Set((userFollowingIds || []).filter(uid => uid && uid !== activeUser?.uid));
            const buildFallbackActivityId = (v) => `fallback__${v.userId || 'u'}__${v.routeId || 'r'}__${v.eventDate || v.updatedAt || ''}`;
            const friends = socialFeedActivities.map(normalizeSocialActivity).filter(a => followed.has(a.userAuthUid || a.user_id));
            const fallbackFriends = Array.from(followingFeedMap.values()).map(v => {
                const fallbackId = buildFallbackActivityId(v);
                const localState = socialFeedInteractionState.get(fallbackId) || {};
                return ({
                id: fallbackId,
                user_id: v.userId,
                user_name: v.username || v.userName || 'Climber',
                gym_id: v.gymId,
                gym_name: v.gymName || v.gymId,
                activity_type: v.state === 'project' ? 'streak' : 'route',
                grade: v.finalGrade || v.routeGrade || '-',
                attempts: v.attemptCount || 1,
                timestamp: v.eventDate || v.updatedAt || v.completionDate || v.firstAttemptDate || '',
                is_new_max: false,
                streak_days: null,
                applause_count: Number(localState.applause_count || 0),
                comment_count: Number(localState.comment_count || 0),
                is_fallback: true
            });
            });
            const merged = [...fallbackFriends.filter(f => followed.has(f.user_id)), ...friends];
            const uniq = new Map();
            merged.forEach(a => uniq.set(a.id, a));
            return Array.from(uniq.values()).sort((a,b) => {
                if (!!b.is_new_max !== !!a.is_new_max) return b.is_new_max ? 1 : -1;
                return new Date(b.timestamp || 0) - new Date(a.timestamp || 0);
            });
        }

        function updateLocalInteractionState(activityId, patch = {}) {
            if (!activityId) return;
            const current = socialFeedInteractionState.get(activityId) || {};
            socialFeedInteractionState.set(activityId, { ...current, ...patch });
        }

        async function ensureSocialActivityDoc(activityId) {
            if (!activityId) return null;
            const activityRef = doc(db, 'socialActivities', activityId);
            const snap = await getDoc(activityRef);
            if (snap.exists()) return activityRef;
            const fallback = socialFeedById.get(activityId) || {};
            const normalized = normalizeSocialActivity(fallback);
            await setDoc(activityRef, {
                userAuthUid: normalized.userAuthUid || activeUser?.uid || null,
                user_id: normalized.user_id || activeUser?.uid || null,
                user_name: normalized.user_name || resolveUsername(normalized.user_id, 'Climber') || 'Climber',
                activityDate: normalized.activityDate,
                activityList: normalized.activityList || [],
                gymId: normalized.gymId || null,
                gym_id: normalized.gym_id || null,
                gym_name: normalized.gym_name || normalized.gym_id || '-',
                activity_type: normalized.activity_type || 'route',
                grade: normalized.grade || '-',
                attempts: normalized.attempts || 1,
                timestamp: normalized.timestamp || new Date().toISOString(),
                is_new_max: !!normalized.is_new_max,
                streak_days: normalized.streak_days || null,
                applauseCount: Number(normalized.applauseCount || 0),
                commentCount: Number(normalized.commentCount || 0),
                applause_count: Number(normalized.applause_count || 0),
                comment_count: Number(normalized.comment_count || 0)
            }, { merge: true });
            return activityRef;
        }

        async function preloadApplauseState(activityId) {
            if (!activeUser || !activityId) return false;
            if (socialApplauseByActivity.has(activityId) || socialApplauseLoadingIds.has(activityId)) {
                return !!socialApplauseByActivity.get(activityId);
            }
            socialApplauseLoadingIds.add(activityId);
            try {
                const ref = doc(db, 'socialActivities', activityId, 'applause', activeUser.uid);
                const snap = await getDoc(ref);
                socialApplauseByActivity.set(activityId, snap.exists());
                return snap.exists();
            } finally {
                socialApplauseLoadingIds.delete(activityId);
            }
        }

        function getActivityApplauseCount(activityId, fallback = 0) {
            return Number(socialFeedInteractionState.get(activityId)?.applause_count ?? socialFeedById.get(activityId)?.applause_count ?? fallback ?? 0);
        }

        async function resolveSocialActivityOwnerId(activityId) {
            if (!activityId) return null;
            const cached = socialFeedById.get(activityId) || {};
            const cachedOwner = cached.user_id || cached.userId || null;
            if (cachedOwner) return cachedOwner;
            try {
                const snap = await getDoc(doc(db, 'socialActivities', activityId));
                if (!snap.exists()) return null;
                const row = snap.data() || {};
                return row.user_id || row.userId || null;
            } catch (_) {
                return null;
            }
        }

        async function toggleActivityApplause(activityId) {
            if (!activeUser || !activityId) return;
            const activityRef = await ensureSocialActivityDoc(activityId);
            const ref = doc(db, 'socialActivities', activityId, 'applause', activeUser.uid);
            let wasApplauded = socialApplauseByActivity.get(activityId);
            if (typeof wasApplauded !== 'boolean') {
                const snap = await getDoc(ref);
                wasApplauded = snap.exists();
            }
            const currentApplause = getActivityApplauseCount(activityId, 0);
            const nextApplause = wasApplauded ? Math.max(0, currentApplause - 1) : currentApplause + 1;

            socialApplauseByActivity.set(activityId, !wasApplauded);
            updateLocalInteractionState(activityId, { applause_count: nextApplause });
            socialMyPostsInteractionMeta.delete(activityId);
            renderFollowingFeed();
            renderMyPublicationsFeed();

            try {
                if (wasApplauded) {
                    await deleteDoc(ref);
                    await updateDoc(activityRef, { applause_count: increment(-1), applauseCount: increment(-1), last_interaction_at: new Date().toISOString() });
                } else {
                    await setDoc(ref, { user_id: activeUser.uid, timestamp: new Date().toISOString() }, { merge: true });
                    await updateDoc(activityRef, { applause_count: increment(1), applauseCount: increment(1), last_interaction_at: new Date().toISOString() });
                    const ownerId = await resolveSocialActivityOwnerId(activityId);
                    if (ownerId && ownerId !== activeUser.uid) {
                        try {
                            await createNotification({
                                userId: ownerId,
                                type: 'POST_LIKE',
                                actorId: activeUser.uid,
                                postId: activityId,
                                message: `${currentUserName || 'Un utente'} ha messo like alla tua pubblicazione`
                            });
                        } catch (err) {
                            console.error('POST_LIKE notification failed', err);
                        }
                    }
                }
            } catch (e) {
                socialApplauseByActivity.set(activityId, wasApplauded);
                updateLocalInteractionState(activityId, { applause_count: currentApplause });
                renderFollowingFeed();
                renderMyPublicationsFeed();
                throw e;
            }
        }

        async function addActivityComment(activityId, textValue = null) {
            if (!activeUser || !activityId) return;
            const text = (textValue ?? '').trim();
            if (!text) return;
            const activityRef = await ensureSocialActivityDoc(activityId);
            const nowIso = new Date().toISOString();
            await addDoc(collection(db, 'socialActivities', activityId, 'comments'), {
                user_id: activeUser.uid,
                user_name: currentUserName || 'Climber',
                text,
                timestamp: nowIso
            });
            await updateDoc(activityRef, { comment_count: increment(1), commentCount: increment(1), last_interaction_at: nowIso });
            const ownerId = await resolveSocialActivityOwnerId(activityId);
            if (ownerId && ownerId !== activeUser.uid) {
                try {
                    await createNotification({
                        userId: ownerId,
                        type: 'POST_COMMENT',
                        actorId: activeUser.uid,
                        postId: activityId,
                        message: `${currentUserName || 'Un utente'} ha commentato la tua pubblicazione`
                    });
                } catch (err) {
                    console.error('POST_COMMENT notification failed', err);
                }
            }
            const currentComments = Number(socialFeedById.get(activityId)?.comment_count || socialFeedInteractionState.get(activityId)?.comment_count || 0);
            updateLocalInteractionState(activityId, { comment_count: currentComments + 1 });
            socialMyPostsInteractionMeta.delete(activityId);
            renderFollowingFeed();
            renderMyPublicationsFeed();
        }

        function sanitizeSocialCount(value) {
            return Math.max(0, Number(value || 0));
        }

        function renderSocialFeedCard(activity) {
            const e = normalizeSocialActivity(activity || {});
            const ts = escapeHtml(formatProfileDate(e.activityDate || e.timestamp || e.sendDate || ''));
            const applauseCount = sanitizeSocialCount(getActivityApplauseCount(e.id, e.applause_count));
            const commentCount = sanitizeSocialCount(socialFeedInteractionState.get(e.id)?.comment_count ?? e.comment_count);
            const isApplauded = !!socialApplauseByActivity.get(e.id);
            const actionButtons = `<div class="social-feed-actions"><button class="social-action-btn ${isApplauded ? 'active' : ''}" data-action="applause" data-id="${e.id}">🔥 ${applauseCount}</button><button class="social-action-btn" data-action="comment" data-id="${e.id}">💬 ${commentCount}</button></div>`;

            const climbs = (e.activityList || []).filter(item => item.type === 'route');
            const hadNewMax = (e.activityList || []).some(item => item.type === 'new_max' || item.isNewMax);
            const hadStreak = (e.activityList || []).find(item => item.type === 'streak' && Number(item.streakDays || 0) > 1);
            const climbRows = climbs.map(item => { const dot = resolveRouteColorFromStores(item); const tries = Number(item.attempts || 1); const triesLabel = tries >= 3 ? '3+' : String(tries); return `<li><span class="color-dot" style="background:${escapeHtml(dot)}"></span>${escapeHtml(item.grade || '-')} <small>(${t('ui.attempts')}: ${triesLabel})</small></li>`; }).join('');
            const gymLabel = escapeHtml(e.gym_name || e.gym_id || '-');

            return `<div class="social-feed-card social-feed-card-compact"><div class="social-feed-head"><div class="social-feed-title">🔥 ${t('ui.dailyActivityTitle')}</div><small>${ts}</small></div><div class="social-feed-meta"><b>${escapeHtml(e.user_name || 'Climber')}${badgePillHtml(resolveUserHighestBadge(e.user_id))}</b> · 📍 ${gymLabel}</div>${climbs.length ? `<ul class="social-feed-activity-list">${climbRows}</ul>` : ''}${hadNewMax ? `<div class="social-feed-meta">🏆 ${t('ui.newPersonalBest')}</div>` : ''}${hadStreak ? `<div class="social-feed-meta">🔁 ${hadStreak.streakDays} ${t('ui.socialConsecutiveDays')}</div>` : ''}${actionButtons}</div>`;
        }

        function bindSocialFeedActions(root) {
            if (!root) return;
            root.querySelectorAll('[data-action="applause"]').forEach(btn => {
                preloadApplauseState(btn.dataset.id).then(() => {
                    btn.classList.toggle('active', !!socialApplauseByActivity.get(btn.dataset.id));
                }).catch(() => {});
                btn.onclick = () => toggleActivityApplause(btn.dataset.id).catch(alertWriteError);
            });
            root.querySelectorAll('[data-action="comment"]').forEach(btn => btn.onclick = () => openSocialCommentsModal(btn.dataset.id).catch(alertWriteError));
        }

        async function loadMyPostInteractionMeta(activityId) {
            if (!activityId || socialMyPostsInteractionMeta.get(activityId)?.loading) return;
            const current = socialMyPostsInteractionMeta.get(activityId) || {};
            socialMyPostsInteractionMeta.set(activityId, { ...current, loading: true });
            try {
                const commentsRef = collection(db, 'socialActivities', activityId, 'comments');
                const commentsSnap = await getDocs(query(commentsRef, orderBy('timestamp', 'desc'), limit(2)));
                const latestCommentSnap = await getDocs(query(commentsRef, orderBy('timestamp', 'desc'), limit(1)));
                const applauseSnap = await getDocs(query(collection(db, 'socialActivities', activityId, 'applause'), orderBy('timestamp', 'desc'), limit(1)));
                const latestComments = commentsSnap.docs.map(d => ({ id: d.id, ...(d.data() || {}) }));
                const latestCommentTs = latestCommentSnap.docs[0]?.data()?.timestamp || null;
                const latestApplauseTs = applauseSnap.docs[0]?.data()?.timestamp || null;
                const source = socialMyPostsActivities.find(a => a.id === activityId) || socialFeedById.get(activityId) || {};
                const lastViewed = source.last_viewed_at || null;
                const lastInteractionTs = [latestCommentTs, latestApplauseTs].filter(Boolean).sort().slice(-1)[0] || null;
                const hasNew = !!(lastInteractionTs && (!lastViewed || new Date(lastInteractionTs).getTime() > new Date(lastViewed).getTime()));
                socialMyPostsInteractionMeta.set(activityId, { loading: false, latestComments, latestCommentTs, latestApplauseTs, hasNew });
                renderMyPublicationsFeed();
            } catch (_) {
                socialMyPostsInteractionMeta.set(activityId, { ...(socialMyPostsInteractionMeta.get(activityId) || {}), loading: false });
            }
        }

        async function markMyPostViewed(activityId) {
            if (!activityId || !activeUser?.uid) return;
            const row = socialMyPostsActivities.find(a => a.id === activityId);
            if (!row || (row.user_id || row.userId) !== activeUser.uid) return;
            const nowIso = new Date().toISOString();
            await updateDoc(doc(db, 'socialActivities', activityId), { last_viewed_at: nowIso });
            socialMyPostsActivities = socialMyPostsActivities.map(a => a.id === activityId ? { ...a, last_viewed_at: nowIso } : a);
            const meta = socialMyPostsInteractionMeta.get(activityId) || {};
            socialMyPostsInteractionMeta.set(activityId, { ...meta, hasNew: false });
        }

        async function deleteMyPost(activityId) {
            if (!activityId || !activeUser?.uid) return;
            const row = socialMyPostsActivities.find(a => a.id === activityId);
            if (!row || (row.user_id || row.userId) !== activeUser.uid) return;
            if (!confirm(t('ui.confirmDeletePost'))) return;
            await deleteDoc(doc(db, 'socialActivities', activityId));
            socialMyPostsActivities = socialMyPostsActivities.filter(a => a.id !== activityId);
            socialMyPostsInteractionMeta.delete(activityId);
            socialMyPostsExpanded.delete(activityId);
            renderMyPublicationsFeed();
            renderFollowingFeed();
        }

        async function deleteActivityComment(activityId, commentId) {
            if (!activityId || !commentId || !activeUser?.uid) return;
            const row = socialMyPostsActivities.find(a => a.id === activityId) || socialFeedById.get(activityId);
            if (!row || (row.user_id || row.userId) !== activeUser.uid) return;
            await deleteDoc(doc(db, 'socialActivities', activityId, 'comments', commentId));
            const activityRef = await ensureSocialActivityDoc(activityId);
            await updateDoc(activityRef, { comment_count: increment(-1), commentCount: increment(-1) });
            const currentComments = Number(socialFeedById.get(activityId)?.comment_count || socialFeedInteractionState.get(activityId)?.comment_count || 0);
            updateLocalInteractionState(activityId, { comment_count: Math.max(0, currentComments - 1) });
            socialMyPostsInteractionMeta.delete(activityId);
            renderMyPublicationsFeed();
            renderFollowingFeed();
        }

        function renderMyPublicationCard(e) {
            const ts = escapeHtml(formatProfileDate(e.timestamp || e.sendDate || ''));
            const applauseCount = sanitizeSocialCount(getActivityApplauseCount(e.id, e.applause_count));
            const commentCount = sanitizeSocialCount(socialFeedInteractionState.get(e.id)?.comment_count ?? e.comment_count);
            const totalInteractions = applauseCount + commentCount;
            const meta = socialMyPostsInteractionMeta.get(e.id) || {};
            if (!meta.loading && !meta.latestComments) loadMyPostInteractionMeta(e.id);
            const hasNew = !!meta.hasNew;
            const expanded = socialMyPostsExpanded.has(e.id);
            const latestComments = Array.isArray(meta.latestComments) ? meta.latestComments : [];
            const previewRows = latestComments.slice(0, 2).map(c => {
                const canDelete = ((e.user_id || e.userId || null) === activeUser?.uid);
                return `<div class="profile-log"><div><b>${escapeHtml(c.user_name || resolveUsername(c.user_id, 'Climber') || 'Climber')}${badgePillHtml(resolveUserHighestBadge(c.user_id))}</b></div><div>${escapeHtml(c.text || '')}</div><small>${escapeHtml(formatProfileDate(c.timestamp || ''))}</small>${canDelete ? `<div style="margin-top:6px;"><button type="button" class="btn-sec" data-action="delete-comment" data-activity-id="${e.id}" data-comment-id="${c.id}">${t('ui.deleteComment')}</button> <button type="button" class="btn-sec" data-action="reply-comment" data-activity-id="${e.id}" data-username="${escapeHtml(c.user_name || 'Climber')}">${t('ui.reply')}</button></div>` : ''}</div>`;
            }).join('') || `<p class="profile-empty">${t('ui.noComments')}</p>`;
            const newBadge = hasNew ? `<span class="social-chip new">${t('ui.new')}</span>` : '';
            const maxBadge = e.is_new_max ? `<span class="social-chip">${t('ui.newMax')}</span>` : '';
            return `<div class="social-feed-card ${totalInteractions > 5 ? 'engaged' : ''}" data-my-post-id="${e.id}"><div class="social-feed-head"><div class="social-feed-title">${t('ui.myClimbedAt')} ${escapeHtml(e.grade || '-')} ${t('ui.socialAt')} ${escapeHtml(e.gym_name || e.gym_id || '-')}</div><div style="display:flex;gap:6px;align-items:center;">${newBadge}${maxBadge}<small>${ts}</small></div></div><div class="social-feed-meta">${t('ui.attempts')}: ${e.attempts || 1}</div><div class="social-feed-actions"><button class="social-action-btn ${socialApplauseByActivity.get(e.id) ? 'active' : ''}" data-action="applause" data-id="${e.id}">🔥 ${applauseCount} ${t('ui.applauseCountLabel')}</button><button class="social-action-btn" data-action="comment" data-id="${e.id}">💬 ${commentCount} ${t('ui.commentsCountLabel')}</button><button class="social-action-btn" data-action="toggle-comments" data-id="${e.id}">${expanded ? t('ui.hideComments') : t('ui.showComments')}</button><button class="social-action-btn" data-action="delete-post" data-id="${e.id}">${t('ui.deletePost')}</button></div><div class="social-my-comments-preview" style="display:${expanded ? 'block' : 'none'};">${previewRows}<button type="button" class="btn-sec" data-action="open-all-comments" data-id="${e.id}">${t('ui.showAllComments')}</button></div></div>`;
        }

        function renderMyPublicationsFeed() {
            const myList = document.getElementById('social-my-posts-list');
            if (!myList) return;
            if (!activeUser?.uid) {
                myList.innerHTML = `<p class="profile-empty">${t('ui.loginToSeePosts')}</p>`;
                return;
            }
            if (socialMyPostsLoading) {
                myList.innerHTML = `<p class="profile-empty">${t('ui.loadingPosts')}</p>`;
                return;
            }
            const feed = socialMyPostsActivities
                .filter(a => (a.user_id || a.userId || null) === activeUser.uid)
                .sort((a,b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
            if (socialMyPostsError && !feed.length) {
                myList.innerHTML = `<p class="profile-empty">${t('ui.loadPostsError')}</p>`;
                return;
            }
            myList.innerHTML = feed.map(renderSocialFeedCard).join('') || `<p class="profile-empty">${t('ui.climbToAppearFeed')}</p>`;
            bindSocialFeedActions(myList);
        }

        function renderFollowingFeed() {
            const progList = document.getElementById('following-progress-list');
            if (!progList) return;
            if (socialFeedLoading) {
                progList.innerHTML = `<p class="profile-empty">${t('loading.init')}</p>`;
                return;
            }
            const feed = buildFollowingFeedItems();
            socialFeedById = new Map(feed.map(e => [e.id, e]));
            const rulesWarn = socialFeedError && isPermissionDeniedError(socialFeedError) ? `<div class="profile-log" style="margin-bottom:10px;">${t('ui.limitedFeedPermissions')}</div>` : '';
            progList.innerHTML = rulesWarn + (feed.slice(0, 60).map(renderSocialFeedCard).join('') || `<p class="profile-empty">${t('dash.noFollowingProgress')}</p>`);
            bindSocialFeedActions(progList);
        }

        function syncFollowingProgressSubscriptions() {
            while (followingProgressUnsubscribers.length) {
                const unsub = followingProgressUnsubscribers.pop();
                if (typeof unsub === 'function') unsub();
            }
            followingFeedMap = new Map();
            startSocialFeedSubscription();
            startMyPostsSubscription();

            const followed = [...new Set(userFollowingIds)].filter(Boolean);
            followed.forEach(uid => {
                const qRef = query(collection(db, 'users', uid, 'routeProgress'), where('shareOnFeed', '==', true));
                const unsub = onSnapshot(qRef, (snap) => {
                    for (const key of Array.from(followingFeedMap.keys())) {
                        if (key.startsWith(`${uid}__`)) followingFeedMap.delete(key);
                    }
                    snap.forEach(d => {
                        const v = d.data() || {};
                        followingFeedMap.set(`${uid}__${d.id}`, {
                            ...v,
                            userId: uid,
                            username: resolveUsername(uid, v.userName || 'Climber'),
                            eventDate: v.completionDate || v.firstAttemptDate || v.updatedAt || v.sendDate || ''
                        });
                    });
                    renderFollowingFeed();
                });
                followingProgressUnsubscribers.push(unsub);
            });
        }

        async function searchUsersByUsername(queryText) {
            if (!lastUsersSnap) return [];
            const q = (queryText || '').trim().toLowerCase();
            if (!q) return [];
            const users = [];
            lastUsersSnap.forEach(d => users.push({ id: d.id, ...d.data(), uid: d.data()?.authUid || d.id }));
            return users.filter(u => u.uid !== activeUser?.uid && ((u.usernameLower || (u.username || '').toLowerCase()).includes(q))).slice(0, 20);
        }

        async function getFollowingSharedProgress() {
            syncFollowingProgressSubscriptions();
            return buildFollowingFeedItems();
        }

        async function safeGetDocs(qRef, fallback = null) {
            try {
                return await getDocs(qRef);
            } catch (e) {
                if (isPermissionDeniedError(e)) return fallback;
                throw e;
            }
        }

        async function getFollowCounts(uid) {
            const [followersSnap, followingSnap] = await Promise.all([
                safeGetDocs(query(collection(db, 'follows'), where('followingId', '==', uid))),
                safeGetDocs(query(collection(db, 'follows'), where('followerId', '==', uid)))
            ]);
            return { followers: followersSnap?.size || 0, following: followingSnap?.size || 0 };
        }

        async function getPublicFeedbackCount(uid) {
            const fb = await safeGetDocs(query(collectionGroup(db, 'reviews'), where('userId', '==', uid), limit(50)));
            return fb?.size || 0;
        }

        async function openPublicProfile(uid, opts = {}) {
            if (!uid) return;
            setUserMainTab('social');
            setSocialSubView('profile');
            if (opts.updateRoute !== false) setPublicProfileRoute(uid);
            try {
                await renderPublicProfile(uid);
            } catch (e) {
                alertWriteError(e);
                return;
            }
            const wrap = document.getElementById('social-public-profile');

        async function renderPublicProfile(uid) {
            const wrap = document.getElementById('social-public-profile');
            if (!wrap || !uid) return;
            let data = null;
            if (lastUsersSnap) {
                const snap = lastUsersSnap.docs.find(d => d.id === uid || d.data()?.authUid === uid);
                if (snap) data = snap.data() || {};
            }
            if (!data) {
                const direct = await getUserProfileByAuthUid(uid);
                if (!direct?.data) return;
                data = direct.data || {};
            }

            const username = data.username || 'Climber';
            const avatar = data.avatarUrl ? `<img class="social-public-avatar" src="${escapeHtml(data.avatarUrl)}" alt="">` : `<div class="social-public-avatar">${escapeHtml((username || 'U').slice(0,2).toUpperCase())}</div>`;
            const counts = await getFollowCounts(uid);
            const isFollowing = userFollowingIds.includes(uid);

            const statsSnap = await safeGetDocs(query(collection(db, 'users', uid, 'gymStats'), limit(30)));
            const stats = statsSnap ? statsSnap.docs.map(d => ({ id: d.id, ...(d.data() || {}) })) : [];
            const mainGym = stats[0]?.gym_name || data.mainGymName || data.gymManaged || '-';
            const streakNow = Math.max(0, ...stats.map(s => Number(s.streak_days || 0)));
            const totalRoutes = stats.reduce((a,s)=> a + Number(s.total_routes || 0), 0);
            const activeDays = stats.reduce((a,s)=> a + Number(s.active_days || 0), 0);
            const maxByGym = stats.map(s => `<div class="profile-timeline-row" style="${(activeGymDetailId && s.gym_id===activeGymDetailId) ? 'border-color:var(--primary);' : ''}"><b>${escapeHtml(s.gym_name || s.gym_id || '-')}</b><small>${escapeHtml(s.max_grade || '-')}</small></div>`).join('');

            const actsSnap = await safeGetDocs(query(collection(db, 'socialActivities'), where('user_id', '==', uid), limit(20)));
            const acts = actsSnap ? actsSnap.docs.map(d => d.data() || {}).sort((a,b)=> new Date(b.timestamp||0)-new Date(a.timestamp||0)) : [];
            const latestRows = acts.slice(0,8).map(raw => {
                const a = normalizeSocialActivity(raw);
                const climbs = (a.activityList || []).filter(it => it.type === 'route');
                const label = climbs.length ? climbs.map(it => it.grade || '-').slice(0,3).join(', ') : '-';
                return `<div class="profile-log"><div><b>${escapeHtml(label)}</b> · ${escapeHtml(a.gym_name || a.gym_id || '-')}</div><small>${escapeHtml(formatProfileDate(a.activityDate || a.timestamp || ''))} · ${t('ui.dailyActivity')}</small></div>`;
            }).join('');

            wrap.style.display = 'block';
            wrap.innerHTML = `
                <div class="social-public-header">
                    ${avatar}
                    <div style="min-width:0; flex:1;">
                        <b>${escapeHtml(username)}</b>
                        <div style="color:var(--muted); font-size:0.86rem;">${t('dash.socialPublicProfile')}</div>
                    </div>
                    <button type="button" class="btn-sec" data-action="public-follow-toggle" data-uid="${uid}">${isFollowing ? t('dash.unfollow') : t('dash.follow')}</button>
                </div>
                <div class="social-public-stats">
                    <button type="button" class="social-stat-btn" data-action="open-follow-list" data-kind="followers" data-uid="${uid}"><b>${counts.followers}</b><span>${t('dash.followers')}</span></button>
                    <button type="button" class="social-stat-btn" data-action="open-follow-list" data-kind="following" data-uid="${uid}"><b>${counts.following}</b><span>${t('dash.followingCount')}</span></button>
                    <div class="social-stat-btn" style="display:grid; place-items:center;"><b>${streakNow}</b><span>${t('ui.streak')}</span></div>
                </div>
                <div class="profile-list social-public-list">
                    <b>${t('ui.mainGym')}</b>
                    <div class="profile-log">${escapeHtml(mainGym)}</div>
                    <b>${t('ui.maxGradeByGym')}</b>
                    <div class="profile-timeline">${maxByGym || `<p class="profile-empty">-</p>`}</div>
                    <div class="profile-kpis" style="margin-top:10px;">
                        <div class="profile-kpi"><b>${totalRoutes}</b><span>${t('dash.totalSends')}</span></div>
                        <div class="profile-kpi"><b>${activeDays}</b><span>${t('dash.activeDays')}</span></div>
                        <div class="profile-kpi"><b>${streakNow}</b><span>${t('ui.currentStreak')}</span></div>
                    </div>
                    <b style="margin-top:8px; display:block;">${t('dash.latestActivities')}</b>
                    ${latestRows || `<p class="profile-empty">${t('dash.noPublicContent')}</p>`}
                </div>
            `;
            activePublicProfileUid = uid;
            wrap.querySelector('[data-action="public-follow-toggle"]')?.addEventListener('click', () => toggleFollowUser(uid));
            wrap.querySelectorAll('[data-action="open-follow-list"]').forEach(btn => btn.addEventListener('click', () => openSocialListModal(uid, btn.dataset.kind)));
        }

        function renderActivePublicProfile() {
            if (!activePublicProfileUid) return;
            const profileWrap = document.getElementById('social-profile-view');
            if (!profileWrap || profileWrap.style.display === 'none') return;
            renderPublicProfile(activePublicProfileUid).catch(() => {});

        function stopSocialCommentsSubscription() {
            if (typeof socialCommentsUnsubscriber === 'function') socialCommentsUnsubscriber();
            socialCommentsUnsubscriber = null;
        }

        async function openSocialCommentsModal(activityId) {
            if (!activityId || !activeUser) return;
            await ensureSocialActivityDoc(activityId);
            activeSocialCommentsActivityId = activityId;
            await markMyPostViewed(activityId).catch(() => {});
            const modal = document.getElementById('social-comments-modal');
            const list = document.getElementById('social-comments-list');
            const input = document.getElementById('social-comments-input');
            const sendBtn = document.getElementById('social-comments-send');
            if (!modal || !list || !input || !sendBtn) return;
            stopSocialCommentsSubscription();
            socialCommentsUnsubscriber = onSnapshot(
                query(collection(db, 'socialActivities', activityId, 'comments'), orderBy('timestamp', 'asc'), limit(200)),
                (snap) => {
                    const ownerRow = socialMyPostsActivities.find(a => a.id === activityId) || socialFeedById.get(activityId) || {};
                    const owner = ownerRow.user_id || ownerRow.userId || null;
                    const rows = snap.docs.map(d => ({ id: d.id, ...(d.data() || {}) }));
                    const commentCount = rows.length;
                    updateLocalInteractionState(activityId, { comment_count: commentCount });
                    list.innerHTML = rows.map(c => {
                        const canDelete = !!owner && owner === activeUser.uid;
                        const actions = canDelete ? `<div style="margin-top:6px;"><button type="button" class="btn-sec" data-action="modal-delete-comment" data-activity-id="${activityId}" data-comment-id="${c.id}">${t('ui.delete')}</button> <button type="button" class="btn-sec" data-action="modal-reply-comment" data-username="${escapeHtml(c.user_name || 'Climber')}">${t('ui.reply')}</button></div>` : '';
                        return `<div class="profile-log"><div><b>${escapeHtml(c.user_name || resolveUsername(c.user_id, 'Climber') || 'Climber')}${badgePillHtml(resolveUserHighestBadge(c.user_id))}</b></div><div>${escapeHtml(c.text || '')}</div><small>${escapeHtml(formatProfileDate(c.timestamp || ''))}</small>${actions}</div>`;
                    }).join('') || `<p class="profile-empty">${t('ui.noComments')}</p>`;
                    list.querySelectorAll('[data-action="modal-delete-comment"]').forEach(btn => btn.onclick = () => deleteActivityComment(btn.dataset.activityId, btn.dataset.commentId).catch(alertWriteError));
                    list.querySelectorAll('[data-action="modal-reply-comment"]').forEach(btn => btn.onclick = () => { input.value = `@${btn.dataset.username} `; input.focus(); });
                    renderFollowingFeed();
                    renderMyPublicationsFeed();
                    list.scrollTop = list.scrollHeight;
                },
                () => {
                    list.innerHTML = `<p class="profile-empty">${t('ui.loadCommentsError')}</p>`;
                }
            );
            sendBtn.onclick = async () => {
                const text = (input.value || '').trim();
                if (!text) return;
                sendBtn.disabled = true;
                try {
                    await addActivityComment(activityId, text);
                    input.value = '';
                } catch (e) {
                    alertWriteError(e);
                } finally {
                    sendBtn.disabled = false;
                }
            };
            input.onkeydown = (ev) => {
                if (ev.key === 'Enter') {
                    ev.preventDefault();
                    sendBtn.click();
                }
            };
            modal.classList.add('active');
            input.focus();
        }

        async function renderFollowingSection() {
            const usersList = document.getElementById('following-users-list');
            const progList = document.getElementById('following-progress-list');
            if (!usersList || !progList) return;

            const tabCommunity = document.getElementById('social-top-tab-community');
            const tabUsers = document.getElementById('social-top-tab-users');
            const tabMyPosts = document.getElementById('social-top-tab-my-posts');
            const panelCommunity = document.getElementById('social-community-panel');
            const panelUsers = document.getElementById('social-users-panel');
            const panelMyPosts = document.getElementById('social-my-posts-panel');

            if (tabCommunity && tabUsers && tabMyPosts && panelCommunity && panelUsers && panelMyPosts) {
                const applyTab = () => {
                    const isCommunity = socialTopTab === 'community';
                    const isUsers = socialTopTab === 'users';
                    const isMyPosts = socialTopTab === 'my_posts';
                    tabCommunity.classList.toggle('active', isCommunity);
                    tabUsers.classList.toggle('active', isUsers);
                    tabMyPosts.classList.toggle('active', isMyPosts);
                    panelCommunity.classList.toggle('active', isCommunity);
                    panelUsers.classList.toggle('active', isUsers);
                    panelMyPosts.classList.toggle('active', isMyPosts);
                };
                tabCommunity.onclick = () => { socialTopTab = 'community'; applyTab(); };
                tabUsers.onclick = () => { socialTopTab = 'users'; applyTab(); };
                tabMyPosts.onclick = () => { socialTopTab = 'my_posts'; applyTab(); };
                applyTab();
            }

                const historyUnsub = onSnapshot(collection(db, 'users', activeUser.uid, 'progressHistory'), (histSnap) => {
                    for (const k of Array.from(profileEntriesMap.keys())) if (k.startsWith('history__')) profileEntriesMap.delete(k);

                        const h = hd.data() || {};
                        const dateKey = getDateKeyFromAnyValue(h.eventDate || h.createdAt || h.updatedAt || h.date) || toYYYYMMDD(new Date());
                        profileEntriesMap.set(`history__${hd.id}`, {

                            routeId: h.routeId || null,
                            grade: h.grade || '-',

                            sendDate: dateKey,
                            tries: h.attempts || null,
                            date: h.createdAt || null

                const gymData = gymSnap.exists() ? gymSnap.data() : {};
                gymLevelOrderMap.set(gym.id, gradeSystemArrayToMap(gymData?.gradeSystem));
                const sectorsSnap = await getDocs(collection(db, 'gyms', gym.id, 'Sectors'));
                sectorsSnap.forEach(sec => {
                    const unsub = onSnapshot(collection(db, `gyms/${gym.id}/Sectors/${sec.id}/routes`), (routesSnap) => {
                        routesSnap.forEach(routeDoc => {
                            const routeData = routeDoc.data();
                            const reviewsPath = `gyms/${gym.id}/Sectors/${sec.id}/routes/${routeDoc.id}/reviews`;
                            const keyPrefix = `${gym.id}__${sec.id}__${routeDoc.id}__`;
                            const reviewsUnsub = onSnapshot(collection(db, reviewsPath), (revSnap) => {
                                for (const k of Array.from(profileEntriesMap.keys())) if (k.startsWith(keyPrefix)) profileEntriesMap.delete(k);
                                revSnap.forEach(rev => {
                                    const r = rev.data();
                                    // Review must stay independent from climbed progress for the current user.
                                    if (activeUser?.uid && r.userId === activeUser.uid) return;
                                    const dt = r.sendDate || (r.date?.toDate ? toYYYYMMDD(r.date.toDate()) : toYYYYMMDD(new Date()));
                                    profileEntriesMap.set(`${keyPrefix}${rev.id}`, { userId: r.userId || null, userName: resolveUsername(r.userId, r.userName || 'Climber'), gymId: gym.id, gymName: gym.name, sectorName: sec.data().name || sec.id, sectorId: sec.id, routeId: routeDoc.id, grade: r.climbedGrade || routeData.grade || '-', gradeOrder: Number.isFinite(r.climbedGradeOrder) ? r.climbedGradeOrder : null, outcome: r.outcome || 'climbed', sendDate: dt, tries: r.tries || null, date: r.date || null });
                                });
                                renderProfileDashboard();
                                renderFollowingSection();

                            profileUnsubscribers.push(reviewsUnsub);

        function stopGymCoverageListeners() {
            while (gymCoverageUnsubscribers.length) {
                const unsub = gymCoverageUnsubscribers.pop();
                if (typeof unsub === 'function') unsub();
            }
        }

        function normalizeDateFromReview(reviewData) {
            if (reviewData?.sendDate) {
                const dt = new Date(reviewData.sendDate);
                if (!Number.isNaN(dt.getTime())) return dt;
            }
            if (reviewData?.date?.toDate) {
                const dt = reviewData.date.toDate();
                if (!Number.isNaN(dt.getTime())) return dt;
            }
            if (reviewData?.date) {
                const dt = new Date(reviewData.date);
                if (!Number.isNaN(dt.getTime())) return dt;
            }
            return null;
        }

        function renderGymCoverage(stats) {
            const wrap = document.getElementById('user-gym-detail-coverage');
            if (!wrap) return;
            const totalUsers = stats?.totalUsers || 0;
            const activeUsers = stats?.activeUsers || 0;
            const coveragePct = stats?.coveragePct || 0;
            const legendTemplate = t('gym.coverageLegend');
            const legend = legendTemplate
                .replace('{{active}}', String(activeUsers))
                .replace('{{total}}', String(totalUsers));
            wrap.innerHTML = `
                <div class="gym-coverage-grid">
                    <div class="gym-coverage-kpi"><b>${totalUsers}</b><span>${t('gym.totalGymUsers')}</span></div>
                    <div class="gym-coverage-kpi"><b>${activeUsers}</b><span>${t('gym.active30dUsers')}</span></div>
                    <div class="gym-coverage-kpi"><b>${coveragePct}%</b><span>${t('gym.coveragePercent')}</span></div>
                </div>
                <div class="gym-coverage-bar" aria-label="${t('gym.coveragePercent')}">
                    <div class="gym-coverage-fill" style="width:${coveragePct}%"></div>
                </div>
                <div class="gym-coverage-meta">${escapeHtml(legend)}</div>
            `;
        }

        function subscribeGymCoverage(gymId) {
            activeGymDetailId = gymId;
            stopGymCoverageListeners();
            currentGymCoverage = { totalUsers: 0, activeUsers: 0, coveragePct: 0 };
            renderGymCoverage(currentGymCoverage);

            const sectorRouteUnsubs = new Map();
            const routeReviewUnsubs = new Map();
            const reviewEntries = new Map();
            const activeAfter = new Date();
            activeAfter.setDate(activeAfter.getDate() - 30);

            function recalcCoverage() {
                const allUsers = new Set();
                const activeUsers = new Set();
                for (const entry of reviewEntries.values()) {
                    if (!entry?.uid) continue;
                    allUsers.add(entry.uid);
                    if (entry.active) activeUsers.add(entry.uid);
                }
                const total = allUsers.size;
                const active = activeUsers.size;
                const pct = total > 0 ? Math.round((active / total) * 100) : 0;
                currentGymCoverage = { totalUsers: total, activeUsers: active, coveragePct: pct };
                renderGymCoverage(currentGymCoverage);
            }

            function clearRouteReviewEntries(routeKey) {
                const prefix = `${routeKey}::`;
                for (const k of Array.from(reviewEntries.keys())) {
                    if (k.startsWith(prefix)) reviewEntries.delete(k);
                }
            }

            function removeRoute(routeKey) {
                const unsub = routeReviewUnsubs.get(routeKey);
                if (typeof unsub === 'function') unsub();
                routeReviewUnsubs.delete(routeKey);
                clearRouteReviewEntries(routeKey);
            }

            function removeSector(sectorId) {
                const routesUnsub = sectorRouteUnsubs.get(sectorId);
                if (typeof routesUnsub === 'function') routesUnsub();
                sectorRouteUnsubs.delete(sectorId);
                for (const routeKey of Array.from(routeReviewUnsubs.keys())) {
                    if (routeKey.startsWith(`${sectorId}/`)) removeRoute(routeKey);
                }
            }

            const sectorsUnsub = onSnapshot(collection(db, `gyms/${gymId}/Sectors`), (sectorsSnap) => {
                const validSectors = new Set(sectorsSnap.docs.map(d => d.id));

                sectorsSnap.forEach((sectorDoc) => {
                    if (sectorRouteUnsubs.has(sectorDoc.id)) return;
                    const routesPath = `gyms/${gymId}/Sectors/${sectorDoc.id}/routes`;
                    const routesUnsub = onSnapshot(collection(db, routesPath), (routesSnap) => {
                        const validRoutes = new Set(routesSnap.docs.map(d => `${sectorDoc.id}/${d.id}`));

                        routesSnap.forEach((routeDoc) => {
                            const routeKey = `${sectorDoc.id}/${routeDoc.id}`;
                            if (routeReviewUnsubs.has(routeKey)) return;
                            const reviewsPath = `gyms/${gymId}/Sectors/${sectorDoc.id}/routes/${routeDoc.id}/reviews`;
                            const reviewsUnsub = onSnapshot(collection(db, reviewsPath), (reviewsSnap) => {
                                clearRouteReviewEntries(routeKey);
                                reviewsSnap.forEach((revDoc) => {
                                    const review = revDoc.data() || {};
                                    const uid = review.userId || null;
                                    const dt = normalizeDateFromReview(review);
                                    const active = !!(dt && dt >= activeAfter);
                                    reviewEntries.set(`${routeKey}::${revDoc.id}`, { uid, active });
                                });
                                recalcCoverage();
                            });
                            routeReviewUnsubs.set(routeKey, reviewsUnsub);
                        });

                        for (const existingRouteKey of Array.from(routeReviewUnsubs.keys())) {
                            if (!existingRouteKey.startsWith(`${sectorDoc.id}/`)) continue;
                            if (!validRoutes.has(existingRouteKey)) removeRoute(existingRouteKey);
                        }
                        recalcCoverage();
                    });
                    sectorRouteUnsubs.set(sectorDoc.id, routesUnsub);
                });

                for (const sectorId of Array.from(sectorRouteUnsubs.keys())) {
                    if (!validSectors.has(sectorId)) removeSector(sectorId);
                }
                recalcCoverage();
            });

            gymCoverageUnsubscribers.push(() => {
                sectorsUnsub();
                for (const unsub of sectorRouteUnsubs.values()) if (typeof unsub === 'function') unsub();
                for (const unsub of routeReviewUnsubs.values()) if (typeof unsub === 'function') unsub();
                sectorRouteUnsubs.clear();
                routeReviewUnsubs.clear();
                reviewEntries.clear();
            });
        }

            if (!realUserGymId || !file) return null;

            const safeName = String(file.name || `${kind}.jpg`).replace(/[^a-zA-Z0-9_.-]/g, '_');
            const path = `gymMedia/${realUserGymId}/${kind}_${Date.now()}_${safeName}`;
            const mediaRef = ref(storage, path);
            await uploadBytes(mediaRef, file, { contentType: file.type || 'image/jpeg' });
            const url = await getDownloadURL(mediaRef);
            return { url, path };
        }

        function buildCoverageStats(days) {
            const now = new Date();
            const afterDays = new Date(now);
            afterDays.setDate(afterDays.getDate() - days);
            const after30 = new Date(now);
            after30.setDate(after30.getDate() - 30);
            const periods = [7, 30, 90];

            const gymUsers = new Set();
            const gymActive30 = new Set();
            const gymActivePeriod = new Set();
            const gymTrend = new Map(periods.map(d => [d, new Set()]));
            const sectors = new Map();
            const userActivity = new Map();
            const userActiveDays = new Map();
            const userMainSectorCount = new Map();
            const activeNowWindow = new Set();
            const activePrevWindow = new Set();
            let routesLast30Days = 0;
            const afterPrevWindow = new Date(now);
            afterPrevWindow.setDate(afterPrevWindow.getDate() - (days * 2));
            for (const [routeKey, reviewsMap] of adminCoverageSnapshot.reviewsByRoute.entries()) {
                if (!routeMatchesAdminFilters(routeKey, reviewsMap)) continue;
                const [sectorId] = routeKey.split('/');
                if (!sectors.has(sectorId)) {
                    sectors.set(sectorId, {
                        sectorId,
                        sectorName: adminCoverageSnapshot.sectorNames.get(sectorId) || sectorId,
                        routes: new Set(),
                        users: new Set(),
                        active30: new Set(),
                        activePeriod: new Set(),
                        trend: new Map(periods.map(d => [d, new Set()])),
                        userActivity: new Map(),
                        userDays: new Map()
                    });
                }
                const sec = sectors.get(sectorId);
                sec.routes.add(routeKey);

                for (const review of reviewsMap.values()) {
                    if (!review.uid) continue;
                    gymUsers.add(review.uid);
                    sec.users.add(review.uid);
                    if (review.dt && review.dt >= after30) { gymActive30.add(review.uid); sec.active30.add(review.uid); }
                    if (review.dt && review.dt >= afterDays) { gymActivePeriod.add(review.uid); sec.activePeriod.add(review.uid); activeNowWindow.add(review.uid); }
                    if (review.dt && review.dt >= afterPrevWindow && review.dt < afterDays) activePrevWindow.add(review.uid);
                    for (const p of periods) {
                        const ap = new Date(now);
                        ap.setDate(ap.getDate() - p);
                        if (review.dt && review.dt >= ap) {
                            gymTrend.get(p).add(review.uid);
                            sec.trend.get(p).add(review.uid);
                        }
                    }
                    sec.userActivity.set(review.uid, (sec.userActivity.get(review.uid) || 0) + 1);
                    if (review.dt) {
                        const dKey = review.dt.toISOString().slice(0, 10);
                        if (!sec.userDays.has(review.uid)) sec.userDays.set(review.uid, new Set());
                        sec.userDays.get(review.uid).add(dKey);
                    }
                }
            }

            const sectorsData = Array.from(sectors.values()).map(sec => {
                const topUsers = Array.from(sec.userActivity.entries())
                    .sort((a,b) => b[1]-a[1])
                    .slice(0, 3)
                    .map(([uid, count]) => ({ username: resolveUsername(uid, 'Climber'), count }));
                for (const [uid, count] of sec.userActivity.entries()) {
                    userActivity.set(uid, (userActivity.get(uid) || 0) + count);
                    if (!userMainSectorCount.has(uid)) userMainSectorCount.set(uid, new Map());
                    userMainSectorCount.get(uid).set(sec.sectorName, count);
                }
                for (const [uid, daySet] of sec.userDays.entries()) {
                    userActiveDays.set(uid, Math.max(userActiveDays.get(uid) || 0, daySet.size));
                }
                routesLast30Days += sec.routes.size;
                const total = sec.users.size;
                const active = sec.activePeriod.size;
                const coverage = total > 0 ? Math.round((active/total)*100) : 0;
                return {
                    sectorId: sec.sectorId,
                    sectorName: sec.sectorName,
                    routeCount: sec.routes.size,
                    totalUsers: total,
                    active30: sec.active30.size,
                    activePeriod: active,
                    coveragePct: coverage,
                    trend: periods.map(p => ({ days: p, users: sec.trend.get(p).size })),
                    topUsers
                };
            }).sort((a,b)=>b.activePeriod-a.activePeriod);

            const gymTotal = gymUsers.size;
            const gymPeriodActive = gymActivePeriod.size;
            const userMainSector = new Map();
            for (const [uid, sectorsMap] of userMainSectorCount.entries()) {
                const top = Array.from(sectorsMap.entries()).sort((a,b) => b[1]-a[1])[0];
                userMainSector.set(uid, top ? top[0] : '-');
            }
            const nowWindowCount = activeNowWindow.size;
            const prevWindowCount = activePrevWindow.size;
            const trendDeltaPct = prevWindowCount > 0
                ? Math.round(((nowWindowCount - prevWindowCount) / prevWindowCount) * 100)
                : (nowWindowCount > 0 ? 100 : 0);
            return {
                periodDays: days,
                totalUsersGym: gymTotal,
                activeUsersLast30Days: gymActive30.size,
                selectedCoverage: gymTotal > 0 ? Math.round((gymPeriodActive/gymTotal)*100) : 0,
                trend: periods.map(p => ({ days: p, users: gymTrend.get(p).size })),
                sectors: sectorsData,
                routesLast30Days,
                trendDeltaPct,
                activityTrend: { now: nowWindowCount, prev: prevWindowCount },
                userActivity,
                userActiveDays,
                userMainSector
            };
        }

        function getMillisFromAny(value) {
            if (!value) return 0;
            if (typeof value?.toMillis === 'function') return value.toMillis();
            if (typeof value === 'number') return value;
            if (typeof value === 'string') {
                const t = Date.parse(value);
                return Number.isFinite(t) ? t : 0;
            }
            return 0;
        }

        function buildLiveSuperadminKpis(state) {
            const usersSnap = state.users;
            const gymsSnap = state.gyms;
            const sectorsSnap = state.sectors;
            const routesSnap = state.routes;

            const now = Date.now();
            const d7 = now - 7 * 24 * 60 * 60 * 1000;
            const d30 = now - 30 * 24 * 60 * 60 * 1000;
            const d60 = now - 60 * 24 * 60 * 60 * 1000;

            let totalUsers = usersSnap?.size || 0;
            let activeUsers7d = 0;
            let activeUsers30d = 0;
            let users30d = 0;
            let prevUsers30d = 0;
            const cityMap = new Map();

            if (usersSnap && typeof usersSnap.forEach === 'function') {
                usersSnap.forEach((d) => {
                    const u = d.data() || {};
                    const lastMs = getMillisFromAny(u.lastActiveAt) || getMillisFromAny(u.updatedAt) || getMillisFromAny(u.createdAt);
                    const createdMs = getMillisFromAny(u.createdAt);
                    if (lastMs >= d7) activeUsers7d += 1;
                    if (lastMs >= d30) activeUsers30d += 1;
                    if (createdMs >= d30) users30d += 1;
                    if (createdMs >= d60 && createdMs < d30) prevUsers30d += 1;
                    const city = String(u.city || '').trim();
                    if (city) cityMap.set(city, (cityMap.get(city) || 0) + 1);
                });
            }

            const activeGyms = gymsSnap?.size || 0;
            const sectorsCount = sectorsSnap?.size || 0;
            const routesCount = routesSnap?.size || 0;
            const avgRoutesPerUser = totalUsers > 0 ? Number((routesCount / totalUsers).toFixed(2)) : 0;
            const monthlyUserGrowthPct = prevUsers30d > 0
                ? Number((((users30d - prevUsers30d) / prevUsers30d) * 100).toFixed(2))
                : (users30d > 0 ? 100 : 0);
            const monthlyRetentionPct = totalUsers > 0 ? Number(((activeUsers30d / totalUsers) * 100).toFixed(2)) : 0;

            const cityDifficultyDistribution = Array.from(cityMap.entries())
                .sort((a, b) => b[1] - a[1])
                .slice(0, 12)
                .map(([city, users]) => ({ city, distribution: `${users} utenti registrati` }));

            return {
                totalUsers,
                activeUsers7d,
                activeUsers30d,
                activeGyms,
                sectorsCount,
                routesCount,
                avgRoutesPerUser,
                monthlyUserGrowthPct,
                monthlyRetentionPct,
                activeVsRegisteredPct: monthlyRetentionPct,
                cityDifficultyDistribution
            };
        }

        }

        function subscribeSuperadminDashboard() {
            if (typeof superadminKpiUnsub === 'function') {
                superadminKpiUnsub();
                superadminKpiUnsub = null;
            }

            const state = { users: null, gyms: null, sectors: null, routes: null, analytics: null };
            const unsubs = [];

            const renderFromState = () => {
                const live = buildLiveSuperadminKpis(state) || {};
                const analytics = state.analytics || {};
                const merged = {
                    ...live,
                    ...analytics,
                    totalUsers: live.totalUsers ?? analytics.totalUsers ?? 0,
                    activeUsers7d: live.activeUsers7d ?? analytics.activeUsers7d ?? 0,
                    activeUsers30d: live.activeUsers30d ?? analytics.activeUsers30d ?? 0,
                    activeGyms: live.activeGyms ?? analytics.activeGyms ?? 0,
                    sectorsCount: live.sectorsCount ?? analytics.sectorsCount ?? 0,
                    routesCount: live.routesCount ?? analytics.routesCount ?? 0,
                    avgRoutesPerUser: live.avgRoutesPerUser ?? analytics.avgRoutesPerUser ?? 0,
                    monthlyUserGrowthPct: live.monthlyUserGrowthPct ?? analytics.monthlyUserGrowthPct ?? 0,
                    monthlyRetentionPct: live.monthlyRetentionPct ?? analytics.monthlyRetentionPct ?? 0,
                    activeVsRegisteredPct: live.activeVsRegisteredPct ?? analytics.activeVsRegisteredPct ?? 0,
                    cityDifficultyDistribution: (analytics.cityDifficultyDistribution && analytics.cityDifficultyDistribution.length)
                        ? analytics.cityDifficultyDistribution
                        : (live.cityDifficultyDistribution || [])
                };
                renderSuperadminDashboard(merged);
            };

            const onErr = (label) => (err) => {
                console.warn(`[superadmin-dashboard] ${label} snapshot error`, err);
                renderFromState();
            };

            unsubs.push(onSnapshot(collection(db, 'users'), (snap) => { state.users = snap; renderFromState(); }, onErr('users')));
            unsubs.push(onSnapshot(collection(db, 'gyms'), (snap) => { state.gyms = snap; renderFromState(); }, onErr('gyms')));
            unsubs.push(onSnapshot(collectionGroup(db, 'Sectors'), (snap) => { state.sectors = snap; renderFromState(); }, onErr('sectors')));
            unsubs.push(onSnapshot(collectionGroup(db, 'routes'), (snap) => { state.routes = snap; renderFromState(); }, onErr('routes')));
            unsubs.push(onSnapshot(doc(db, 'analytics', 'superadmin_kpis'), (snap) => {
                state.analytics = snap.exists() ? (snap.data() || {}) : {};
                renderFromState();
            }, () => {
                state.analytics = {};
                renderFromState();
            }));

            superadminKpiUnsub = () => {
                for (const u of unsubs) { if (typeof u === 'function') u(); }
            };
        }

        async function renderAdminUsersTab(stats) {
            const usersWrap = document.getElementById('admin-users-table');
            if (!usersWrap) return;
            const renderSeq = ++adminUsersRenderSeq;

            const users = new Map();
            const sectorClimbs = new Map();
            const recent = [];
            const now = new Date();
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

            const ensureUser = (uid) => {
                const key = uid || 'anon';
                if (!users.has(key)) {
                    users.set(key, {
                        uid: key,
                        username: resolveUsername(uid, 'Utente'),
                        climbedRouteKeys: new Set(),
                        climbedMonthlyRouteKeys: new Set(),
                        sectorsTried: new Set(),
                        sectorCount: new Map(),
                        reviews: 0,
                        activeDays: new Set(),
                        monthlyActiveDays: new Set(),
                        hardestMonthlyOrder: -1,
                        lastActivity: null
                    });
                }
                return users.get(key);
            };

            const toDate = (v) => {
                if (!v) return null;
                const d = new Date(v);
                return Number.isNaN(d.getTime()) ? null : d;
            };

            const updLastActivity = (u, dt) => {
                if (!dt) return;
                if (!u.lastActivity || dt > u.lastActivity) u.lastActivity = dt;
            };

            const addRecent = (entry) => {
                recent.push(entry);
            };

            let totalCompletedAscents = 0;
            const historicalSectors = new Set();

            const ingestProgressRow = (p = {}, fallbackUid = 'anon', fallbackRouteId = 'unknown') => {
                const state = String(p.state || '').toLowerCase();
                if (!(state === 'climbed' || state === 'completed')) return;
                const uid = p.userId || p.userAuthUid || p.uid || fallbackUid || 'anon';
                const sectorId = String(p.sectorId || 'unknown');
                const routeId = String(p.routeId || fallbackRouteId || 'unknown');
                const routeKey = `${sectorId}:${routeId}`;
                const sectorName = adminCoverageSnapshot.sectorNames.get(sectorId) || sectorId;
                const dt = toDate(p.updatedAt || p.completionDate || p.eventDate || p.createdAt);
                const dayKey = dt ? toYYYYMMDD(dt) : '';

                const u = ensureUser(uid);
                u.climbedRouteKeys.add(routeKey);
                u.sectorsTried.add(sectorName);
                u.sectorCount.set(sectorName, (u.sectorCount.get(sectorName) || 0) + 1);
                if (dayKey) u.activeDays.add(dayKey);

                totalCompletedAscents += 1;
                historicalSectors.add(sectorName);
                sectorClimbs.set(sectorName, (sectorClimbs.get(sectorName) || 0) + 1);
                updLastActivity(u, dt);

                if (dt && dt >= monthStart) {
                    u.climbedMonthlyRouteKeys.add(routeKey);
                    if (dayKey) u.monthlyActiveDays.add(dayKey);
                    const routeMeta = adminCoverageSnapshot.routeMeta.get(`${sectorId}/${routeId}`) || {};
                    const ord = Number.isFinite(routeMeta.gradeOrder) ? Number(routeMeta.gradeOrder) : Number(p.finalGradeOrder);
                    if (Number.isFinite(ord)) u.hardestMonthlyOrder = Math.max(u.hardestMonthlyOrder, ord);
                }

                addRecent({
                    dt: dt || new Date(),
                    uid: u.uid,
                    username: u.username,
                    sectorName,
                    grade: p.finalGrade || p.routeGrade || '-',
                    color: (adminCoverageSnapshot.routeMeta.get(`${sectorId}/${routeId}`)?.color) || resolveRouteColorFromStores({ gymId: realUserGymId, sectorId, routeId }),
                    colorLabel: adminCoverageSnapshot.routeMeta.get(`${sectorId}/${routeId}`)?.colorLabel || '',
                    hasText: false
                });
            };

            let progressLoaded = false;
            try {
                const progressSnap = await getDocs(query(collectionGroup(db, 'routeProgress'), where('gymId', '==', realUserGymId)));
                progressSnap.forEach((d) => ingestProgressRow(d.data() || {}, d.ref.parent?.parent?.id || 'anon', d.id));
                progressLoaded = progressSnap.size > 0;
            } catch (_) {
                progressLoaded = false;
            }

            if (!progressLoaded) {
                try {
                    const usersSnap = await getDocs(collection(db, 'users'));
                    for (const uDoc of usersSnap.docs) {
                        try {
                            const q = query(collection(db, 'users', uDoc.id, 'routeProgress'), where('gymId', '==', realUserGymId));
                            const rpSnap = await getDocs(q);
                            rpSnap.forEach((d) => ingestProgressRow(d.data() || {}, uDoc.id, d.id));
                        } catch (_) {}
                    }
                } catch (_) {
                    // fallback finale: nessun dato progress disponibile
                }
            }

            // Reviews: contano solo come recensioni e attività recente, NON come scalate
            for (const [routeKey, reviewsMap] of adminCoverageSnapshot.reviewsByRoute.entries()) {
                if (!routeMatchesAdminFilters(routeKey, reviewsMap)) continue;
                const meta = adminCoverageSnapshot.routeMeta.get(routeKey) || {};
                const sectorId = meta.sectorId || routeKey.split('/')[0] || 'unknown';
                const sectorName = adminCoverageSnapshot.sectorNames.get(sectorId) || sectorId;
                for (const rv of reviewsMap.values()) {
                    const u = ensureUser(rv?.uid || 'anon');
                    u.reviews += 1;
                    const dt = rv?.dt instanceof Date ? rv.dt : null;
                    updLastActivity(u, dt);
                    addRecent({
                        dt: dt || new Date(),
                        uid: u.uid,
                        username: u.username,
                        sectorName,
                        grade: meta.grade || '-',
                        color: meta.color || '#9CA3BC',
                        colorLabel: meta.colorLabel || '',
                        hasText: !!String(rv?.text || '').trim()
                    });
                }
            }

            const uidList = Array.from(new Set(Array.from(users.keys()).filter(uid => uid && uid !== 'anon')));
            await Promise.all(uidList.map(async (uid) => {
                const resolved = await resolveAdminUsername(uid);
                const u = users.get(uid);
                if (u) u.username = resolved || u.username || 'Utente';
            }));

            const usersRows = Array.from(users.values()).map(u => {
                const mainSectorEntry = Array.from(u.sectorCount.entries()).sort((a,b)=>b[1]-a[1])[0];
                return {
                    ...u,
                    username: String(u.username || '').trim() || 'Utente',
                    climbedCount: u.climbedRouteKeys.size,
                    climbedMonthlyCount: u.climbedMonthlyRouteKeys.size,
                    sectorsCount: u.sectorsTried.size,
                    activeDaysCount: u.activeDays.size,
                    monthlyActiveDaysCount: u.monthlyActiveDays.size,
                    mainSector: mainSectorEntry ? mainSectorEntry[0] : '-',
                    lastActivityLabel: u.lastActivity ? formatProfileDate(u.lastActivity.toISOString()) : '-'
                };
            }).sort((a,b)=>(b.climbedCount-a.climbedCount) || (b.reviews-a.reviews) || String(a.username).localeCompare(String(b.username)));

            if (renderSeq !== adminUsersRenderSeq) return;

            const activeUsersHistorical = usersRows.filter(u => u.climbedCount > 0).length;
            const totalReviews = usersRows.reduce((acc,u)=>acc+u.reviews,0);

            const activeIn = (days) => {
                const cutoff = new Date(now.getTime() - (days * 24 * 60 * 60 * 1000));
                return usersRows.filter(u => u.lastActivity && u.lastActivity >= cutoff).length;
            };

            const topMonth = usersRows.slice().sort((a,b)=>(b.climbedMonthlyCount-a.climbedMonthlyCount) || (b.monthlyActiveDaysCount-a.monthlyActiveDaysCount) || (b.hardestMonthlyOrder-a.hardestMonthlyOrder) || String(a.username).localeCompare(String(b.username))).slice(0,3);
            const climber = topMonth[0] || null;

            const sectorTop = Array.from(sectorClimbs.entries())
                .map(([name, climbs]) => ({ name, climbs }))
                .sort((a,b)=>b.climbs-a.climbs)
                .slice(0,3);

            const recentRows = (() => {
                const seen = new Set();
                return recent
                    .sort((a,b)=> (b.dt?.getTime?.() || 0) - (a.dt?.getTime?.() || 0))
                    .filter(ev => {
                        const k = `${ev.uid || ''}__${ev.hasText ? 'review' : 'climb'}__${ev.sectorName || ''}__${ev.grade || ''}__${ev.dt?.toISOString?.() || ''}`;
                        if (seen.has(k)) return false;
                        seen.add(k);
                        return true;
                    })
                    .slice(0,4);
            })();

            const tableRows = usersRows.slice(0,10).map((u,idx)=>`<tr>
                <td>${idx+1}</td>
                <td><b>${escapeHtml(u.username)}</b>${badgePillHtml(resolveUserHighestBadge(u.uid))}</td>
                <td>${u.climbedCount}</td>
                <td>${u.activeDaysCount}</td>
                <td>${escapeHtml(u.mainSector)}</td>
            </tr>`).join('') || `<tr><td colspan="5">-</td></tr>`;

            usersWrap.innerHTML = `
                <div class="admin-users-mobile">
                    <details class="admin-block-card admin-users-details" open>
                        <summary>1️⃣ Panoramica utenti</summary>
                        <div class="admin-users-kpi-grid" style="margin-top:8px;">
                            <div class="admin-users-kpi"><b>👥 ${activeUsersHistorical}</b><span>Utenti attivi</span></div>
                            <div class="admin-users-kpi"><b>🧗 ${totalCompletedAscents}</b><span>Vie scalate</span></div>
                            <div class="admin-users-kpi"><b>🧩 ${historicalSectors.size}</b><span>Settori provati</span></div>
                            <div class="admin-users-kpi"><b>⭐ ${totalReviews}</b><span>Recensioni lasciate</span></div>
                        </div>
                    </details>

                    <details class="admin-block-card admin-users-details" open>
                        <summary>2️⃣ 📈 Attività utenti</summary>
                        <div class="admin-users-list" style="margin-top:8px;">
                            <div class="admin-users-list-item"><span>Attività totale registrata</span><b>${totalCompletedAscents}</b></div>
                            <div class="admin-users-list-item"><span>Utenti attivi ultimi 7 giorni</span><b>${activeIn(7)}</b></div>
                            <div class="admin-users-list-item"><span>Utenti attivi ultimi 30 giorni</span><b>${activeIn(30)}</b></div>
                            <div class="admin-users-list-item"><span>Utenti attivi ultimi 90 giorni</span><b>${activeIn(90)}</b></div>
                        </div>
                    </details>

                    <details class="admin-block-card admin-users-details" open>
                        <summary>3️⃣ 🏆 Top utenti del mese</summary>
                        <div class="admin-users-list" style="margin-top:8px;">
                            ${topMonth.map((u,idx)=>`<div class="admin-users-list-item"><span>${idx+1}. ${escapeHtml(u.username)}</span><b>${u.climbedMonthlyCount} vie scalate</b></div>`).join('') || `<p class="admin-feedback-empty">${t('common.noData')}</p>`}
                        </div>
                    </details>

                    <details class="admin-block-card admin-users-details" open>
                        <summary>4️⃣ 🔥 Climber del mese</summary>
                        ${climber ? `<div class="admin-users-list" style="margin-top:8px;"><div class="admin-users-list-item"><span><b>${escapeHtml(climber.username)}</b></span><b>${climber.climbedMonthlyCount} vie scalate</b></div><div class="admin-users-list-item"><span>Giorni attivi nel mese</span><b>${climber.monthlyActiveDaysCount}</b></div></div>` : `<p class="admin-feedback-empty" style="margin-top:8px;">${t('common.noData')}</p>`}
                    </details>

                    <details class="admin-block-card admin-users-details" open>
                        <summary>5️⃣ Tabella principale utenti</summary>
                        <div class="admin-users-table-wrap" style="margin-top:8px;">
                            <table>
                                <tr><th>#</th><th>Username</th><th>Vie scalate</th><th>Giorni attivi</th><th>Settore principale</th></tr>
                                ${tableRows}
                            </table>
                        </div>
                    </details>

                    <details class="admin-block-card admin-users-details" open>
                        <summary>7️⃣ 📊 Settori più frequentati</summary>
                        <div class="admin-users-list" style="margin-top:8px;">
                            ${sectorTop.map(s=>`<div class="admin-users-list-item"><span>${escapeHtml(s.name)}</span><b>${s.climbs} scalate</b></div>`).join('') || `<p class="admin-feedback-empty">${t('common.noData')}</p>`}
