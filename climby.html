<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="theme-color" content="#0F1720">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Climby | Pro Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root {
            --bg: #f4f6ff;
            --bg-soft: radial-gradient(circle at 8% 4%, rgba(255, 106, 180, 0.12), transparent 34%), radial-gradient(circle at 94% 2%, rgba(122, 92, 255, 0.18), transparent 42%), radial-gradient(circle at 50% 100%, rgba(63, 151, 255, 0.14), transparent 45%), linear-gradient(160deg, #f7f2ff 0%, #f4f7ff 48%, #eff5ff 100%);
            --card: rgba(255, 255, 255, 0.92);
            --surface-elevated: rgba(255, 255, 255, 0.97);
            --text: #1b2241;
            --muted: #6d7694;
            --text-disabled: #9ca3bc;
            --border: rgba(120, 134, 175, 0.22);
            --primary: #6f4dff;
            --primary-hover: #5b3bdf;
            --primary-dim: rgba(111, 77, 255, 0.14);
            --accent: #4b6fff;
            --danger: #ff5d85;
            --yellow: #ffb245;
            --text-on-primary: #ffffff;
            --gradient-primary: linear-gradient(125deg, #ff63c2 0%, #7b54ff 48%, #4396ff 100%);
            --touch: 44px;
            --radius: 16px;
            --radius-sm: 12px;
            --safe-top: env(safe-area-inset-top, 0);
            --safe-bottom: env(safe-area-inset-bottom, 0);
            --safe-left: env(safe-area-inset-left, 0);
            --safe-right: env(safe-area-inset-right, 0);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            margin: 0;
            background: var(--bg);
            background-image: var(--bg-soft);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            min-height: 100dvh;
            min-height: 100vh;
            overflow-x: hidden;
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
            padding-bottom: var(--safe-bottom);
        }
        h1 { font-size: 28px; font-weight: 600; line-height: 1.2; }
        h2 { font-size: 22px; font-weight: 600; line-height: 1.25; }
        h3, h4 { font-weight: 600; }
        .view { display: none; min-height: 100dvh; min-height: 100vh; width: 100%; }
        .view.active { display: flex; flex-direction: column; }
        .container {
            padding: 20px 20px calc(100px + var(--safe-bottom));
            padding-left: max(20px, var(--safe-left));
            padding-right: max(20px, var(--safe-right));
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* UI – touch-optimized */
        .card {
            background: var(--card);
            padding: 18px 20px;
            border-radius: var(--radius);
            margin-bottom: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 24px rgba(63, 80, 124, 0.09);
            min-height: var(--touch);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .card:active { opacity: 0.95; }
        .btn-main {
            width: 100%;
            min-height: 52px;
            padding: 16px 24px;
            background: var(--gradient-primary);
            color: var(--text-on-primary);
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: normal;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 8px 20px rgba(102, 85, 194, 0.3);
        }
        .btn-main:hover { filter: brightness(0.96); }
        .btn-main:active { transform: scale(0.98); }
        .btn-sec {
            min-height: var(--touch);
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.95rem;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-sec:active { background: var(--surface-elevated); }
        .btn-update { min-height: 40px; padding: 10px 16px; background: var(--accent); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; }
        .btn-danger { min-height: 52px; background: var(--danger); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; width: 100%; margin-top: 12px; font-weight: 600; font-size: 1rem; }
        input, select, textarea {
            width: 100%;
            min-height: 52px;
            padding: 14px 18px;
            margin: 10px 0;
            background: rgba(255,255,255,0.95);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-sm);
            font-size: 16px;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }
        textarea { min-height: 100px; resize: vertical; }

        /* Dashboard Admin Table */
        table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.9rem; }
        th, td { text-align: left; padding: 14px 12px; border-bottom: 1px solid var(--border); }
        th { color: var(--text); font-weight: 600; font-size: 0.9rem; }
        .admin-coverage-toolbar { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
        .admin-coverage-toolbar select { min-height:44px; max-width:220px; margin:0; }
        .admin-coverage-grid { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:10px; }
        .admin-coverage-kpi { border:1px solid var(--border); border-radius:12px; padding:12px; background:var(--card); }
        .admin-coverage-kpi b { display:block; font-size:1.2rem; color:var(--text); }
        .admin-coverage-kpi span { display:block; margin-top:2px; font-size:0.8rem; color:var(--muted); }
        .admin-donut { width:86px; height:86px; border-radius:50%; display:grid; place-items:center; margin-left:auto; background:conic-gradient(var(--accent) 0 0%, rgba(255,255,255,0.06) 0 100%); }
        .admin-donut-inner { width:62px; height:62px; border-radius:50%; background:var(--card); display:grid; place-items:center; font-size:0.8rem; color:var(--text); border:1px solid var(--border); }
        .admin-trend { margin-top:12px; display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
        .admin-trend-item { border:1px solid var(--border); border-radius:10px; background:var(--card); padding:8px; }
        .admin-trend-bar { height:8px; border-radius:999px; background:rgba(255,255,255,0.06); overflow:hidden; margin-top:6px; }
        .admin-trend-bar > i { display:block; height:100%; background: var(--primary); }
        .admin-sector-coverage-list { margin-top:14px; display:grid; gap:10px; }
        .admin-sector-coverage-card { border:1px solid var(--border); border-radius:12px; background:var(--card); padding:12px; }
        .admin-sector-coverage-head { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:8px; }
        .admin-sector-top-list { margin:8px 0 0 0; padding-left:18px; color:var(--text); font-size:0.9rem; }
        .admin-sector-top-list li { margin:3px 0; }
        .admin-gym-form { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px; }
        .admin-gym-form .full { grid-column: 1 / -1; }
        .admin-gym-form h5 { margin:8px 0 2px; color: var(--text); font-size:0.95rem; }
        .admin-grade-setup-card textarea { min-height: 140px; }
        .admin-layout { display:grid; grid-template-columns:220px minmax(0,1fr); gap:18px; align-items:start; }
        .admin-sidebar { position:sticky; top:14px; border:1px solid var(--border); background:var(--card); border-radius:14px; padding:10px; display:grid; gap:8px; }
        .admin-sidebar button { width:100%; text-align:left; min-height:46px; border-radius:10px; border:1px solid transparent; background:transparent; color:var(--muted); font-weight:600; font-size:0.9rem; cursor:pointer; padding:10px 12px; }
        .admin-sidebar button.active { background:var(--primary-dim); border-color:rgba(43,224,125,0.35); color:var(--text); }
        .admin-tab-panel { display:none; }
        .admin-tab-panel.active { display:grid; gap:14px; }
        .admin-content { width:100%; max-width:100%; display:grid; gap:14px; }
        .admin-tab-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
        .admin-tab-header h3 { margin:0; font-size:1.25rem; }
        .admin-tab-header p { margin:4px 0 0; color:var(--muted); font-size:0.9rem; }
        .admin-kpi-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-bottom:14px; }
        .admin-kpi-card { border:1px solid var(--border); border-radius:12px; background:var(--card); padding:12px; }
        .admin-kpi-card i { font-style:normal; color:var(--muted); font-size:0.8rem; display:block; margin-bottom:6px; }
        .admin-kpi-card b { font-size:1.35rem; display:block; line-height:1.1; }
        .admin-highlight { color:var(--primary); }
        .admin-section-title { margin:0 0 8px 0; font-size:1.05rem; }
        .admin-sector-table-wrap { overflow:auto; border:1px solid var(--border); border-radius:12px; }
        .admin-sector-badge { border-radius:999px; padding:4px 8px; font-size:0.75rem; background:rgba(255,92,92,0.14); color:#ff9c9c; border:1px solid rgba(255,92,92,0.25); }
        .admin-activity-trend { margin-top:8px; font-size:0.88rem; color:var(--muted); }
        .admin-settings-block { margin-bottom:14px; }
        .admin-feedback-analytics { margin-top:12px; display:grid; gap:12px; }
        .admin-feedback-card { border:1px solid var(--border); border-radius:12px; background:var(--card); padding:12px; }
        .admin-feedback-card h5 { margin:0 0 10px 0; font-size:0.95rem; }
        .admin-feedback-empty { color:var(--muted); font-size:0.9rem; }
        .admin-feedback-list { display:grid; gap:8px; }
        .admin-feedback-row { display:grid; grid-template-columns:minmax(0,1fr) 140px; gap:10px; align-items:center; }
        .admin-feedback-label { font-size:0.86rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .admin-feedback-bar-wrap { height:10px; border-radius:999px; background:rgba(255,255,255,0.06); border:1px solid var(--border); overflow:hidden; }
        .admin-feedback-bar { height:100%; background:var(--primary); border-radius:999px; }
        .admin-feedback-meta { font-size:0.8rem; color:var(--muted); text-align:right; white-space:nowrap; }
        .admin-feedback-line { display:grid; grid-template-columns: repeat(30, minmax(0,1fr)); gap:3px; align-items:end; height:110px; }
        .admin-feedback-line i { display:block; width:100%; background:var(--primary); border-radius:4px 4px 0 0; min-height:2px; opacity:0.95; }
        .admin-users-page { display:grid; gap:14px; }
        .admin-block-card { border:1px solid var(--border); border-radius:14px; background:var(--card); padding:14px; box-shadow:0 8px 20px rgba(63,80,124,0.08); }
        .admin-block-card h5 { margin:0 0 10px 0; font-size:0.98rem; }
        .admin-kpi-grid.modern { grid-template-columns:repeat(4,minmax(0,1fr)); margin:0; }
        .admin-kpi-card.modern { padding:14px; border-radius:14px; display:grid; gap:4px; }
        .admin-kpi-card.modern b { font-size:1.5rem; }
        .admin-kpi-label { color:var(--muted); font-size:0.8rem; }
        .admin-kpi-trend { color:var(--primary); font-size:0.78rem; }
        .admin-user-table-wrap { overflow:auto; border:1px solid var(--border); border-radius:12px; }
        .admin-user-table-wrap table { margin-top:0; }
        .admin-user-table-wrap tr:first-child td { background:rgba(43,224,125,0.08); }
        .admin-rank { display:inline-grid; place-items:center; min-width:24px; height:24px; border-radius:999px; font-weight:700; font-size:0.8rem; border:1px solid var(--border); }
        .admin-rank.top { background:rgba(43,224,125,0.16); color:#1ea56f; border-color:rgba(43,224,125,0.35); }
        .admin-feedback-analytics.compact { grid-template-columns:repeat(2,minmax(0,1fr)); }
        .admin-feedback-compact-item { display:flex; justify-content:space-between; gap:10px; align-items:center; border-bottom:1px dashed var(--border); padding:6px 0; }
        .admin-feedback-compact-item:last-child { border-bottom:none; }
        .admin-feedback-compact-item b { font-size:0.9rem; }
        .admin-stars { letter-spacing:1px; color:#f2b94b; white-space:nowrap; }
        .admin-sector-analytics { display:grid; gap:14px; }
        .admin-sector-analytics-card { border:1px solid var(--border); border-radius:14px; background:var(--card); padding:0; overflow:hidden; }
        .admin-sector-analytics-head { list-style:none; display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px 14px; cursor:pointer; }
        .admin-sector-analytics-head::-webkit-details-marker { display:none; }
        .admin-sector-analytics-title { margin:0; font-size:0.95rem; }
        .admin-sector-analytics-summary { display:flex; flex-wrap:wrap; justify-content:flex-end; gap:6px; }
        .admin-sector-analytics-body { padding:0 14px 14px; border-top:1px solid var(--border); display:grid; gap:12px; }
        .admin-sector-block { border:1px solid var(--border); border-radius:12px; background:var(--surface-elevated); padding:10px; }
        .admin-sector-block h5 { margin:0 0 8px 0; font-size:0.9rem; }
        .admin-sector-analytics-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
        .admin-sector-analytics-kpi { border:1px solid var(--border); border-radius:10px; padding:10px; background:var(--card); }
        .admin-sector-analytics-kpi b { display:block; font-size:1.02rem; }
        .admin-sector-analytics-kpi span { color:var(--muted); font-size:0.78rem; }
        .admin-sector-route-row { padding:6px 0; border-top:1px dashed var(--border); }
        .admin-sector-route-row:first-child { border-top:none; padding-top:0; }
        .admin-sector-comment-preview { margin-top:4px; color:var(--muted); font-size:0.82rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .admin-vote-rows { display:grid; gap:6px; }
        .admin-vote-row { display:grid; grid-template-columns:42px 1fr auto; gap:8px; align-items:center; font-size:0.82rem; }
        .admin-vote-track { height:6px; border-radius:999px; border:1px solid var(--border); background:rgba(255,255,255,0.06); overflow:hidden; }
        .admin-vote-fill { height:100%; background:var(--primary); }
        .admin-pill { border:1px solid var(--border); border-radius:999px; padding:4px 8px; font-size:0.75rem; color:var(--muted); }
        .admin-filters-shell { position:sticky; top:8px; z-index:20; margin-bottom:10px; }
        .admin-filters-toggle { width:100%; min-height:44px; border:1px solid var(--border); border-radius:12px; background:color-mix(in srgb, var(--card) 92%, #ffffff 8%); color:var(--text); font-weight:700; font-size:0.9rem; display:flex; justify-content:space-between; align-items:center; padding:10px 12px; box-shadow:0 8px 18px rgba(23,31,56,0.14); }
        .admin-filter-badge { font-size:0.78rem; color:var(--muted); margin-left:6px; }
        .admin-sticky-filters { border:1px solid var(--border); border-radius:12px; background:color-mix(in srgb, var(--card) 90%, #ffffff 10%); backdrop-filter: blur(6px); padding:10px; display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; box-shadow:0 8px 18px rgba(23,31,56,0.14); overflow:hidden; max-height:0; opacity:0; transform:translateY(-4px); pointer-events:none; transition:max-height .25s ease, opacity .2s ease, transform .2s ease; }
        .admin-sticky-filters.open { max-height:420px; opacity:1; transform:translateY(0); pointer-events:auto; margin-top:8px; }
        .admin-sticky-filters select { min-height:46px; margin:0; padding:10px 12px; font-size:0.8rem; font-weight:600; line-height:1.2; color:var(--text); background:var(--surface-elevated); border:1px solid color-mix(in srgb, var(--border) 70%, var(--primary) 30%); border-radius:10px; }
        .admin-toggle { display:flex; align-items:center; gap:8px; min-height:46px; font-size:0.78rem; font-weight:600; color:var(--text); border:1px solid color-mix(in srgb, var(--border) 70%, var(--primary) 30%); border-radius:10px; padding:8px 10px; background:var(--surface-elevated); }
        .admin-toggle input { width:auto; min-height:unset; margin:0; accent-color: var(--primary); }
        .admin-table-sort { cursor:pointer; user-select:none; }
        .admin-pager { display:flex; justify-content:flex-end; gap:8px; margin-top:8px; }
        .admin-mini-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
        .admin-mini-tab { border:1px solid var(--border); border-radius:999px; background:transparent; color:var(--muted); padding:6px 10px; cursor:pointer; }
        .admin-mini-tab.active { border-color:rgba(43,224,125,0.35); color:var(--text); background:var(--primary-dim); }
        .admin-modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:none; align-items:center; justify-content:center; z-index:2200; padding:16px; }
        .admin-modal { width:min(860px,100%); max-height:80vh; overflow:auto; border:1px solid var(--border); border-radius:14px; background:var(--card); padding:14px; }
        .admin-bar-chart { display:grid; gap:6px; }
        .admin-bar-row { display:grid; grid-template-columns:minmax(0,1fr) 140px; gap:8px; align-items:center; }
        .admin-bar-track { height:10px; border:1px solid var(--border); border-radius:999px; background:rgba(255,255,255,0.06); overflow:hidden; }
        .admin-bar-fill { height:100%; background:var(--primary); }

        .admin-sectors-header { margin:0; }
        .admin-create-sector-card { border:1px solid var(--border); border-radius:14px; background:var(--card); padding:14px; display:grid; gap:10px; }
        .admin-file-hidden { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }
        .admin-file-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        .admin-file-chip { border:1px dashed var(--border); border-radius:999px; padding:6px 10px; color:var(--muted); font-size:0.82rem; }
        .admin-sector-list { display:grid; gap:12px; }
        .admin-sector-card { border:1px solid var(--border); border-radius:14px; background:var(--card); padding:14px; box-shadow:0 8px 20px rgba(63,80,124,0.08); }
        .admin-sector-head { display:flex; align-items:center; justify-content:space-between; gap:10px; }
        .admin-sector-title { margin:0; font-size:1.05rem; }
        .admin-sector-status { margin-top:6px; font-size:0.86rem; color:var(--muted); }
        .admin-sector-status.ok { color:#1ea56f; }
        .admin-sector-status.warn { color:#e0992d; }
        .admin-sector-actions { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin-top:12px; }
        .btn-danger-soft { min-height:44px; border:1px solid rgba(255,93,133,0.4); background:rgba(255,93,133,0.12); color:#d6476f; border-radius:10px; font-weight:600; }
        @media (max-width: 700px) { .admin-sector-actions { grid-template-columns:1fr; } }

        @media (max-width: 900px) {
            .admin-layout { grid-template-columns:1fr; }
            .admin-sidebar { position:static; display:flex; overflow-x:auto; padding:6px; gap:6px; }
            .admin-sidebar button { flex:1 0 140px; text-align:center; }
            .admin-kpi-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
            .admin-kpi-grid.modern { grid-template-columns:repeat(2,minmax(0,1fr)); }
            .admin-feedback-analytics.compact { grid-template-columns:1fr; }
            .admin-sector-analytics-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
            .admin-sticky-filters { grid-template-columns:1fr; }
            .admin-sticky-filters.open { max-height:560px; }
            .admin-tab-header { flex-direction:column; }
            .admin-tab-header .btn-main { width:100%; min-width:0; }
        }

        /* Overlays */
        #loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
        }
        .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Viewer */
        #viewer-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            z-index: 1000;
            background: #000;
            display: none;
        }
        model-viewer { width: 100%; height: 100%; }
        .hotspot {
            width: 28px;
            height: 28px;
            min-width: 28px;
            min-height: 28px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            max-height: 88vh;
            max-height: 88dvh;
            background: var(--card);
            border-top: 3px solid var(--primary);
            border-radius: 24px 24px 0 0;
            padding: 20px;
            padding-bottom: max(24px, var(--safe-bottom));
            padding-left: max(20px, var(--safe-left));
            padding-right: max(20px, var(--safe-right));
            box-sizing: border-box;
            display: none;
            z-index: 1002;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            pointer-events: auto;
        }
        .bottom-sheet::before {
            content: '';

        .profile-snapshot-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
        .profile-snap { border:1px solid var(--border); border-radius:12px; padding:10px; background:var(--card); }
        .profile-snap-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; color:var(--muted); font-size:13px; }
        .profile-snap-num { font-size:24px; font-weight:600; color:var(--text); }
        .profile-heatmap { display:grid; grid-template-columns: repeat(10, minmax(0,1fr)); gap:5px; }
        .profile-heat { height:12px; border-radius:4px; background:rgba(255,255,255,0.06); border:1px solid var(--border); }
        .profile-heat.on { background:var(--primary-dim); border-color:var(--primary); }
        .profile-sparkline { width:100%; height:60px; display:block; }
        .profile-activity-list { display:flex; flex-direction:column; gap:8px; }
        .profile-activity-card { border:1px solid var(--border); border-radius:12px; padding:10px; background:var(--card); }
        .profile-activity-top { display:flex; justify-content:space-between; align-items:center; gap:8px; }
        .profile-activity-grade { font-size:22px; font-weight:600; color:var(--primary); }
        .profile-activity-state { font-size:13px; color:var(--muted); border:1px solid var(--border); border-radius:999px; padding:3px 8px; }
        .profile-activity-meta { font-size:13px; color:var(--muted); margin-top:4px; }
        .profile-tracker-grid { display:grid; grid-template-columns:1fr; gap:10px; }
        .profile-tracker-col { border:1px solid var(--border); border-radius:12px; padding:10px; background:var(--card); }
        .profile-tracker-col h5 { margin:0 0 8px; font-size:13px; color:var(--muted); }
        .profile-timeline { display:flex; flex-direction:column; gap:8px; }
        .profile-timeline-row { display:flex; justify-content:space-between; gap:10px; border:1px solid var(--border); border-radius:10px; padding:8px 10px; }
        .profile-timeline-row b { color:var(--text); }
        .send-date-quick { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .btn-date-quick {
            min-height: 44px;
            padding: 12px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            cursor: pointer;
        }
        .btn-date-quick:active { border-color: var(--primary); color: var(--primary); }
        .tries-stepper { display: flex; align-items: center; gap: 16px; }
        .tries-btn {
            width: 48px;
            height: 48px;
            min-width: 48px;
            min-height: 48px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 22px;
            cursor: pointer;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tries-btn:active { border-color: var(--primary); color: var(--primary); }
        .tries-num { min-width: 40px; text-align: center; font-weight: 700; font-size: 1.2rem; }

        /* Dash header & viewer close – safe area + touch */
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: calc(var(--safe-top) + 8px) 12px 12px;
            flex-wrap: wrap;
            gap: 12px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 8px 18px rgba(73, 88, 130, 0.1);
        }
        .dash-header .lang-switcher { flex-shrink: 0; }
        .notif-btn { position:relative; min-width:44px; min-height:44px; border-radius:12px; }
        .notif-badge { position:absolute; top:-6px; right:-6px; min-width:20px; height:20px; border-radius:999px; background:var(--danger); color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 5px; }
        .notif-item { border:1px solid var(--border); border-radius:10px; padding:10px; margin-bottom:8px; cursor:pointer; display:flex; gap:10px; align-items:flex-start; }
        .notif-item.unread { border-color:var(--primary); background:rgba(111,77,255,0.08); }
        .notif-avatar { width:36px; height:36px; border-radius:999px; object-fit:cover; border:1px solid var(--border); background:rgba(255,255,255,0.06); display:grid; place-items:center; font-size:12px; color:var(--muted); font-weight:700; flex-shrink:0; }
        .notif-content { flex:1; min-width:0; }
        .notif-meta { display:flex; justify-content:space-between; gap:10px; color:var(--muted); font-size:12px; margin-top:6px; }
        .viewer-close {
            position: absolute;
            top: max(16px, var(--safe-top));
            left: max(16px, var(--safe-left));
            z-index: 1100;
            min-height: 48px;
            min-width: 48px;
            padding: 12px 18px;
            background: rgba(255,255,255,0.95);
            color: var(--primary);
            border: 1px solid color-mix(in srgb, var(--primary) 55%, white 45%);
            box-shadow: 0 8px 18px rgba(15, 23, 32, 0.28);
            border-radius: var(--radius-sm);
            font-weight: 700;
        }
        .auth-toggle { cursor: pointer; color: var(--muted); margin-top: 22px; font-size: 1rem; min-height: 44px; display: inline-flex; align-items: center; }
        .auth-toggle:active { color: var(--primary); }

        .app-bottom-nav {
            position: fixed;
            left: max(10px, calc(var(--safe-left) + 10px));
            right: max(10px, calc(var(--safe-right) + 10px));
            bottom: max(10px, calc(var(--safe-bottom) + 10px));
            z-index: 1200;
            background: rgba(255,255,255,0.94);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 14px 36px rgba(67, 91, 138, 0.22);
            display: none;
            padding: 8px;
            gap: 6px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .app-bottom-nav.active { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); }
        .bottom-nav-item {
            min-height: 58px;
            border-radius: 14px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            transition: all 180ms ease;
        }
        .bottom-nav-item .nav-ico { font-size: 1.15rem; line-height: 1; }
        .bottom-nav-item.active {
            color: #fff;
            background: var(--gradient-primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(92, 88, 204, 0.35);
        }
        .bottom-nav-item:active { transform: scale(0.97); }

        /* Brand typography – consistent with wordmark */
        .climby-wordmark {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-style: normal;
            font-weight: 600;
            letter-spacing: normal;
        }
        .headline-brand {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 600;
            font-style: normal;
            letter-spacing: normal;
            color: var(--text);
            font-size: 22px;
        }
        .headline-brand.primary { color: var(--primary); }
        .subhead {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 500;
            font-size: 13px;
            letter-spacing: normal;
            color: var(--text);
        }
        .subhead.muted { color: var(--muted); }
    </style>
</head>

        async function checkUsernameAvailability(rawUsername) {
            const normalized = normalizeUsername(rawUsername);

                lastCheckedUsername = '';
                lastUsernameAvailable = false;
                setUsernameStatus(t('auth.usernameHint'));
                return { available: false, reason: 'empty' };
            }
            if (!isValidUsername(normalized)) {
                lastCheckedUsername = lower;
                lastUsernameAvailable = false;
                setUsernameStatus(t('auth.usernameInvalid'), 'error');
                return { available: false, reason: 'invalid' };
            }
            setUsernameStatus(t('auth.usernameChecking'));
            try {
                const qRef = query(collection(db, 'users'), where('usernameLower', '==', lower), limit(1));
                const snap = await getDocs(qRef);
                const taken = !snap.empty;
                lastCheckedUsername = lower;
                lastUsernameAvailable = !taken;
                setUsernameStatus(taken ? t('auth.usernameTaken') : t('auth.usernameAvailable'), taken ? 'error' : 'ok');
                return { available: !taken, reason: taken ? 'taken' : 'ok' };
            } catch (_) {
                setUsernameStatus(t('auth.usernameHint'));
                return { available: true, reason: 'skip' };
            }
        }
        function resolveUsername(userId, fallbackName = 'Climber') {

        async function getUserProfileByAuthUid(authUid) {
            if (!authUid) return { ref: null, id: null, data: {} };
            const canonicalRef = doc(db, 'users', authUid);
            const canonicalSnap = await getDoc(canonicalRef);
            let canonicalData = canonicalSnap.exists() ? (canonicalSnap.data() || {}) : null;

            let legacyDoc = null;
            try {
                const qSnap = await getDocs(query(collection(db, 'users'), where('authUid', '==', authUid), limit(5)));
                legacyDoc = qSnap.docs.find(d => d.id !== authUid) || null;
            } catch (_) {}

            if (legacyDoc) {
                const legacyData = legacyDoc.data() || {};
                if (canonicalData) {
                    const mergedData = { ...legacyData, ...canonicalData, authUid };
                    await setDoc(canonicalRef, mergedData, { merge: true });
                    canonicalData = mergedData;
                } else {
                    canonicalData = { ...legacyData, authUid };
                    await setDoc(canonicalRef, canonicalData, { merge: true });
                }
            }

            if (canonicalData) {
                return { ref: canonicalRef, id: authUid, data: { ...canonicalData, authUid } };
            }

            return { ref: canonicalRef, id: authUid, data: { authUid } };
        }

                .replace(/-+/g, '-')

        async function resolveAdminGymId(userId, existingGymId) {
            if (existingGymId) return existingGymId;
            if (!userId) return null;
            try {
                const gymsSnap = await getDocs(query(collection(db, 'gyms'), where('owner', '==', userId), limit(1)));
                if (!gymsSnap.empty) {
                    const gymId = gymsSnap.docs[0].id;
                    await mergeUserProfileByAuthUid(userId, { gymManaged: gymId });
                    return gymId;
                }

                const requestsSnap = await getDocs(query(collection(db, 'gymOwnerRequests'), where('userId', '==', userId), limit(10)));
                if (requestsSnap.empty) return null;
                const latestReq = requestsSnap.docs
                    .map(d => ({ id: d.id, ...(d.data() || {}) }))
                    .sort((a, b) => {
                        const aTs = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
                        const bTs = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
                        return bTs - aTs;
                    })[0];
                const gymName = String(latestReq?.gymName || '').trim();
                if (!gymName) return null;

                const base = normalizeGymIdSeed(gymName) || 'gym';
                const gymId = `${base}-${userId.slice(0, 6)}`;
                await setDoc(doc(db, 'gyms', gymId), { name: gymName, owner: userId }, { merge: true });
                await mergeUserProfileByAuthUid(userId, { gymManaged: gymId });
                return gymId;
            } catch (_) {
                return null;
            }
        }

        function formatRelativeTime(value) {
            const dt = value?.toDate ? value.toDate() : (value ? new Date(value) : null);
            if (!dt || Number.isNaN(dt.getTime())) return '-';
            const diffSec = Math.max(0, Math.floor((Date.now() - dt.getTime()) / 1000));
            if (diffSec < 60) return currentLang === 'it' ? 'ora' : 'now';
            const mins = Math.floor(diffSec / 60);
            if (mins < 60) return currentLang === 'it' ? `${mins}m fa` : `${mins}m ago`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return currentLang === 'it' ? `${hours}h fa` : `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return currentLang === 'it' ? `${days}g fa` : `${days}d ago`;
        }

        async function prefetchNotificationActors(items = []) {
            const actorIds = Array.from(new Set(items.map(n => n.actorId).filter(Boolean))).filter(uid => !notificationActorCache.has(uid));

            await Promise.all(actorIds.map(async (uid) => {

                    const snap = await getDoc(doc(db, 'users', uid));
                    const row = snap.exists() ? (snap.data() || {}) : {};
                    notificationActorCache.set(uid, {
                        username: row.username || row.displayName || 'Climber',
                        avatarUrl: row.avatarUrl || row.photoURL || null
                    });
                } catch (_) {
                    notificationActorCache.set(uid, { username: 'Climber', avatarUrl: null });
                }
            }));
        }

                setSocialSubView('main');
                renderFollowingSection();
                if (notification.postId) await openSocialCommentsModal(notification.postId).catch(() => {});

            if (type === 'SECTOR_RESET') {

                } else if (notification.gymId) {

        async function notifyGymMembers(gymId, type, message = '', extra = {}) {
            if (!gymId || !type) return;
            try {
                const followersSnap = await getDocs(query(collection(db, 'gymFollowers'), where('gymId', '==', gymId), limit(1000)));
                let sent = 0;
                for (const f of followersSnap.docs) {
                    const row = f.data() || {};
                    const enabled = row.notificationsEnabled !== false;
                    const uid = row.userId || null;
                    if (!enabled || !uid) continue;
                    try {
                        await createNotification({ userId: uid, type, message, gymId, sectorId: extra.sectorId || null });
                        sent += 1;
                    } catch (err) {
                        console.error('Notification delivery error for follower', uid, err);
                    }
                }
                console.info('Gym notifications sent', { gymId, type, sent });
            } catch (err) {
                console.error('notifyGymMembers failed', { gymId, type, err });
            }
        }

                const status = n.read ? t('notifications.read') : t('notifications.unread');

        function startNotificationsSubscription() {
            if (!activeUser?.uid) {
                console.warn('[notifications] skipped subscription: missing current user uid');
                return;
            }
            console.info('[notifications] currentUser.uid', activeUser.uid);
            stopNotificationsSubscription();
            console.info('[notifications] starting query on notifications', { userId: activeUser.uid, orderBy: 'createdAt desc' });
            const qRef = query(collection(db, 'notifications'), where('userId', '==', activeUser.uid), orderBy('createdAt', 'desc'), limit(200));
            notificationsUnsubscriber = onSnapshot(qRef, async (snap) => {
                notificationsState = snap.docs.map(d => ({ id: d.id, ...(d.data() || {}) }));
                console.info('[notifications] docs received', snap.size);
                notificationsState.forEach((n, idx) => console.info(`[notifications] doc ${idx + 1}`, n));
                await prefetchNotificationActors(notificationsState);
                unreadNotificationsCount = notificationsState.filter(n => !n.read).length;
                const badge = document.getElementById('notifications-badge');
                if (badge) {
                    badge.textContent = String(unreadNotificationsCount);
                    badge.style.display = unreadNotificationsCount > 0 ? 'flex' : 'none';
                }
                renderNotificationsPanel();
                renderProfileDashboard();
            }, (err) => {
                console.error('Notifications subscription error:', err);
                const fallbackQuery = query(collection(db, 'notifications'), where('userId', '==', activeUser.uid), limit(200));
                notificationsUnsubscriber = onSnapshot(fallbackQuery, async (snap) => {
                    notificationsState = snap.docs.map(d => ({ id: d.id, ...(d.data() || {}) }))
                        .sort((a, b) => (b.createdAt?.toMillis?.() || new Date(b.createdAt || 0).getTime() || 0) - (a.createdAt?.toMillis?.() || new Date(a.createdAt || 0).getTime() || 0));
                    console.info('[notifications] fallback docs received', snap.size);
                    notificationsState.forEach((n, idx) => console.info(`[notifications] fallback doc ${idx + 1}`, n));
                    await prefetchNotificationActors(notificationsState);
                    unreadNotificationsCount = notificationsState.filter(n => !n.read).length;
                    const badge = document.getElementById('notifications-badge');
                    if (badge) {
                        badge.textContent = String(unreadNotificationsCount);
                        badge.style.display = unreadNotificationsCount > 0 ? 'flex' : 'none';
                    }
                    renderNotificationsPanel();
                    renderProfileDashboard();
                }, (fallbackErr) => {
                    console.error('Notifications fallback subscription error:', fallbackErr);
                    const list = document.getElementById('notifications-list');
                    if (list) list.innerHTML = `<p class="profile-empty">${t('notifications.loadError')}</p>`;
                });
            });
        }

        function renderOnboardingStep() {
            const overlay = document.getElementById('onboarding-overlay');
            const titleEl = document.getElementById('onboarding-title');
            const bodyEl = document.getElementById('onboarding-body');
            const kickerEl = document.getElementById('onboarding-kicker');
            const nextBtn = document.getElementById('onboarding-next-btn');
            if (!overlay || !titleEl || !bodyEl || !kickerEl || !nextBtn) return;
            clearOnboardingHighlight();
            const step = onboardingState.steps[onboardingState.index];
            if (!step) return;
            if (typeof step.before === 'function') {
                try { step.before(); } catch (err) { console.warn('[onboarding] step.before failed', err); }
            }
            titleEl.textContent = step.title || 'Guida rapida';
            bodyEl.textContent = step.text || '';
            kickerEl.textContent = `Step ${onboardingState.index + 1}/${onboardingState.steps.length}`;
            nextBtn.textContent = step.cta || (currentLang === 'it' ? 'Avanti' : 'Next');
            const target = resolveOnboardingTarget(step.target || null);
            if (target) {
                onboardingState.targetEl = target;
                target.classList.add('onboarding-highlight');
                try { target.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch (_) {}
            }
        }

        async function completeOnboardingFlow() {
            const overlay = document.getElementById('onboarding-overlay');
            clearOnboardingHighlight();
            onboardingState.active = false;
            onboardingState.steps = [];
            onboardingState.index = 0;
            if (overlay) overlay.classList.remove('active');
            const uid = onboardingState.uid || activeUser?.uid || null;
            if (!uid) return;
            try { localStorage.setItem(getOnboardingStorageKey(uid), 'true'); } catch (_) {}
            try {
                await mergeUserProfileByAuthUid(uid, { onboardingCompleted: true, onboardingCompletedAt: new Date().toISOString() });
            } catch (err) {
                console.warn('[onboarding] unable to persist completion', err);
            }
        }

        function openOnboardingFlow({ uid, isAdmin }) {
            const overlay = document.getElementById('onboarding-overlay');
            const skipBtn = document.getElementById('onboarding-skip-btn');
            const nextBtn = document.getElementById('onboarding-next-btn');
            if (!overlay || !skipBtn || !nextBtn) return;
            onboardingState.uid = uid;
            onboardingState.active = true;
            onboardingState.index = 0;
            onboardingState.steps = isAdmin ? getAdminOnboardingSteps() : getClimberOnboardingSteps();
            overlay.classList.add('active');
            skipBtn.textContent = currentLang === 'it' ? 'Salta' : 'Skip';
            skipBtn.onclick = () => { completeOnboardingFlow(); };
            nextBtn.onclick = async () => {
                if (onboardingState.index >= onboardingState.steps.length - 1) {
                    await completeOnboardingFlow();
                    return;
                }
                onboardingState.index += 1;
                try {
                    renderOnboardingStep();
                } catch (err) {
                    console.error('[onboarding] next step failed', err);
                }
            };
            renderOnboardingStep();
        }

        async function getGymGradeSystem(gymId) {
            if (!gymId) return null;
            const snap = await getDoc(doc(db, 'gyms', gymId));
            if (!snap.exists()) return null;
            const data = snap.data() || {};
            return { gradeSystem: Array.isArray(data.gradeSystem) ? data.gradeSystem : [], gradeSystemConfigured: !!data.gradeSystemConfigured, gradeSystemLocked: !!data.gradeSystemLocked };
        }

        function parseGradeSystemInput(text) {
            const labels = String(text || '').split('\n').map(v => v.trim()).filter(Boolean);
            return labels.map((label, index) => ({ label, order: index }));
        }

        async function saveGymGradeSystem(gymId, text) {
            const rows = parseGradeSystemInput(text);
            if (!rows.length) throw new Error('Inserisci almeno un grado.');
            const unique = new Set(rows.map(r => r.label.toLowerCase()));
            if (unique.size !== rows.length) throw new Error('I gradi devono essere univoci.');
            const snap = await getDoc(doc(db, 'gyms', gymId));
            const gymData = snap.exists() ? (snap.data() || {}) : {};
            if (gymData.gradeSystemLocked && gymData.gradeSystemConfigured) throw new Error('Sistema gradi bloccato.');
            await setDoc(doc(db, 'gyms', gymId), { gradeSystem: rows, gradeSystemConfigured: true }, { merge: true });
            currentGymGradeSystem = rows;
            gymLevelOrderMap.set(gymId, gradeSystemArrayToMap(rows));
            return rows;
        }

        function stopGym3DSubscriptions() {
            while (gym3DUnsubscribers.length) {
                const u = gym3DUnsubscribers.pop();
                if (typeof u === 'function') u();
            }
            gym3DStatusMap = new Map();
            sectorNameByGymSector = new Map();
        }

        function startGym3DSubscriptions(gymsSnapshot) {
            stopGym3DSubscriptions();
            gymsSnapshot.forEach(g => {
                const unsub = onSnapshot(collection(db, 'gyms', g.id, 'Sectors'), (snap) => {
                    let has3D = false;
                    snap.forEach(sec => { if (sec.data()?.meshUrl) has3D = true; sectorNameByGymSector.set(`${g.id}__${sec.id}`, sec.data()?.name || sec.id); });
                    gym3DStatusMap.set(g.id, { has3D, sectors: snap.size });
                    renderUserGymList();
                });
                gym3DUnsubscribers.push(unsub);
            });
        }

        function areConsecutiveDays(prevYmd, nextYmd) {
            if (!prevYmd || !nextYmd) return false;

            if (Number.isNaN(p.getTime()) || Number.isNaN(n.getTime())) return false;

        async function upsertUserGymStats(userId, gymId, gymName, grade, gradeOrder, attempts = 1) {
            if (!userId || !gymId) return { isNewMax: false, streakDays: 0 };
            const statsRef = doc(db, 'users', userId, 'gymStats', gymId);
            const snap = await getDoc(statsRef);
            const prev = snap.exists() ? (snap.data() || {}) : {};
            const today = toYYYYMMDD(new Date());
            const prevOrder = Number.isFinite(prev.max_grade_order) ? prev.max_grade_order : -1;
            const hasLegacyMaxWithoutOrder = !Number.isFinite(prev.max_grade_order) && !!prev.max_grade;
            const nextOrder = Number.isFinite(gradeOrder) ? gradeOrder : prevOrder;
            const isNewMax = Number.isFinite(nextOrder) && !hasLegacyMaxWithoutOrder && nextOrder > prevOrder;
            const prevStreak = Number(prev.streak_days || 0);
            const streakDays = prev.last_activity_day === today
                ? Math.max(1, prevStreak)
                : areConsecutiveDays(prev.last_activity_day, today) ? Math.max(1, prevStreak + 1) : 1;
            const payload = {
                user_id: userId,
                gym_id: gymId,
                gym_name: gymName || gymId,
                max_grade: isNewMax ? (grade || prev.max_grade || '-') : (prev.max_grade || grade || '-'),
                max_grade_order: isNewMax ? nextOrder : prevOrder,
                total_routes: Number(prev.total_routes || 0) + 1,
                active_days: prev.last_activity_day === today ? Number(prev.active_days || 1) : Number(prev.active_days || 0) + 1,
                streak_days: streakDays,
                last_activity_day: today,
                updated_at: new Date().toISOString()
            };
            await setDoc(statsRef, payload, { merge: true });
            await mergeUserProfileByAuthUid(userId, {
                mainGymName: prev.gym_name || gymName || gymId,
                mainGymMaxGrade: payload.max_grade
            });
            try {
                await upsertGymMemberRecord(userId, gymId, {

                    birthDate: prev.birthDate || null

        function computeProfileData(entries) {
            const deduped = [];
            const seen = new Set();
            entries.forEach((e) => {
                const dayKey = String(e.sendDate || getDateKeyFromAnyValue(e.date) || '');
                const routeKey = e.routeId || '';
                const dedupKey = `${e.userId || ''}__${e.gymId || e.gymName || ''}__${e.sectorId || e.sectorName || ''}__${routeKey}__${e.outcome || 'climbed'}__${dayKey}`;
                if (routeKey && seen.has(dedupKey)) return;
                if (routeKey) seen.add(dedupKey);
                deduped.push(e);
            });
            const sorted = deduped.slice().sort((a, b) => new Date(b.sendDate || b.date || 0) - new Date(a.sendDate || a.date || 0));
            const daySet = new Set(sorted.map(e => e.sendDate || '').filter(Boolean));
            const gymSet = new Set(sorted.map(e => e.gymName || '').filter(Boolean));

            const groups = new Map();
            for (const e of sorted) {
                const gk = e.gymId || e.gymName || 'unknown';
                if (!groups.has(gk)) groups.set(gk, []);
                groups.get(gk).push(e);
            }

            let globalMaxNorm = -1;
            let globalMaxLabel = '-';
            const byGym = [];
            const enriched = [];

            for (const [gymKey, gymEntries] of groups.entries()) {
                const gymId = gymEntries[0]?.gymId;
                const orderMap = gymId ? gymLevelOrderMap.get(gymId) : null;
                const scaleSize = Math.max(2, (orderMap?.size || 1));
                let localMaxRank = -1;
                let localMaxLabel = '-';
                for (const e of gymEntries) {
                    const rank = gradeOrderForEntry(e, orderMap);
                    const norm = normalizeProgressValue(rank, scaleSize);
                    enriched.push({ ...e, _rank: rank, _norm: norm, _gymKey: gymKey });
                    if (rank > localMaxRank) {
                        localMaxRank = rank;
                        localMaxLabel = normalizeLevelValue(e.grade) || '-';
                    }
                    if (norm > globalMaxNorm) {
                        globalMaxNorm = norm;
                        globalMaxLabel = normalizeLevelValue(e.grade) || '-';
                    }
                }
                byGym.push({ gymName: gymEntries[0]?.gymName || gymKey, localMax: localMaxLabel });
            }

            const normPct = Math.max(0, Math.round((globalMaxNorm < 0 ? 0 : globalMaxNorm) * 100));
            const atMaxCount = enriched.filter(e => Math.abs(e._norm - globalMaxNorm) < 1e-6).length;
            const targetAtMax = 5;
            const progressPct = Math.max(0, Math.min(100, Math.round((atMaxCount / targetAtMax) * 100)));

            const ascByDate = enriched.slice().sort((a, b) => new Date(a.sendDate || a.date || 0) - new Date(b.sendDate || b.date || 0));
            let bestNorm = -1;
            const milestones = [];
            for (const e of ascByDate) {
                if (e._norm > bestNorm) {
                    bestNorm = e._norm;
                    milestones.push({ label: normalizeLevelValue(e.grade) || '-', normPct: Math.round(e._norm * 100), date: e.sendDate || e.date || '' });
                }
            }

            return {
                sorted,
                totalSends: sorted.length,
                activeDays: daySet.size,
                reviewedGyms: gymSet.size,
                globalMaxLabel,
                globalMaxNormPct: normPct,
                atMaxCount,
                targetAtMax,
                progressPct,
                milestones,
                byGym
            };
        }

        function getDateKeyFromAnyValue(value) {

            let d = null;
            if (value instanceof Date) d = value;
            else if (typeof value?.toDate === 'function') d = value.toDate();

        function computeUserChallenges(trackerAll = []) {
            const climbedEntries = trackerAll.filter(v => v.state === 'climbed');
            const daysInGym = new Set();
            const sectors = new Set();
            const gyms = new Set();

            trackerAll.forEach(v => {
                const dayKey = getDateKeyFromAnyValue(v.eventDate || v.completionDate || v.updatedAt || v.createdAt);
                if (dayKey) daysInGym.add(dayKey);
                const sectorKey = String(v.sectorId || v.sectorName || '').trim();
                if (sectorKey) sectors.add(sectorKey);
                const gymKey = String(v.gymId || v.gymName || '').trim();
                if (gymKey) gyms.add(gymKey);
            });

            const sortedDays = Array.from(daysInGym).sort();
            let longestStreak = 0;
            let currentStreak = 0;
            let prev = null;
            sortedDays.forEach(day => {
                if (!prev) currentStreak = 1;
                else currentStreak = areConsecutiveDays(prev, day) ? currentStreak + 1 : 1;
                longestStreak = Math.max(longestStreak, currentStreak);
                prev = day;
            });

            const metrics = [
                { key: 'routes', label: t('ui.totalClosedRoutes'), value: climbedEntries.length, available: trackerAll.some(v => Object.prototype.hasOwnProperty.call(v || {}, 'state')) },
                { key: 'days', label: t('ui.gymDays'), value: daysInGym.size, available: trackerAll.some(v => getDateKeyFromAnyValue(v.eventDate || v.completionDate || v.updatedAt || v.createdAt)) },
                { key: 'streak', label: t('ui.consecutiveDays'), value: longestStreak, available: daysInGym.size > 0 },
                { key: 'sectors', label: t('challenges.sectorsTried'), value: sectors.size, available: trackerAll.some(v => !!(v.sectorId || v.sectorName)) },
                { key: 'gyms', label: t('ui.gymsTried'), value: gyms.size, available: trackerAll.some(v => !!(v.gymId || v.gymName)) }
            ];
            return metrics.filter(m => m.available);
        }

        function computeMonthlyChallenges(trackerAll = []) {
            const mk = nowMonthKey();
            const monthRows = trackerAll.filter(v => getDateKeyFromAnyValue(v.eventDate || v.completionDate || v.updatedAt || v.createdAt).startsWith(mk));
            const climbed = monthRows.filter(v => v.state === 'climbed');
            const days = new Set();
            const sectors = new Set();
            const gyms = new Set();
            monthRows.forEach(v => {
                const d = getDateKeyFromAnyValue(v.eventDate || v.completionDate || v.updatedAt || v.createdAt);
                if (d) days.add(d);
                const sk = String(v.sectorId || v.sectorName || '').trim();
                if (sk) sectors.add(sk);
                const gk = String(v.gymId || v.gymName || '').trim();
                if (gk) gyms.add(gk);
            });
            const sorted = Array.from(days).sort();
            let bestStreak = 0;
            let cur = 0;
            let prev = null;
            sorted.forEach(day => {
                if (!prev) cur = 1;
                else cur = areConsecutiveDays(prev, day) ? cur + 1 : 1;
                bestStreak = Math.max(bestStreak, cur);
                prev = day;
            });
            const values = { routes: climbed.length, days: days.size, streak: bestStreak, sectors: sectors.size, gyms: gyms.size };
            const challengeDefs = getChallengeMonthlyDefs();
            const challengeLevelLabels = getChallengeLevelLabels();
            const metrics = challengeDefs.map(def => {
                const value = Number(values[def.key] || 0);
                const lvlIdx = def.levels.reduce((acc, thr, i) => (value >= thr ? i : acc), -1);
                const nextThr = lvlIdx < def.levels.length - 1 ? def.levels[lvlIdx + 1] : def.levels[def.levels.length - 1];
                const currentThr = lvlIdx >= 0 ? def.levels[lvlIdx] : 0;
                const pct = Math.max(0, Math.min(100, Math.round((value / Math.max(1, nextThr)) * 100)));
                return { ...def, value, levelIndex: lvlIdx, level: lvlIdx >= 0 ? challengeLevelLabels[lvlIdx] : t('ui.none'), nextLevel: lvlIdx < challengeLevelLabels.length - 1 ? challengeLevelLabels[lvlIdx + 1] : t('ui.completed'), currentThr, nextThr, pct };
            });
            const ranked = metrics.filter(m => m.levelIndex >= 0).sort((a,b) => b.levelIndex - a.levelIndex || b.value - a.value);
            const highest = ranked[0] ? { month: mk, challenge: ranked[0].name, level: ranked[0].level, icon: ['🥉','🥈','🥇','🏆'][ranked[0].levelIndex] || '🏅' } : null;
            return { monthKey: mk, metrics, highest };
        }

        async function persistMonthlyBadgeState(state) {
            if (!activeUser || !state?.monthKey) return;
            const prev = monthlyChallengesState || {};
            const nextHistory = { ...(prev.history || {}) };
            const currentLevels = {};
            (state.metrics || []).forEach(m => { if (m.levelIndex >= 0) currentLevels[m.key] = m.level; });
            nextHistory[state.monthKey] = { ...(nextHistory[state.monthKey] || {}), ...currentLevels };
            const prevMonthData = (prev.history || {})[state.monthKey] || {};
            const nextMonthData = nextHistory[state.monthKey] || {};
            const prevBadgeStr = JSON.stringify(prev.highestBadge || null);
            const nextBadgeStr = JSON.stringify(state.highest || null);
            const sameLevels = JSON.stringify(prevMonthData) === JSON.stringify(nextMonthData);
            if (sameLevels && prev.monthKey === state.monthKey && prevBadgeStr == nextBadgeStr) {
                monthlyChallengesState = { ...state, history: nextHistory };
                return;
            }
            const profile = await getUserProfileByAuthUid(activeUser.uid);
            if (!profile.ref) return;
            state.metrics.forEach(m => {
                const oldLvl = CHALLENGE_LEVEL_LABELS.indexOf(prevMonthData[m.key] || '');
                if (m.levelIndex > oldLvl && m.levelIndex >= 0) showChallengeLevelUpToast(m, m.level);
            });
            await setDoc(profile.ref, {
                authUid: activeUser.uid,
                challengesMonthlyHistory: nextHistory,
                publicMonthlyBadge: state.highest ? state.highest : null
            }, { merge: true });
            monthlyChallengesState = { ...state, history: nextHistory };
        }

        function groupProfileActivities(raw = []) {
            const ordered = raw.slice().sort((a,b) => new Date(b.timestamp || b.createdAt || 0) - new Date(a.timestamp || a.createdAt || 0));
            const grouped = [];
            const map = new Map();
            ordered.forEach((e) => {
                const day = getDateKeyFromAnyValue(e.timestamp || e.eventDate || e.createdAt || e.updatedAt || '') || '';
                const key = `${e.routeId || e.routeLabel || e.grade || '-'}__${day}__${e.outcome || e.type || 'climbed'}`;
                if (!map.has(key)) {
                    const row = { ...e, day, count: 1 };
                    map.set(key, row);
                    grouped.push(row);
                } else {
                    const existing = map.get(key);
                    existing.count += 1;
                    if ((!existing.sectorName || existing.sectorName === '-' || existing.sectorName === existing.sectorId) && e.sectorName && e.sectorName !== '-') existing.sectorName = e.sectorName;
                    if ((!existing.gymName || existing.gymName === '-' || existing.gymName === existing.gymId) && e.gymName && e.gymName !== '-') existing.gymName = e.gymName;
                    if (!existing.sectorId && e.sectorId) existing.sectorId = e.sectorId;
                    if (!existing.gymId && e.gymId) existing.gymId = e.gymId;
                }
            });
            return grouped;
        }

        function computeTrackerSummary(trackerAll = []) {
            const climbed = trackerAll.filter(v => v.state === 'climbed');
            const total = climbed.length;
            const grades = climbed.filter(v => v.finalGrade).map(v => ({ label: v.finalGrade, order: Number.isFinite(v.finalGradeOrder) ? v.finalGradeOrder : -1 }));
            const max = grades.length ? grades.slice().sort((a,b)=>b.order-a.order)[0] : null;
            const avgOrder = grades.length ? (grades.reduce((a,g)=>a+Math.max(0,g.order),0) / grades.length) : 0;
            const distByGym = new Map();
            climbed.forEach(v => {
                const gym = v.gymName || v.gymId || '-';
                const grade = v.finalGrade || '-';
                if (!distByGym.has(gym)) distByGym.set(gym, new Map());
                const m = distByGym.get(gym);
                m.set(grade, (m.get(grade) || 0) + 1);
            });
            const topHard = climbed.slice().sort((a,b) => (Number(b.finalGradeOrder||-1)-Number(a.finalGradeOrder||-1))).slice(0,5);
            return { total, maxLabel: max?.label || '-', avgOrder: Math.round(avgOrder*10)/10, distributionByGym: Array.from(distByGym.entries()).map(([gym, m]) => ({ gym, rows: Array.from(m.entries()).sort((a,b)=>b[1]-a[1]) })), topHard };
        }

            try {
                const f = profileProgressDetailState.filters;
                const constraints = [];

                if (f.sectorId && f.sectorId !== 'all') constraints.push(where('sectorId', '==', f.sectorId));
                if (f.grade && f.grade !== 'all') constraints.push(where('finalGrade', '==', f.grade));
                if (f.dateFrom) constraints.push(where('updatedAt', '>=', `${f.dateFrom}T00:00:00.000Z`));

        function computeProfileStatsFromGymStats(rows = []) {
            const list = Array.isArray(rows) ? rows : [];
            const normalized = list.map((row) => ({
                gymId: row.gym_id || row.gymId || row.id || null,
                gymName: row.gym_name || row.gymName || row.gym_id || row.gymId || '-',
                totalRoutes: Number(row.total_routes ?? row.totalRoutes ?? 0),
                activeDays: Number(row.active_days ?? row.activeDays ?? 0),
                maxGrade: row.max_grade || row.maxGrade || '-',
                maxGradeOrder: Number(row.max_grade_order ?? row.maxGradeOrder ?? -1),
                streakDays: Number(row.streak_days ?? row.streakDays ?? 0)
            }));
            const gymsUnique = new Set(normalized.map((r) => r.gymId).filter(Boolean));
            const totalRoutes = normalized.reduce((sum, r) => sum + r.totalRoutes, 0);
            const activeDays = normalized.reduce((sum, r) => sum + r.activeDays, 0);
            const bestRow = normalized.reduce((best, row) => row.maxGradeOrder > (best?.maxGradeOrder ?? -1) ? row : best, null);
            const nextState = {
                loading: false,
                hasData: normalized.length > 0,
                error: null,
                totalRoutes,
                gymsCount: gymsUnique.size || normalized.length,
                activeDays,
                maxGrade: bestRow?.maxGrade || '-',
                maxGradeOrder: bestRow?.maxGradeOrder ?? -1,
                bestGymName: bestRow?.gymName || '-',
                normalized
            };
            return nextState;
        }

        function startMyPostsSubscription() {
            stopMyPostsSubscription();
            if (!activeUser?.uid) {
                renderMyPublicationsFeed();
                return;
            }
            socialMyPostsLoading = true;
            socialMyPostsError = null;
            renderMyPublicationsFeed();

            const byAuthUid = query(collection(db, 'socialActivities'), where('userAuthUid', '==', activeUser.uid), limit(250));
            const byUserId = query(collection(db, 'socialActivities'), where('user_id', '==', activeUser.uid), limit(250));
            const byLegacyUserId = query(collection(db, 'socialActivities'), where('userId', '==', activeUser.uid), limit(250));
            let authRows = [];
            let primaryRows = [];
            let legacyRows = [];

            const applyMerged = () => {
                const merged = new Map();
                [...authRows, ...primaryRows, ...legacyRows].forEach(item => merged.set(item.id, item));
                socialMyPostsActivities = Array.from(merged.values()).sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
                socialMyPostsLoading = false;
                renderMyPublicationsFeed();
            };

            const unsubAuth = onSnapshot(byAuthUid, (snap) => {
                authRows = snap.docs.map(d => normalizeSocialActivity({ id: d.id, ...(d.data() || {}) }));
                applyMerged();
            }, (err) => {
                socialMyPostsError = err;
                socialMyPostsLoading = false;
                socialMyPostsActivities = socialFeedActivities.filter(a => (a.userAuthUid || a.user_id || a.userId || null) === activeUser.uid);
                renderMyPublicationsFeed();
            });

            const unsubPrimary = onSnapshot(byUserId, (snap) => {
                primaryRows = snap.docs.map(d => normalizeSocialActivity({ id: d.id, ...(d.data() || {}) }));
                applyMerged();
            }, (err) => {
                socialMyPostsError = err;
                socialMyPostsLoading = false;
                socialMyPostsActivities = socialFeedActivities.filter(a => (a.userAuthUid || a.user_id || a.userId || null) === activeUser.uid);
                renderMyPublicationsFeed();
            });

            const unsubLegacy = onSnapshot(byLegacyUserId, (snap) => {
                legacyRows = snap.docs.map(d => normalizeSocialActivity({ id: d.id, ...(d.data() || {}) }));
                applyMerged();
            }, (err) => {
                socialMyPostsError = err;
                socialMyPostsLoading = false;
                socialMyPostsActivities = socialFeedActivities.filter(a => (a.userAuthUid || a.user_id || a.userId || null) === activeUser.uid);
                renderMyPublicationsFeed();
            });

            socialMyPostsUnsubscribers.push(unsubAuth, unsubPrimary, unsubLegacy);
