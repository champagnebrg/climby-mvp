<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="theme-color" content="#0F1720">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Climby | Pro Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root {
            --bg: #f4f6ff;
            --bg-soft: radial-gradient(circle at 8% 4%, rgba(255, 106, 180, 0.12), transparent 34%), radial-gradient(circle at 94% 2%, rgba(122, 92, 255, 0.18), transparent 42%), radial-gradient(circle at 50% 100%, rgba(63, 151, 255, 0.14), transparent 45%), linear-gradient(160deg, #f7f2ff 0%, #f4f7ff 48%, #eff5ff 100%);
            --card: rgba(255, 255, 255, 0.92);
            --surface-elevated: rgba(255, 255, 255, 0.97);
            --text: #1b2241;
            --muted: #6d7694;
            --text-disabled: #9ca3bc;
            --border: rgba(120, 134, 175, 0.22);
            --primary: #6f4dff;
            --primary-hover: #5b3bdf;
            --primary-dim: rgba(111, 77, 255, 0.14);
            --accent: #4b6fff;
            --danger: #ff5d85;
            --yellow: #ffb245;
            --text-on-primary: #ffffff;
            --gradient-primary: linear-gradient(125deg, #ff63c2 0%, #7b54ff 48%, #4396ff 100%);
            --touch: 44px;
            --radius: 16px;
            --radius-sm: 12px;
            --safe-top: env(safe-area-inset-top, 0);
            --safe-bottom: env(safe-area-inset-bottom, 0);
            --safe-left: env(safe-area-inset-left, 0);
            --safe-right: env(safe-area-inset-right, 0);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            margin: 0;
            background: var(--bg);
            background-image: var(--bg-soft);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            min-height: 100dvh;
            min-height: 100vh;
            overflow-x: hidden;
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
            padding-bottom: var(--safe-bottom);
        }
        h1 { font-size: 28px; font-weight: 600; line-height: 1.2; }
        h2 { font-size: 22px; font-weight: 600; line-height: 1.25; }
        h3, h4 { font-weight: 600; }
        .view { display: none; min-height: 100dvh; min-height: 100vh; width: 100%; }
        .view.active { display: flex; flex-direction: column; }
        .container {
            padding: 20px 20px calc(100px + var(--safe-bottom));
            padding-left: max(20px, var(--safe-left));
            padding-right: max(20px, var(--safe-right));
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* UI – touch-optimized */
        .card {
            background: var(--card);
            padding: 18px 20px;
            border-radius: var(--radius);
            margin-bottom: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 24px rgba(63, 80, 124, 0.09);
            min-height: var(--touch);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .card:active { opacity: 0.95; }
        .btn-main {
            width: 100%;
            min-height: 52px;
            padding: 16px 24px;
            background: var(--gradient-primary);
            color: var(--text-on-primary);
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: normal;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 8px 20px rgba(102, 85, 194, 0.3);
        }
        .btn-main:hover { filter: brightness(0.96); }
        .btn-main:active { transform: scale(0.98); }
        .btn-sec {
            min-height: var(--touch);
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.95rem;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-sec:active { background: var(--surface-elevated); }
        .btn-update { min-height: 40px; padding: 10px 16px; background: var(--accent); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; }
        .btn-danger { min-height: 52px; background: var(--danger); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; width: 100%; margin-top: 12px; font-weight: 600; font-size: 1rem; }
        input, select, textarea {
            width: 100%;
            min-height: 52px;
            padding: 14px 18px;
            margin: 10px 0;
            background: rgba(255,255,255,0.95);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-sm);
            font-size: 16px;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }
        textarea { min-height: 100px; resize: vertical; }

        /* Dashboard Admin Table */
        table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.9rem; }
        th, td { text-align: left; padding: 14px 12px; border-bottom: 1px solid var(--border); }
        th { color: var(--text); font-weight: 600; font-size: 0.9rem; }
        .admin-coverage-toolbar { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
        .admin-coverage-toolbar select { min-height:44px; max-width:220px; margin:0; }
        .admin-coverage-grid { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:10px; }
        .admin-coverage-kpi { border:1px solid var(--border); border-radius:12px; padding:12px; background:var(--card); }
        .admin-coverage-kpi b { display:block; font-size:1.2rem; color:var(--text); }
        .admin-coverage-kpi span { display:block; margin-top:2px; font-size:0.8rem; color:var(--muted); }
        .admin-donut { width:86px; height:86px; border-radius:50%; display:grid; place-items:center; margin-left:auto; background:conic-gradient(var(--accent) 0 0%, rgba(255,255,255,0.06) 0 100%); }
        .admin-donut-inner { width:62px; height:62px; border-radius:50%; background:var(--card); display:grid; place-items:center; font-size:0.8rem; color:var(--text); border:1px solid var(--border); }
        .admin-trend { margin-top:12px; display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
        .admin-trend-item { border:1px solid var(--border); border-radius:10px; background:var(--card); padding:8px; }
        .admin-trend-bar { height:8px; border-radius:999px; background:rgba(255,255,255,0.06); overflow:hidden; margin-top:6px; }
        .admin-trend-bar > i { display:block; height:100%; background: var(--primary); }
        .admin-sector-coverage-list { margin-top:14px; display:grid; gap:10px; }
        .admin-sector-coverage-card { border:1px solid var(--border); border-radius:12px; background:var(--card); padding:12px; }
        .admin-sector-coverage-head { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:8px; }
        .admin-sector-top-list { margin:8px 0 0 0; padding-left:18px; color:var(--text); font-size:0.9rem; }
        .admin-sector-top-list li { margin:3px 0; }
        .admin-gym-form { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px; }
        .admin-gym-form .full { grid-column: 1 / -1; }
        .admin-gym-form h5 { margin:8px 0 2px; color: var(--text); font-size:0.95rem; }
        .admin-grade-setup-card textarea { min-height: 140px; }
        .admin-layout { display:grid; grid-template-columns:220px minmax(0,1fr); gap:18px; align-items:start; }
        .admin-sidebar { position:sticky; top:14px; border:1px solid var(--border); background:var(--card); border-radius:14px; padding:10px; display:grid; gap:8px; }
        .admin-sidebar button { width:100%; text-align:left; min-height:44px; border-radius:10px; border:1px solid transparent; background:transparent; color:var(--muted); font-weight:600; cursor:pointer; }
        .admin-sidebar button.active { background:var(--primary-dim); border-color:rgba(43,224,125,0.35); color:var(--text); }
        .admin-tab-panel { display:none; }
        .admin-tab-panel.active { display:block; }
        .admin-kpi-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-bottom:14px; }
        .admin-kpi-card { border:1px solid var(--border); border-radius:12px; background:var(--card); padding:12px; }
        .admin-kpi-card i { font-style:normal; color:var(--muted); font-size:0.8rem; display:block; margin-bottom:6px; }
        .admin-kpi-card b { font-size:1.35rem; display:block; line-height:1.1; }
        .admin-highlight { color:var(--primary); }
        .admin-section-title { margin:0 0 8px 0; font-size:1.05rem; }
        .admin-sector-table-wrap { overflow:auto; border:1px solid var(--border); border-radius:12px; }
        .admin-sector-badge { border-radius:999px; padding:4px 8px; font-size:0.75rem; background:rgba(255,92,92,0.14); color:#ff9c9c; border:1px solid rgba(255,92,92,0.25); }
        .admin-activity-trend { margin-top:8px; font-size:0.88rem; color:var(--muted); }
        .admin-settings-block { margin-bottom:14px; }
        .admin-feedback-analytics { margin-top:12px; display:grid; gap:12px; }
        .admin-feedback-card { border:1px solid var(--border); border-radius:12px; background:var(--card); padding:12px; }
        .admin-feedback-card h5 { margin:0 0 10px 0; font-size:0.95rem; }
        .admin-feedback-empty { color:var(--muted); font-size:0.9rem; }
        .admin-feedback-list { display:grid; gap:8px; }
        .admin-feedback-row { display:grid; grid-template-columns:minmax(0,1fr) 140px; gap:10px; align-items:center; }
        .admin-feedback-label { font-size:0.86rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .admin-feedback-bar-wrap { height:10px; border-radius:999px; background:rgba(255,255,255,0.06); border:1px solid var(--border); overflow:hidden; }
        .admin-feedback-bar { height:100%; background:var(--primary); border-radius:999px; }
        .admin-feedback-meta { font-size:0.8rem; color:var(--muted); text-align:right; white-space:nowrap; }
        .admin-feedback-line { display:grid; grid-template-columns: repeat(30, minmax(0,1fr)); gap:3px; align-items:end; height:110px; }
        .admin-feedback-line i { display:block; width:100%; background:var(--primary); border-radius:4px 4px 0 0; min-height:2px; opacity:0.95; }
        .admin-users-page { display:grid; gap:14px; }
        .admin-block-card { border:1px solid var(--border); border-radius:14px; background:var(--card); padding:14px; box-shadow:0 8px 20px rgba(63,80,124,0.08); }
        .admin-block-card h5 { margin:0 0 10px 0; font-size:0.98rem; }
        .admin-kpi-grid.modern { grid-template-columns:repeat(4,minmax(0,1fr)); margin:0; }
        .admin-kpi-card.modern { padding:14px; border-radius:14px; display:grid; gap:4px; }
        .admin-kpi-card.modern b { font-size:1.5rem; }
        .admin-kpi-label { color:var(--muted); font-size:0.8rem; }
        .admin-kpi-trend { color:var(--primary); font-size:0.78rem; }
        .admin-user-table-wrap { overflow:auto; border:1px solid var(--border); border-radius:12px; }
        .admin-user-table-wrap table { margin-top:0; }
        .admin-user-table-wrap tr:first-child td { background:rgba(43,224,125,0.08); }
        .admin-rank { display:inline-grid; place-items:center; min-width:24px; height:24px; border-radius:999px; font-weight:700; font-size:0.8rem; border:1px solid var(--border); }
        .admin-rank.top { background:rgba(43,224,125,0.16); color:#1ea56f; border-color:rgba(43,224,125,0.35); }
        .admin-feedback-analytics.compact { grid-template-columns:repeat(2,minmax(0,1fr)); }
        .admin-feedback-compact-item { display:flex; justify-content:space-between; gap:10px; align-items:center; border-bottom:1px dashed var(--border); padding:6px 0; }
        .admin-feedback-compact-item:last-child { border-bottom:none; }
        .admin-feedback-compact-item b { font-size:0.9rem; }
        .admin-stars { letter-spacing:1px; color:#f2b94b; white-space:nowrap; }
        .admin-sector-analytics { display:grid; gap:14px; }
        .admin-sector-analytics-card { border:1px solid var(--border); border-radius:14px; background:var(--card); padding:0; overflow:hidden; }
        .admin-sector-analytics-head { list-style:none; display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px 14px; cursor:pointer; }
        .admin-sector-analytics-head::-webkit-details-marker { display:none; }
        .admin-sector-analytics-title { margin:0; font-size:0.95rem; }
        .admin-sector-analytics-summary { display:flex; flex-wrap:wrap; justify-content:flex-end; gap:6px; }
        .admin-sector-analytics-body { padding:0 14px 14px; border-top:1px solid var(--border); display:grid; gap:12px; }
        .admin-sector-block { border:1px solid var(--border); border-radius:12px; background:var(--surface-elevated); padding:10px; }
        .admin-sector-block h5 { margin:0 0 8px 0; font-size:0.9rem; }
        .admin-sector-analytics-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
        .admin-sector-analytics-kpi { border:1px solid var(--border); border-radius:10px; padding:10px; background:var(--card); }
        .admin-sector-analytics-kpi b { display:block; font-size:1.02rem; }
        .admin-sector-analytics-kpi span { color:var(--muted); font-size:0.78rem; }
        .admin-sector-route-row { padding:6px 0; border-top:1px dashed var(--border); }
        .admin-sector-route-row:first-child { border-top:none; padding-top:0; }
        .admin-sector-comment-preview { margin-top:4px; color:var(--muted); font-size:0.82rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .admin-vote-rows { display:grid; gap:6px; }
        .admin-vote-row { display:grid; grid-template-columns:42px 1fr auto; gap:8px; align-items:center; font-size:0.82rem; }
        .admin-vote-track { height:6px; border-radius:999px; border:1px solid var(--border); background:rgba(255,255,255,0.06); overflow:hidden; }
        .admin-vote-fill { height:100%; background:var(--primary); }
        .admin-pill { border:1px solid var(--border); border-radius:999px; padding:4px 8px; font-size:0.75rem; color:var(--muted); }
        .admin-filters-shell { position:sticky; top:8px; z-index:20; margin-bottom:10px; }
        .admin-filters-toggle { width:100%; min-height:44px; border:1px solid var(--border); border-radius:12px; background:color-mix(in srgb, var(--card) 92%, #ffffff 8%); color:var(--text); font-weight:700; font-size:0.9rem; display:flex; justify-content:space-between; align-items:center; padding:10px 12px; box-shadow:0 8px 18px rgba(23,31,56,0.14); }
        .admin-filter-badge { font-size:0.78rem; color:var(--muted); margin-left:6px; }
        .admin-sticky-filters { border:1px solid var(--border); border-radius:12px; background:color-mix(in srgb, var(--card) 90%, #ffffff 10%); backdrop-filter: blur(6px); padding:10px; display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; box-shadow:0 8px 18px rgba(23,31,56,0.14); overflow:hidden; max-height:0; opacity:0; transform:translateY(-4px); pointer-events:none; transition:max-height .25s ease, opacity .2s ease, transform .2s ease; }
        .admin-sticky-filters.open { max-height:420px; opacity:1; transform:translateY(0); pointer-events:auto; margin-top:8px; }
        .admin-sticky-filters select { min-height:46px; margin:0; padding:10px 12px; font-size:0.8rem; font-weight:600; line-height:1.2; color:var(--text); background:var(--surface-elevated); border:1px solid color-mix(in srgb, var(--border) 70%, var(--primary) 30%); border-radius:10px; }
        .admin-toggle { display:flex; align-items:center; gap:8px; min-height:46px; font-size:0.78rem; font-weight:600; color:var(--text); border:1px solid color-mix(in srgb, var(--border) 70%, var(--primary) 30%); border-radius:10px; padding:8px 10px; background:var(--surface-elevated); }
        .admin-toggle input { width:auto; min-height:unset; margin:0; accent-color: var(--primary); }
        .admin-table-sort { cursor:pointer; user-select:none; }
        .admin-pager { display:flex; justify-content:flex-end; gap:8px; margin-top:8px; }
        .admin-mini-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
        .admin-mini-tab { border:1px solid var(--border); border-radius:999px; background:transparent; color:var(--muted); padding:6px 10px; cursor:pointer; }
        .admin-mini-tab.active { border-color:rgba(43,224,125,0.35); color:var(--text); background:var(--primary-dim); }
        .admin-modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:none; align-items:center; justify-content:center; z-index:2200; padding:16px; }
        .admin-modal { width:min(860px,100%); max-height:80vh; overflow:auto; border:1px solid var(--border); border-radius:14px; background:var(--card); padding:14px; }
        .admin-bar-chart { display:grid; gap:6px; }
        .admin-bar-row { display:grid; grid-template-columns:minmax(0,1fr) 140px; gap:8px; align-items:center; }
        .admin-bar-track { height:10px; border:1px solid var(--border); border-radius:999px; background:rgba(255,255,255,0.06); overflow:hidden; }
        .admin-bar-fill { height:100%; background:var(--primary); }

        .admin-sectors-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:12px; }
        .admin-sectors-header h3 { margin:0; }
        .admin-sectors-header p { margin:4px 0 0; color:var(--muted); font-size:0.9rem; }
        .admin-create-sector-card { border:1px solid var(--border); border-radius:14px; background:var(--card); padding:14px; display:grid; gap:10px; }
        .admin-file-hidden { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }
        .admin-file-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        .admin-file-chip { border:1px dashed var(--border); border-radius:999px; padding:6px 10px; color:var(--muted); font-size:0.82rem; }
        .admin-sector-list { display:grid; gap:12px; }
        .admin-sector-card { border:1px solid var(--border); border-radius:14px; background:var(--card); padding:14px; box-shadow:0 8px 20px rgba(63,80,124,0.08); }
        .admin-sector-head { display:flex; align-items:center; justify-content:space-between; gap:10px; }
        .admin-sector-title { margin:0; font-size:1.05rem; }
        .admin-sector-status { margin-top:6px; font-size:0.86rem; color:var(--muted); }
        .admin-sector-status.ok { color:#1ea56f; }
        .admin-sector-status.warn { color:#e0992d; }
        .admin-sector-actions { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin-top:12px; }
        .btn-danger-soft { min-height:44px; border:1px solid rgba(255,93,133,0.4); background:rgba(255,93,133,0.12); color:#d6476f; border-radius:10px; font-weight:600; }
        @media (max-width: 700px) { .admin-sector-actions { grid-template-columns:1fr; } }

        @media (max-width: 900px) {
            .admin-layout { grid-template-columns:1fr; }
            .admin-sidebar { position:static; grid-template-columns:repeat(2,minmax(0,1fr)); }
            .admin-kpi-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
            .admin-kpi-grid.modern { grid-template-columns:repeat(2,minmax(0,1fr)); }
            .admin-feedback-analytics.compact { grid-template-columns:1fr; }
            .admin-sector-analytics-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
            .admin-sticky-filters { grid-template-columns:1fr; }
            .admin-sticky-filters.open { max-height:560px; }
        }

        /* Overlays */
        #loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
        }
        .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Viewer */
        #viewer-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            z-index: 1000;
            background: #000;
            display: none;
        }
        model-viewer { width: 100%; height: 100%; }
        .hotspot {
            width: 28px;
            height: 28px;
            min-width: 28px;
            min-height: 28px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            max-height: 88vh;
            max-height: 88dvh;
            background: var(--card);
            border-top: 3px solid var(--primary);
            border-radius: 24px 24px 0 0;
            padding: 20px;
            padding-bottom: max(24px, var(--safe-bottom));
            padding-left: max(20px, var(--safe-left));
            padding-right: max(20px, var(--safe-right));
            box-sizing: border-box;
            display: none;
            z-index: 1002;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            pointer-events: auto;
        }
        .bottom-sheet::before {
            content: '';
            display: block;
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 8px auto;
        }
        .start-guide-overlay {
            position: absolute;
            inset: 0;
            z-index: 1003;
            display: none;
            align-items: flex-start;
            justify-content: flex-end;

        const USERNAME_PATTERN = /^[a-zA-Z0-9_.-]{3,20}$/;
        let usernameCheckTimer = null;
        let lastCheckedUsername = '';
        let lastUsernameAvailable = false;

        function normalizeUsername(v) {
            const raw = (v || '').trim();
            if (!raw) return '';
            const ascii = raw.normalize('NFKD').replace(/[̀-ͯ]/g, '');
            const compact = ascii.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_.-]/g, '');
            return compact;
        }
        function usernameLower(v) { return normalizeUsername(v).toLowerCase(); }
        function isValidUsername(v) { return USERNAME_PATTERN.test(normalizeUsername(v)); }
        function setUsernameStatus(message, kind = '') {
            const status = document.getElementById('username-status');
            if (!status) return;
            status.textContent = message || '';
            status.className = `username-hint${kind ? ` ${kind}` : ''}`;
        }

        function populateAdminColorOptions() {
            const colorSelect = document.getElementById('route-color');
            if (!colorSelect) return;
            const prevValue = colorSelect.value;
            colorSelect.innerHTML = AVAILABLE_COLORS.map(c => {
                const label = c.labels?.[currentLang] || c.labels?.it || c.value;
                return `<option value="${c.value}">● ${label}</option>`;
            }).join('');
            if (prevValue) {
                ensureRouteColorOption(prevValue);
                colorSelect.value = prevValue;
            }
        }

        function ensureRouteColorOption(colorValue) {
            const colorSelect = document.getElementById('route-color');
            if (!colorSelect || !colorValue) return;
            const exists = Array.from(colorSelect.options).some(opt => opt.value.toLowerCase() === colorValue.toLowerCase());
            if (exists) return;
            const legacy = document.createElement('option');
            legacy.value = colorValue;
            legacy.textContent = `● ${colorValue.toUpperCase()}`;
            colorSelect.appendChild(legacy);
        }
        async function checkUsernameAvailability(rawUsername) {
            const normalized = normalizeUsername(rawUsername);
            const lower = usernameLower(normalized);
            if (!normalized) {
                lastCheckedUsername = '';
                lastUsernameAvailable = false;
                setUsernameStatus(t('auth.usernameHint'));
                return { available: false, reason: 'empty' };
            }
            if (!isValidUsername(normalized)) {
                lastCheckedUsername = lower;
                lastUsernameAvailable = false;
                setUsernameStatus(t('auth.usernameInvalid'), 'error');
                return { available: false, reason: 'invalid' };
            }
            setUsernameStatus(t('auth.usernameChecking'));
            try {
                const qRef = query(collection(db, 'users'), where('usernameLower', '==', lower), limit(1));
                const snap = await getDocs(qRef);
                const taken = !snap.empty;
                lastCheckedUsername = lower;
                lastUsernameAvailable = !taken;
                setUsernameStatus(taken ? t('auth.usernameTaken') : t('auth.usernameAvailable'), taken ? 'error' : 'ok');
                return { available: !taken, reason: taken ? 'taken' : 'ok' };
            } catch (_) {
                setUsernameStatus(t('auth.usernameHint'));
                return { available: true, reason: 'skip' };
            }
        }
        function resolveUsername(userId, fallbackName = 'Climber') {
            if (userId && lastUsersSnap) {
                const found = lastUsersSnap.docs.find(d => d.id === userId || d.data()?.authUid === userId);
                if (found) {
                    const data = found.data() || {};
                    if (data.username) return data.username;
                }
            }
            return fallbackName;
        }


        async function getUserProfileByAuthUid(authUid) {
            if (!authUid) return { ref: null, id: null, data: {} };
            try {
                const qSnap = await getDocs(query(collection(db, 'users'), where('authUid', '==', authUid), limit(1)));
                if (!qSnap.empty) {
                    const d = qSnap.docs[0];
                    return { ref: doc(db, 'users', d.id), id: d.id, data: d.data() || {} };
                }
            } catch (_) {}
            const legacyRef = doc(db, 'users', authUid);
            const legacySnap = await getDoc(legacyRef);
            if (legacySnap.exists()) {
                const legacyData = legacySnap.data() || {};
                const usernameId = normalizeUsername(legacyData.username || '');
                if (usernameId && usernameId !== authUid) {
                    const targetRef = doc(db, 'users', usernameId);
                    await setDoc(targetRef, { authUid, ...legacyData }, { merge: true });
                    return { ref: targetRef, id: usernameId, data: { authUid, ...legacyData } };
                }
                return { ref: legacyRef, id: authUid, data: { authUid, ...legacyData } };
            }
            return { ref: legacyRef, id: authUid, data: { authUid } };
        }

        async function ensureUidProfileMirror(authUid, sourceData = {}) {
            if (!authUid) return;
            const mirrorRef = doc(db, 'users', authUid);
            const normalized = { ...(sourceData || {}), authUid };
            await setDoc(mirrorRef, normalized, { merge: true });
        }

        async function mergeUserProfileByAuthUid(authUid, payload) {
            const profile = await getUserProfileByAuthUid(authUid);
            if (!profile.ref) return;
            const data = { authUid, ...payload };
            await setDoc(profile.ref, data, { merge: true });
            if (profile.id !== authUid) {
                await ensureUidProfileMirror(authUid, { ...(profile.data || {}), ...payload });
            }
        }

        function normalizeGymIdSeed(text) {
            return String(text || '')
                .trim()
                .toLowerCase()
                .replace(/[^a-z0-9\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '');
        }

        async function resolveAdminGymId(userId, existingGymId) {
            if (existingGymId) return existingGymId;
            if (!userId) return null;
            try {
                const gymsSnap = await getDocs(query(collection(db, 'gyms'), where('owner', '==', userId), limit(1)));
                if (!gymsSnap.empty) {
                    const gymId = gymsSnap.docs[0].id;
                    await mergeUserProfileByAuthUid(userId, { gymManaged: gymId });
                    return gymId;
                }

                const requestsSnap = await getDocs(query(collection(db, 'gymOwnerRequests'), where('userId', '==', userId), limit(10)));
                if (requestsSnap.empty) return null;
                const latestReq = requestsSnap.docs
                    .map(d => ({ id: d.id, ...(d.data() || {}) }))
                    .sort((a, b) => {
                        const aTs = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
                        const bTs = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
                        return bTs - aTs;
                    })[0];
                const gymName = String(latestReq?.gymName || '').trim();
                if (!gymName) return null;

                const base = normalizeGymIdSeed(gymName) || 'gym';
                const gymId = `${base}-${userId.slice(0, 6)}`;
                await setDoc(doc(db, 'gyms', gymId), { name: gymName, owner: userId }, { merge: true });
                await mergeUserProfileByAuthUid(userId, { gymManaged: gymId });
                return gymId;
            } catch (_) {
                return null;
            }
        }

        async function getGymGradeSystem(gymId) {
            if (!gymId) return null;
            const snap = await getDoc(doc(db, 'gyms', gymId));
            if (!snap.exists()) return null;
            const data = snap.data() || {};
            return { gradeSystem: Array.isArray(data.gradeSystem) ? data.gradeSystem : [], gradeSystemConfigured: !!data.gradeSystemConfigured, gradeSystemLocked: !!data.gradeSystemLocked };
        }

        function parseGradeSystemInput(text) {
            const labels = String(text || '').split('\n').map(v => v.trim()).filter(Boolean);
            return labels.map((label, index) => ({ label, order: index }));
        }

        async function saveGymGradeSystem(gymId, text) {
            const rows = parseGradeSystemInput(text);
            if (!rows.length) throw new Error('Inserisci almeno un grado.');
            const unique = new Set(rows.map(r => r.label.toLowerCase()));
            if (unique.size !== rows.length) throw new Error('I gradi devono essere univoci.');
            const snap = await getDoc(doc(db, 'gyms', gymId));
            const gymData = snap.exists() ? (snap.data() || {}) : {};
            if (gymData.gradeSystemLocked && gymData.gradeSystemConfigured) throw new Error('Sistema gradi bloccato.');
            await setDoc(doc(db, 'gyms', gymId), { gradeSystem: rows, gradeSystemConfigured: true }, { merge: true });
            currentGymGradeSystem = rows;
            gymLevelOrderMap.set(gymId, gradeSystemArrayToMap(rows));
            return rows;
        }

        function startGym3DSubscriptions(gymsSnapshot) {
            stopGym3DSubscriptions();

                const unsub = onSnapshot(collection(db, 'gyms', g.id, 'Sectors'), (snap) => {

        function areConsecutiveDays(prevYmd, nextYmd) {
            if (!prevYmd || !nextYmd) return false;
            const p = new Date(`${prevYmd}T00:00:00`);
            const n = new Date(`${nextYmd}T00:00:00`);
            if (Number.isNaN(p.getTime()) || Number.isNaN(n.getTime())) return false;
            const diff = Math.round((n.getTime() - p.getTime()) / (24*60*60*1000));
            return diff === 1;
        }

        async function upsertUserGymStats(userId, gymId, gymName, grade, gradeOrder, attempts = 1) {
            if (!userId || !gymId) return { isNewMax: false, streakDays: 0 };
            const statsRef = doc(db, 'users', userId, 'gymStats', gymId);
            const snap = await getDoc(statsRef);
            const prev = snap.exists() ? (snap.data() || {}) : {};
            const today = toYYYYMMDD(new Date());
            const prevOrder = Number.isFinite(prev.max_grade_order) ? prev.max_grade_order : -1;
            const hasLegacyMaxWithoutOrder = !Number.isFinite(prev.max_grade_order) && !!prev.max_grade;
            const nextOrder = Number.isFinite(gradeOrder) ? gradeOrder : prevOrder;
            const isNewMax = Number.isFinite(nextOrder) && !hasLegacyMaxWithoutOrder && nextOrder > prevOrder;
            const prevStreak = Number(prev.streak_days || 0);
            const streakDays = prev.last_activity_day === today
                ? Math.max(1, prevStreak)
                : areConsecutiveDays(prev.last_activity_day, today) ? Math.max(1, prevStreak + 1) : 1;
            const payload = {
                user_id: userId,
                gym_id: gymId,
                gym_name: gymName || gymId,
                max_grade: isNewMax ? (grade || prev.max_grade || '-') : (prev.max_grade || grade || '-'),
                max_grade_order: isNewMax ? nextOrder : prevOrder,
                total_routes: Number(prev.total_routes || 0) + 1,
                active_days: prev.last_activity_day === today ? Number(prev.active_days || 1) : Number(prev.active_days || 0) + 1,
                streak_days: streakDays,
                last_activity_day: today,
                updated_at: new Date().toISOString()
            };
            await setDoc(statsRef, payload, { merge: true });
            await mergeUserProfileByAuthUid(userId, {
                mainGymName: prev.gym_name || gymName || gymId,
                mainGymMaxGrade: payload.max_grade
            });
            return { isNewMax, streakDays };

        function gradeOrderForEntry(entry, orderMap) {
            if (Number.isFinite(entry?.gradeOrder)) return Number(entry.gradeOrder);

        function gradeSystemArrayToMap(gradeSystem) {
            const map = new Map();
            (Array.isArray(gradeSystem) ? gradeSystem : []).forEach(item => {

        function normalizeProgressValue(localRank, scaleSize) {
            if (localRank < 0 || !scaleSize || scaleSize <= 1) return 0;
            return localRank / (scaleSize - 1);
        }

        function computeProfileData(entries) {
            const deduped = [];
            const seen = new Set();
            entries.forEach((e) => {
                const dayKey = String(e.sendDate || getDateKeyFromAnyValue(e.date) || '');
                const routeKey = e.routeId || '';
                const dedupKey = `${e.userId || ''}__${e.gymId || e.gymName || ''}__${e.sectorId || e.sectorName || ''}__${routeKey}__${e.outcome || 'climbed'}__${dayKey}`;
                if (routeKey && seen.has(dedupKey)) return;
                if (routeKey) seen.add(dedupKey);
                deduped.push(e);
            });
            const sorted = deduped.slice().sort((a, b) => new Date(b.sendDate || b.date || 0) - new Date(a.sendDate || a.date || 0));
            const daySet = new Set(sorted.map(e => e.sendDate || '').filter(Boolean));
            const gymSet = new Set(sorted.map(e => e.gymName || '').filter(Boolean));

            const groups = new Map();
            for (const e of sorted) {
                const gk = e.gymId || e.gymName || 'unknown';
                if (!groups.has(gk)) groups.set(gk, []);
                groups.get(gk).push(e);
            }

            let globalMaxNorm = -1;
            let globalMaxLabel = '-';
            const byGym = [];
            const enriched = [];

            for (const [gymKey, gymEntries] of groups.entries()) {
                const gymId = gymEntries[0]?.gymId;
                const orderMap = gymId ? gymLevelOrderMap.get(gymId) : null;
                const scaleSize = Math.max(2, (orderMap?.size || 1));
                let localMaxRank = -1;
                let localMaxLabel = '-';
                for (const e of gymEntries) {
                    const rank = gradeOrderForEntry(e, orderMap);
                    const norm = normalizeProgressValue(rank, scaleSize);
                    enriched.push({ ...e, _rank: rank, _norm: norm, _gymKey: gymKey });
                    if (rank > localMaxRank) {
                        localMaxRank = rank;
                        localMaxLabel = normalizeLevelValue(e.grade) || '-';
                    }
                    if (norm > globalMaxNorm) {
                        globalMaxNorm = norm;
                        globalMaxLabel = normalizeLevelValue(e.grade) || '-';
                    }
                }
                byGym.push({ gymName: gymEntries[0]?.gymName || gymKey, localMax: localMaxLabel });
            }

            const normPct = Math.max(0, Math.round((globalMaxNorm < 0 ? 0 : globalMaxNorm) * 100));
            const atMaxCount = enriched.filter(e => Math.abs(e._norm - globalMaxNorm) < 1e-6).length;
            const targetAtMax = 5;
            const progressPct = Math.max(0, Math.min(100, Math.round((atMaxCount / targetAtMax) * 100)));

            const ascByDate = enriched.slice().sort((a, b) => new Date(a.sendDate || a.date || 0) - new Date(b.sendDate || b.date || 0));
            let bestNorm = -1;
            const milestones = [];
            for (const e of ascByDate) {
                if (e._norm > bestNorm) {
                    bestNorm = e._norm;
                    milestones.push({ label: normalizeLevelValue(e.grade) || '-', normPct: Math.round(e._norm * 100), date: e.sendDate || e.date || '' });
                }
            }

            return {
                sorted,
                totalSends: sorted.length,
                activeDays: daySet.size,
                reviewedGyms: gymSet.size,
                globalMaxLabel,
                globalMaxNormPct: normPct,
                atMaxCount,
                targetAtMax,
                progressPct,
                milestones,
                byGym
            };
        }

        function getDateKeyFromAnyValue(value) {
            if (!value) return '';
            let d = null;
            if (value instanceof Date) d = value;
            else if (typeof value?.toDate === 'function') d = value.toDate();
            else if (typeof value === 'string' || typeof value === 'number') d = new Date(value);
            if (!d || Number.isNaN(d.getTime())) return '';
            return toYYYYMMDD(d);
        }

        function computeUserChallenges(trackerAll = []) {
            const climbedEntries = trackerAll.filter(v => v.state === 'climbed');
            const daysInGym = new Set();
            const sectors = new Set();
            const gyms = new Set();

            trackerAll.forEach(v => {
                const dayKey = getDateKeyFromAnyValue(v.eventDate || v.completionDate || v.updatedAt || v.createdAt);
                if (dayKey) daysInGym.add(dayKey);
                const sectorKey = String(v.sectorId || v.sectorName || '').trim();
                if (sectorKey) sectors.add(sectorKey);
                const gymKey = String(v.gymId || v.gymName || '').trim();
                if (gymKey) gyms.add(gymKey);
            });

            const sortedDays = Array.from(daysInGym).sort();
            let longestStreak = 0;
            let currentStreak = 0;
            let prev = null;
            sortedDays.forEach(day => {
                if (!prev) currentStreak = 1;
                else currentStreak = areConsecutiveDays(prev, day) ? currentStreak + 1 : 1;
                longestStreak = Math.max(longestStreak, currentStreak);
                prev = day;
            });

            const metrics = [
                { key: 'routes', label: t('ui.totalClosedRoutes'), value: climbedEntries.length, available: trackerAll.some(v => Object.prototype.hasOwnProperty.call(v || {}, 'state')) },
                { key: 'days', label: t('ui.gymDays'), value: daysInGym.size, available: trackerAll.some(v => getDateKeyFromAnyValue(v.eventDate || v.completionDate || v.updatedAt || v.createdAt)) },
                { key: 'streak', label: t('ui.consecutiveDays'), value: longestStreak, available: daysInGym.size > 0 },
                { key: 'sectors', label: t('challenges.sectorsTried'), value: sectors.size, available: trackerAll.some(v => !!(v.sectorId || v.sectorName)) },
                { key: 'gyms', label: t('ui.gymsTried'), value: gyms.size, available: trackerAll.some(v => !!(v.gymId || v.gymName)) }
            ];
            return metrics.filter(m => m.available);
        }

        function getChallengeMonthlyDefs() {
            return [
                { key: 'routes', category: t('ui.challengeCategoryActivity'), name: t('ui.challengeRoutesClosed'), desc: t('ui.challengeRoutesClosedDesc'), levels: [10, 25, 50, 100] },
                { key: 'days', category: t('ui.challengeCategoryActivity'), name: t('ui.challengeGymDays'), desc: t('ui.challengeGymDaysDesc'), levels: [4, 8, 12, 20] },
                { key: 'streak', category: t('ui.challengeCategoryActivity'), name: t('ui.challengeMonthlyStreak'), desc: t('ui.challengeMonthlyStreakDesc'), levels: [3, 7, 12, 20] },

        function computeMonthlyChallenges(trackerAll = []) {
            const mk = nowMonthKey();
            const monthRows = trackerAll.filter(v => getDateKeyFromAnyValue(v.eventDate || v.completionDate || v.updatedAt || v.createdAt).startsWith(mk));
            const climbed = monthRows.filter(v => v.state === 'climbed');
            const days = new Set();
            const sectors = new Set();
            const gyms = new Set();
            monthRows.forEach(v => {
                const d = getDateKeyFromAnyValue(v.eventDate || v.completionDate || v.updatedAt || v.createdAt);
                if (d) days.add(d);
                const sk = String(v.sectorId || v.sectorName || '').trim();
                if (sk) sectors.add(sk);
                const gk = String(v.gymId || v.gymName || '').trim();
                if (gk) gyms.add(gk);
            });
            const sorted = Array.from(days).sort();
            let bestStreak = 0;
            let cur = 0;
            let prev = null;
            sorted.forEach(day => {
                if (!prev) cur = 1;
                else cur = areConsecutiveDays(prev, day) ? cur + 1 : 1;
                bestStreak = Math.max(bestStreak, cur);
                prev = day;
            });
            const values = { routes: climbed.length, days: days.size, streak: bestStreak, sectors: sectors.size, gyms: gyms.size };
            const challengeDefs = getChallengeMonthlyDefs();
            const challengeLevelLabels = getChallengeLevelLabels();
            const metrics = challengeDefs.map(def => {
                const value = Number(values[def.key] || 0);
                const lvlIdx = def.levels.reduce((acc, thr, i) => (value >= thr ? i : acc), -1);
                const nextThr = lvlIdx < def.levels.length - 1 ? def.levels[lvlIdx + 1] : def.levels[def.levels.length - 1];
                const currentThr = lvlIdx >= 0 ? def.levels[lvlIdx] : 0;
                const pct = Math.max(0, Math.min(100, Math.round((value / Math.max(1, nextThr)) * 100)));
                return { ...def, value, levelIndex: lvlIdx, level: lvlIdx >= 0 ? challengeLevelLabels[lvlIdx] : t('ui.none'), nextLevel: lvlIdx < challengeLevelLabels.length - 1 ? challengeLevelLabels[lvlIdx + 1] : t('ui.completed'), currentThr, nextThr, pct };
            });
            const ranked = metrics.filter(m => m.levelIndex >= 0).sort((a,b) => b.levelIndex - a.levelIndex || b.value - a.value);
            const highest = ranked[0] ? { month: mk, challenge: ranked[0].name, level: ranked[0].level, icon: ['🥉','🥈','🥇','🏆'][ranked[0].levelIndex] || '🏅' } : null;
            return { monthKey: mk, metrics, highest };
        }

        async function persistMonthlyBadgeState(state) {
            if (!activeUser || !state?.monthKey) return;
            const prev = monthlyChallengesState || {};
            const nextHistory = { ...(prev.history || {}) };
            const currentLevels = {};
            (state.metrics || []).forEach(m => { if (m.levelIndex >= 0) currentLevels[m.key] = m.level; });
            nextHistory[state.monthKey] = { ...(nextHistory[state.monthKey] || {}), ...currentLevels };
            const prevMonthData = (prev.history || {})[state.monthKey] || {};
            const nextMonthData = nextHistory[state.monthKey] || {};
            const prevBadgeStr = JSON.stringify(prev.highestBadge || null);
            const nextBadgeStr = JSON.stringify(state.highest || null);
            const sameLevels = JSON.stringify(prevMonthData) === JSON.stringify(nextMonthData);
            if (sameLevels && prev.monthKey === state.monthKey && prevBadgeStr == nextBadgeStr) {
                monthlyChallengesState = { ...state, history: nextHistory };
                return;
            }
            const profile = await getUserProfileByAuthUid(activeUser.uid);
            if (!profile.ref) return;
            state.metrics.forEach(m => {
                const oldLvl = CHALLENGE_LEVEL_LABELS.indexOf(prevMonthData[m.key] || '');
                if (m.levelIndex > oldLvl && m.levelIndex >= 0) showChallengeLevelUpToast(m, m.level);
            });
            await setDoc(profile.ref, {
                authUid: activeUser.uid,
                challengesMonthlyHistory: nextHistory,
                publicMonthlyBadge: state.highest ? state.highest : null
            }, { merge: true });
            monthlyChallengesState = { ...state, history: nextHistory };
        }

                    <div class="profile-progress-tech">
                        <b>${t('ui.profileGradeProgression')}</b>
                        ${spark}

        function followDocId(followerId, followingId) { return `${followerId}__${followingId}`; }

        function stopFollowsSubscription() {
            if (typeof followsUnsubscriber === 'function') followsUnsubscriber();
            followsUnsubscriber = null;
        }

        function startFollowsSubscription() {
            if (!activeUser) return;
            stopFollowsSubscription();
            const qRef = query(collection(db, 'follows'), where('followerId', '==', activeUser.uid));
            followsUnsubscriber = onSnapshot(qRef, (snap) => {
                userFollowingIds = snap.docs.map(d => d.data()?.followingId).filter(Boolean);
                syncFollowingProgressSubscriptions();
                renderFollowingSection();
                renderActivePublicProfile();
            });
        }

        async function toggleFollowUser(targetUid) {
            if (!activeUser) { alert(t('errors.authRequired')); return; }
            if (!targetUid || targetUid === activeUser.uid) return;
            const isFollowing = userFollowingIds.includes(targetUid);
            const followRef = doc(db, 'follows', followDocId(activeUser.uid, targetUid));
            try {
                if (isFollowing) {
                    await deleteDoc(followRef);
                    userFollowingIds = userFollowingIds.filter(id => id !== targetUid);
                } else {
                    await setDoc(followRef, { followerId: activeUser.uid, followingId: targetUid, createdAt: serverTimestamp() }, { merge: true });
                    userFollowingIds = [...new Set([...userFollowingIds, targetUid])];
                }
                syncFollowingProgressSubscriptions();
                renderFollowingSection();
                renderActivePublicProfile();
            } catch (e) { alertWriteError(e); }
        }

        function stopFollowingProgressSubscriptions() {
            while (followingProgressUnsubscribers.length) {
                const unsub = followingProgressUnsubscribers.pop();
                if (typeof unsub === 'function') unsub();
            }
            stopSocialFeedSubscription();
            stopMyPostsSubscription();
            followingFeedMap = new Map();
        }

        function stopMyPostsSubscription() {
            while (socialMyPostsUnsubscribers.length) {
                const unsub = socialMyPostsUnsubscribers.pop();
                if (typeof unsub === 'function') unsub();
            }
            socialMyPostsActivities = [];
            socialMyPostsLoading = false;
            socialMyPostsError = null;
            socialMyPostsInteractionMeta = new Map();
            socialMyPostsExpanded = new Set();
        }

        function startMyPostsSubscription() {
            stopMyPostsSubscription();
            if (!activeUser?.uid) {
                renderMyPublicationsFeed();
                return;
            }
            socialMyPostsLoading = true;
            socialMyPostsError = null;
            renderMyPublicationsFeed();

            const byUserId = query(collection(db, 'socialActivities'), where('user_id', '==', activeUser.uid), limit(250));
            const byLegacyUserId = query(collection(db, 'socialActivities'), where('userId', '==', activeUser.uid), limit(250));
            let primaryRows = [];
            let legacyRows = [];

            const applyMerged = () => {
                const merged = new Map();
                [...primaryRows, ...legacyRows].forEach(item => merged.set(item.id, item));
                socialMyPostsActivities = Array.from(merged.values()).sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
                socialMyPostsLoading = false;
                renderMyPublicationsFeed();
            };

            const unsubPrimary = onSnapshot(byUserId, (snap) => {
                primaryRows = snap.docs.map(d => ({ id: d.id, ...(d.data() || {}) }));
                applyMerged();
            }, (err) => {
                socialMyPostsError = err;
                socialMyPostsLoading = false;
                socialMyPostsActivities = socialFeedActivities.filter(a => (a.user_id || a.userId || null) === activeUser.uid);
                renderMyPublicationsFeed();
            });

            const unsubLegacy = onSnapshot(byLegacyUserId, (snap) => {
                legacyRows = snap.docs.map(d => ({ id: d.id, ...(d.data() || {}) }));
                applyMerged();
            }, (err) => {
                socialMyPostsError = err;
                socialMyPostsLoading = false;
                socialMyPostsActivities = socialFeedActivities.filter(a => (a.user_id || a.userId || null) === activeUser.uid);
                renderMyPublicationsFeed();
            });

            socialMyPostsUnsubscribers.push(unsubPrimary, unsubLegacy);
        }

        function stopSocialFeedSubscription() {
            if (typeof socialFeedUnsubscriber === 'function') socialFeedUnsubscriber();
            socialFeedUnsubscriber = null;
            socialFeedActivities = [];
            socialFeedError = null;
            socialApplauseByActivity = new Map();
            socialApplauseLoadingIds = new Set();
        }

        function startSocialFeedSubscription() {
            stopSocialFeedSubscription();
            socialFeedLoading = true;
            renderFollowingFeed();
            socialFeedUnsubscriber = onSnapshot(query(collection(db, 'socialActivities'), limit(250)), (snap) => {
                socialFeedError = null;
                socialFeedLoading = false;
                socialFeedActivities = snap.docs.map(d => ({ id: d.id, ...(d.data() || {}) }));
                renderFollowingFeed();
                renderMyPublicationsFeed();
            }, (err) => {
                socialFeedError = err;
                socialFeedLoading = false;
                socialFeedActivities = [];
                renderFollowingFeed();
                renderMyPublicationsFeed();
            });
        }

        function buildFollowingFeedItems() {
            const followed = new Set((userFollowingIds || []).filter(uid => uid && uid !== activeUser?.uid));
            const buildFallbackActivityId = (v) => `fallback__${v.userId || 'u'}__${v.routeId || 'r'}__${v.eventDate || v.updatedAt || ''}`;
            const friends = socialFeedActivities.filter(a => followed.has(a.user_id));
            const fallbackFriends = Array.from(followingFeedMap.values()).map(v => {
                const fallbackId = buildFallbackActivityId(v);
                const localState = socialFeedInteractionState.get(fallbackId) || {};
                return ({
                id: fallbackId,
                user_id: v.userId,
                user_name: v.username || v.userName || 'Climber',
                gym_id: v.gymId,
                gym_name: v.gymName || v.gymId,
                activity_type: v.state === 'project' ? 'streak' : 'route',
                grade: v.finalGrade || v.routeGrade || '-',
                attempts: v.attemptCount || 1,
                timestamp: v.eventDate || v.updatedAt || v.completionDate || v.firstAttemptDate || '',
                is_new_max: false,
                streak_days: null,
                applause_count: Number(localState.applause_count || 0),
                comment_count: Number(localState.comment_count || 0),
                is_fallback: true
            });
            });
            const merged = [...fallbackFriends.filter(f => followed.has(f.user_id)), ...friends];
            const uniq = new Map();
            merged.forEach(a => uniq.set(a.id, a));
            return Array.from(uniq.values()).sort((a,b) => {
                if (!!b.is_new_max !== !!a.is_new_max) return b.is_new_max ? 1 : -1;
                return new Date(b.timestamp || 0) - new Date(a.timestamp || 0);
            });
        }

        function updateLocalInteractionState(activityId, patch = {}) {
            if (!activityId) return;
            const current = socialFeedInteractionState.get(activityId) || {};
            socialFeedInteractionState.set(activityId, { ...current, ...patch });
        }

        async function ensureSocialActivityDoc(activityId) {
            if (!activityId) return null;
            const activityRef = doc(db, 'socialActivities', activityId);
            const snap = await getDoc(activityRef);
            if (snap.exists()) return activityRef;
            const fallback = socialFeedById.get(activityId) || {};
            await setDoc(activityRef, {
                user_id: fallback.user_id || activeUser?.uid || null,
                user_name: fallback.user_name || resolveUsername(fallback.user_id, 'Climber') || 'Climber',
                gym_id: fallback.gym_id || null,
                gym_name: fallback.gym_name || fallback.gym_id || '-',
                activity_type: fallback.activity_type || 'route',
                grade: fallback.grade || '-',
                attempts: fallback.attempts || 1,
                timestamp: fallback.timestamp || new Date().toISOString(),
                is_new_max: !!fallback.is_new_max,
                streak_days: fallback.streak_days || null,
                applause_count: Number(fallback.applause_count || 0),
                comment_count: Number(fallback.comment_count || 0)
            }, { merge: true });
            return activityRef;
        }

        async function preloadApplauseState(activityId) {
            if (!activeUser || !activityId) return false;
            if (socialApplauseByActivity.has(activityId) || socialApplauseLoadingIds.has(activityId)) {
                return !!socialApplauseByActivity.get(activityId);
            }
            socialApplauseLoadingIds.add(activityId);
            try {
                const ref = doc(db, 'socialActivities', activityId, 'applause', activeUser.uid);
                const snap = await getDoc(ref);
                socialApplauseByActivity.set(activityId, snap.exists());
                return snap.exists();
            } finally {
                socialApplauseLoadingIds.delete(activityId);
            }
        }

        function getActivityApplauseCount(activityId, fallback = 0) {
            return Number(socialFeedInteractionState.get(activityId)?.applause_count ?? socialFeedById.get(activityId)?.applause_count ?? fallback ?? 0);
        }

        async function toggleActivityApplause(activityId) {
            if (!activeUser || !activityId) return;
            const activityRef = await ensureSocialActivityDoc(activityId);
            const ref = doc(db, 'socialActivities', activityId, 'applause', activeUser.uid);
            let wasApplauded = socialApplauseByActivity.get(activityId);
            if (typeof wasApplauded !== 'boolean') {
                const snap = await getDoc(ref);
                wasApplauded = snap.exists();
            }
            const currentApplause = getActivityApplauseCount(activityId, 0);
            const nextApplause = wasApplauded ? Math.max(0, currentApplause - 1) : currentApplause + 1;

            socialApplauseByActivity.set(activityId, !wasApplauded);
            updateLocalInteractionState(activityId, { applause_count: nextApplause });
            socialMyPostsInteractionMeta.delete(activityId);
            renderFollowingFeed();
            renderMyPublicationsFeed();

            try {
                if (wasApplauded) {
                    await deleteDoc(ref);
                    await updateDoc(activityRef, { applause_count: increment(-1), last_interaction_at: new Date().toISOString() });
                } else {
                    await setDoc(ref, { user_id: activeUser.uid, timestamp: new Date().toISOString() }, { merge: true });
                    await updateDoc(activityRef, { applause_count: increment(1), last_interaction_at: new Date().toISOString() });
                }
            } catch (e) {
                socialApplauseByActivity.set(activityId, wasApplauded);
                updateLocalInteractionState(activityId, { applause_count: currentApplause });
                renderFollowingFeed();
                renderMyPublicationsFeed();
                throw e;
            }
        }

        async function addActivityComment(activityId, textValue = null) {
            if (!activeUser || !activityId) return;
            const text = (textValue ?? '').trim();
            if (!text) return;
            const activityRef = await ensureSocialActivityDoc(activityId);
            const nowIso = new Date().toISOString();
            await addDoc(collection(db, 'socialActivities', activityId, 'comments'), {
                user_id: activeUser.uid,
                user_name: currentUserName || 'Climber',
                text,
                timestamp: nowIso
            });
            await updateDoc(activityRef, { comment_count: increment(1), last_interaction_at: nowIso });
            const currentComments = Number(socialFeedById.get(activityId)?.comment_count || socialFeedInteractionState.get(activityId)?.comment_count || 0);
            updateLocalInteractionState(activityId, { comment_count: currentComments + 1 });
            socialMyPostsInteractionMeta.delete(activityId);
            renderFollowingFeed();
            renderMyPublicationsFeed();
        }

        function sanitizeSocialCount(value) {
            return Math.max(0, Number(value || 0));
        }

        function renderSocialFeedCard(activity) {
            const e = activity || {};
            const ts = escapeHtml(formatProfileDate(e.timestamp || e.sendDate || ''));
            const recent24 = (Date.now() - new Date(e.timestamp || 0).getTime()) <= (24*60*60*1000);
            const applauseCount = sanitizeSocialCount(getActivityApplauseCount(e.id, e.applause_count));
            const commentCount = sanitizeSocialCount(socialFeedInteractionState.get(e.id)?.comment_count ?? e.comment_count);
            const isApplauded = !!socialApplauseByActivity.get(e.id);
            const actionButtons = `<div class="social-feed-actions"><button class="social-action-btn ${isApplauded ? 'active' : ''}" data-action="applause" data-id="${e.id}">🔥 ${applauseCount}</button><button class="social-action-btn" data-action="comment" data-id="${e.id}">💬 ${commentCount}</button></div>`;
            if (e.activity_type === 'new_max') {
                return `<div class="social-feed-card ${recent24 ? 'highlight' : ''}"><div class="social-feed-head"><div class="social-feed-title">${t('ui.socialNewMaxTitle')}</div><small>${ts}</small></div><div class="social-feed-grade">${escapeHtml(e.grade || '-')}</div><div class="social-feed-meta">${escapeHtml(e.user_name || 'Climber')}${badgePillHtml(resolveUserHighestBadge(e.user_id))} · ${escapeHtml(e.gym_name || e.gym_id || '-')}</div>${actionButtons}</div>`;
            }
            if (e.activity_type === 'streak') {
                return `<div class="social-feed-card highlight"><div class="social-feed-head"><div class="social-feed-title">🔁 ${escapeHtml(e.user_name || 'Climber')}${badgePillHtml(resolveUserHighestBadge(e.user_id))} ${t('ui.socialStreakAt')} ${e.streak_days || 1} ${t('ui.socialConsecutiveDays')}</div><small>${ts}</small></div><div class="social-feed-meta">${escapeHtml(e.gym_name || e.gym_id || '-')}</div>${actionButtons}</div>`;
            }
            return `<div class="social-feed-card"><div class="social-feed-head"><div class="social-feed-title">${escapeHtml(e.user_name || 'Climber')}${badgePillHtml(resolveUserHighestBadge(e.user_id))} ${t('ui.socialClimbedAt')} ${escapeHtml(e.grade || '-')} ${t('ui.socialAt')} ${escapeHtml(e.gym_name || e.gym_id || '-')}</div><small>${ts}</small></div><div class="social-feed-meta">${t('ui.attempts')}: ${e.attempts || 1}</div>${actionButtons}</div>`;
        }

        function bindSocialFeedActions(root) {
            if (!root) return;
            root.querySelectorAll('[data-action="applause"]').forEach(btn => {
                preloadApplauseState(btn.dataset.id).then(() => {
                    btn.classList.toggle('active', !!socialApplauseByActivity.get(btn.dataset.id));
                }).catch(() => {});
                btn.onclick = () => toggleActivityApplause(btn.dataset.id).catch(alertWriteError);
            });
            root.querySelectorAll('[data-action="comment"]').forEach(btn => btn.onclick = () => openSocialCommentsModal(btn.dataset.id).catch(alertWriteError));
        }

        async function loadMyPostInteractionMeta(activityId) {
            if (!activityId || socialMyPostsInteractionMeta.get(activityId)?.loading) return;
            const current = socialMyPostsInteractionMeta.get(activityId) || {};
            socialMyPostsInteractionMeta.set(activityId, { ...current, loading: true });
            try {
                const commentsRef = collection(db, 'socialActivities', activityId, 'comments');
                const commentsSnap = await getDocs(query(commentsRef, orderBy('timestamp', 'desc'), limit(2)));
                const latestCommentSnap = await getDocs(query(commentsRef, orderBy('timestamp', 'desc'), limit(1)));
                const applauseSnap = await getDocs(query(collection(db, 'socialActivities', activityId, 'applause'), orderBy('timestamp', 'desc'), limit(1)));
                const latestComments = commentsSnap.docs.map(d => ({ id: d.id, ...(d.data() || {}) }));
                const latestCommentTs = latestCommentSnap.docs[0]?.data()?.timestamp || null;
                const latestApplauseTs = applauseSnap.docs[0]?.data()?.timestamp || null;
                const source = socialMyPostsActivities.find(a => a.id === activityId) || socialFeedById.get(activityId) || {};
                const lastViewed = source.last_viewed_at || null;
                const lastInteractionTs = [latestCommentTs, latestApplauseTs].filter(Boolean).sort().slice(-1)[0] || null;
                const hasNew = !!(lastInteractionTs && (!lastViewed || new Date(lastInteractionTs).getTime() > new Date(lastViewed).getTime()));
                socialMyPostsInteractionMeta.set(activityId, { loading: false, latestComments, latestCommentTs, latestApplauseTs, hasNew });
                renderMyPublicationsFeed();
            } catch (_) {
                socialMyPostsInteractionMeta.set(activityId, { ...(socialMyPostsInteractionMeta.get(activityId) || {}), loading: false });
            }
        }

        async function markMyPostViewed(activityId) {
            if (!activityId || !activeUser?.uid) return;
            const row = socialMyPostsActivities.find(a => a.id === activityId);
            if (!row || (row.user_id || row.userId) !== activeUser.uid) return;
            const nowIso = new Date().toISOString();
            await updateDoc(doc(db, 'socialActivities', activityId), { last_viewed_at: nowIso });
            socialMyPostsActivities = socialMyPostsActivities.map(a => a.id === activityId ? { ...a, last_viewed_at: nowIso } : a);
            const meta = socialMyPostsInteractionMeta.get(activityId) || {};
            socialMyPostsInteractionMeta.set(activityId, { ...meta, hasNew: false });
        }

        async function deleteMyPost(activityId) {
            if (!activityId || !activeUser?.uid) return;
            const row = socialMyPostsActivities.find(a => a.id === activityId);
            if (!row || (row.user_id || row.userId) !== activeUser.uid) return;
            if (!confirm(t('ui.confirmDeletePost'))) return;
            await deleteDoc(doc(db, 'socialActivities', activityId));
            socialMyPostsActivities = socialMyPostsActivities.filter(a => a.id !== activityId);
            socialMyPostsInteractionMeta.delete(activityId);
            socialMyPostsExpanded.delete(activityId);
            renderMyPublicationsFeed();
            renderFollowingFeed();
        }

        async function deleteActivityComment(activityId, commentId) {
            if (!activityId || !commentId || !activeUser?.uid) return;
            const row = socialMyPostsActivities.find(a => a.id === activityId) || socialFeedById.get(activityId);
            if (!row || (row.user_id || row.userId) !== activeUser.uid) return;
            await deleteDoc(doc(db, 'socialActivities', activityId, 'comments', commentId));
            const activityRef = await ensureSocialActivityDoc(activityId);
            await updateDoc(activityRef, { comment_count: increment(-1) });
            const currentComments = Number(socialFeedById.get(activityId)?.comment_count || socialFeedInteractionState.get(activityId)?.comment_count || 0);
            updateLocalInteractionState(activityId, { comment_count: Math.max(0, currentComments - 1) });
            socialMyPostsInteractionMeta.delete(activityId);
            renderMyPublicationsFeed();
            renderFollowingFeed();
        }

        function renderMyPublicationCard(e) {
            const ts = escapeHtml(formatProfileDate(e.timestamp || e.sendDate || ''));
            const applauseCount = sanitizeSocialCount(getActivityApplauseCount(e.id, e.applause_count));
            const commentCount = sanitizeSocialCount(socialFeedInteractionState.get(e.id)?.comment_count ?? e.comment_count);
            const totalInteractions = applauseCount + commentCount;
            const meta = socialMyPostsInteractionMeta.get(e.id) || {};
            if (!meta.loading && !meta.latestComments) loadMyPostInteractionMeta(e.id);
            const hasNew = !!meta.hasNew;
            const expanded = socialMyPostsExpanded.has(e.id);
            const latestComments = Array.isArray(meta.latestComments) ? meta.latestComments : [];
            const previewRows = latestComments.slice(0, 2).map(c => {
                const canDelete = ((e.user_id || e.userId || null) === activeUser?.uid);
                return `<div class="profile-log"><div><b>${escapeHtml(c.user_name || resolveUsername(c.user_id, 'Climber') || 'Climber')}${badgePillHtml(resolveUserHighestBadge(c.user_id))}</b></div><div>${escapeHtml(c.text || '')}</div><small>${escapeHtml(formatProfileDate(c.timestamp || ''))}</small>${canDelete ? `<div style="margin-top:6px;"><button type="button" class="btn-sec" data-action="delete-comment" data-activity-id="${e.id}" data-comment-id="${c.id}">${t('ui.deleteComment')}</button> <button type="button" class="btn-sec" data-action="reply-comment" data-activity-id="${e.id}" data-username="${escapeHtml(c.user_name || 'Climber')}">${t('ui.reply')}</button></div>` : ''}</div>`;
            }).join('') || `<p class="profile-empty">${t('ui.noComments')}</p>`;
            const newBadge = hasNew ? `<span class="social-chip new">${t('ui.new')}</span>` : '';
            const maxBadge = e.is_new_max ? `<span class="social-chip">${t('ui.newMax')}</span>` : '';
            return `<div class="social-feed-card ${totalInteractions > 5 ? 'engaged' : ''}" data-my-post-id="${e.id}"><div class="social-feed-head"><div class="social-feed-title">${t('ui.myClimbedAt')} ${escapeHtml(e.grade || '-')} ${t('ui.socialAt')} ${escapeHtml(e.gym_name || e.gym_id || '-')}</div><div style="display:flex;gap:6px;align-items:center;">${newBadge}${maxBadge}<small>${ts}</small></div></div><div class="social-feed-meta">${t('ui.attempts')}: ${e.attempts || 1}</div><div class="social-feed-actions"><button class="social-action-btn ${socialApplauseByActivity.get(e.id) ? 'active' : ''}" data-action="applause" data-id="${e.id}">🔥 ${applauseCount} ${t('ui.applauseCountLabel')}</button><button class="social-action-btn" data-action="comment" data-id="${e.id}">💬 ${commentCount} ${t('ui.commentsCountLabel')}</button><button class="social-action-btn" data-action="toggle-comments" data-id="${e.id}">${expanded ? t('ui.hideComments') : t('ui.showComments')}</button><button class="social-action-btn" data-action="delete-post" data-id="${e.id}">${t('ui.deletePost')}</button></div><div class="social-my-comments-preview" style="display:${expanded ? 'block' : 'none'};">${previewRows}<button type="button" class="btn-sec" data-action="open-all-comments" data-id="${e.id}">${t('ui.showAllComments')}</button></div></div>`;
        }

        function renderMyPublicationsFeed() {
            const myList = document.getElementById('social-my-posts-list');
            if (!myList) return;
            if (!activeUser?.uid) {
                myList.innerHTML = `<p class="profile-empty">${t('ui.loginToSeePosts')}</p>`;
                return;
            }
            if (socialMyPostsLoading) {
                myList.innerHTML = `<p class="profile-empty">${t('ui.loadingPosts')}</p>`;
                return;
            }
            const feed = socialMyPostsActivities
                .filter(a => (a.user_id || a.userId || null) === activeUser.uid)
                .sort((a,b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
            if (socialMyPostsError && !feed.length) {
                myList.innerHTML = `<p class="profile-empty">${t('ui.loadPostsError')}</p>`;
                return;
            }
            myList.innerHTML = feed.map(renderSocialFeedCard).join('') || `<p class="profile-empty">${t('ui.climbToAppearFeed')}</p>`;
            bindSocialFeedActions(myList);
        }

        function renderFollowingFeed() {
            const progList = document.getElementById('following-progress-list');
            if (!progList) return;
            if (socialFeedLoading) {
                progList.innerHTML = `<p class="profile-empty">Loading...</p>`;
                return;
            }
            const feed = buildFollowingFeedItems();
            socialFeedById = new Map(feed.map(e => [e.id, e]));
            const rulesWarn = socialFeedError && isPermissionDeniedError(socialFeedError) ? `<div class="profile-log" style="margin-bottom:10px;">${t('ui.limitedFeedPermissions')}</div>` : '';
            progList.innerHTML = rulesWarn + (feed.slice(0, 60).map(renderSocialFeedCard).join('') || `<p class="profile-empty">${t('dash.noFollowingProgress')}</p>`);
            bindSocialFeedActions(progList);
        }

        function syncFollowingProgressSubscriptions() {
            while (followingProgressUnsubscribers.length) {
                const unsub = followingProgressUnsubscribers.pop();
                if (typeof unsub === 'function') unsub();
            }
            followingFeedMap = new Map();
            startSocialFeedSubscription();
            startMyPostsSubscription();

            const followed = [...new Set(userFollowingIds)].filter(Boolean);
            followed.forEach(uid => {
                const qRef = query(collection(db, 'users', uid, 'routeProgress'), where('shareOnFeed', '==', true));
                const unsub = onSnapshot(qRef, (snap) => {
                    for (const key of Array.from(followingFeedMap.keys())) {
                        if (key.startsWith(`${uid}__`)) followingFeedMap.delete(key);
                    }
                    snap.forEach(d => {
                        const v = d.data() || {};
                        followingFeedMap.set(`${uid}__${d.id}`, {
                            ...v,
                            userId: uid,
                            username: resolveUsername(uid, v.userName || 'Climber'),
                            eventDate: v.completionDate || v.firstAttemptDate || v.updatedAt || v.sendDate || ''
                        });
                    });
                    renderFollowingFeed();
                });
                followingProgressUnsubscribers.push(unsub);
            });
        }

        async function searchUsersByUsername(queryText) {
            if (!lastUsersSnap) return [];
            const q = (queryText || '').trim().toLowerCase();
            if (!q) return [];
            const users = [];
            lastUsersSnap.forEach(d => users.push({ id: d.id, ...d.data(), uid: d.data()?.authUid || d.id }));
            return users.filter(u => u.uid !== activeUser?.uid && ((u.usernameLower || (u.username || '').toLowerCase()).includes(q))).slice(0, 20);
        }

        async function getFollowingSharedProgress() {
            syncFollowingProgressSubscriptions();
            return buildFollowingFeedItems();
        }

        async function safeGetDocs(qRef, fallback = null) {
            try {
                return await getDocs(qRef);
            } catch (e) {
                if (isPermissionDeniedError(e)) return fallback;
                throw e;
            }
        }

        async function getFollowCounts(uid) {
            const [followersSnap, followingSnap] = await Promise.all([
                safeGetDocs(query(collection(db, 'follows'), where('followingId', '==', uid))),
                safeGetDocs(query(collection(db, 'follows'), where('followerId', '==', uid)))
            ]);
            return { followers: followersSnap?.size || 0, following: followingSnap?.size || 0 };
        }

        async function getPublicFeedbackCount(uid) {
            const fb = await safeGetDocs(query(collectionGroup(db, 'reviews'), where('userId', '==', uid), limit(50)));
            return fb?.size || 0;
        }

            if (!uid) return;
