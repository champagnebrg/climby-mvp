        function subscribeGymCoverage(gymId) {
            activeGymDetailId = gymId;
            stopGymCoverageListeners();
            currentGymCoverage = { totalUsers: 0, activeUsers: 0, coveragePct: 0 };
            renderGymCoverage(currentGymCoverage);

            const sectorRouteUnsubs = new Map();
            const routeReviewUnsubs = new Map();
            const reviewEntries = new Map();
            const activeAfter = new Date();
            activeAfter.setDate(activeAfter.getDate() - 30);

            function recalcCoverage() {
                const allUsers = new Set();
                const activeUsers = new Set();
                for (const entry of reviewEntries.values()) {
                    if (!entry?.uid) continue;
                    allUsers.add(entry.uid);
                    if (entry.active) activeUsers.add(entry.uid);
                }
                const total = allUsers.size;
                const active = activeUsers.size;
                const pct = total > 0 ? Math.round((active / total) * 100) : 0;
                currentGymCoverage = { totalUsers: total, activeUsers: active, coveragePct: pct };
                renderGymCoverage(currentGymCoverage);
            }

            function clearRouteReviewEntries(routeKey) {
                const prefix = `${routeKey}::`;
                for (const k of Array.from(reviewEntries.keys())) {
                    if (k.startsWith(prefix)) reviewEntries.delete(k);
                }
            }

            function removeRoute(routeKey) {
                const unsub = routeReviewUnsubs.get(routeKey);
                if (typeof unsub === 'function') unsub();
                routeReviewUnsubs.delete(routeKey);
                clearRouteReviewEntries(routeKey);
            }

            function removeSector(sectorId) {
                const routesUnsub = sectorRouteUnsubs.get(sectorId);
                if (typeof routesUnsub === 'function') routesUnsub();
                sectorRouteUnsubs.delete(sectorId);
                for (const routeKey of Array.from(routeReviewUnsubs.keys())) {
                    if (routeKey.startsWith(`${sectorId}/`)) removeRoute(routeKey);
                }
            }

            const sectorsUnsub = onSnapshot(collection(db, `gyms/${gymId}/Sectors`), (sectorsSnap) => {
                const validSectors = new Set(sectorsSnap.docs.map(d => d.id));

                sectorsSnap.forEach((sectorDoc) => {
                    if (sectorRouteUnsubs.has(sectorDoc.id)) return;
                    const routesPath = `gyms/${gymId}/Sectors/${sectorDoc.id}/routes`;
                    const routesUnsub = onSnapshot(collection(db, routesPath), (routesSnap) => {
                        const validRoutes = new Set(routesSnap.docs.map(d => `${sectorDoc.id}/${d.id}`));

                        routesSnap.forEach((routeDoc) => {
                            const routeKey = `${sectorDoc.id}/${routeDoc.id}`;
                            if (routeReviewUnsubs.has(routeKey)) return;
                            const reviewsPath = `gyms/${gymId}/Sectors/${sectorDoc.id}/routes/${routeDoc.id}/reviews`;
                            const reviewsUnsub = onSnapshot(collection(db, reviewsPath), (reviewsSnap) => {
                                clearRouteReviewEntries(routeKey);
                                reviewsSnap.forEach((revDoc) => {
                                    const review = revDoc.data() || {};
                                    const uid = review.userId || null;
                                    const dt = normalizeDateFromReview(review);
                                    const active = !!(dt && dt >= activeAfter);
                                    reviewEntries.set(`${routeKey}::${revDoc.id}`, { uid, active });
                                });
                                recalcCoverage();
                            });
                            routeReviewUnsubs.set(routeKey, reviewsUnsub);
                        });

                        for (const existingRouteKey of Array.from(routeReviewUnsubs.keys())) {
                            if (!existingRouteKey.startsWith(`${sectorDoc.id}/`)) continue;
                            if (!validRoutes.has(existingRouteKey)) removeRoute(existingRouteKey);
                        }
                        recalcCoverage();
                    });
                    sectorRouteUnsubs.set(sectorDoc.id, routesUnsub);
                });

                for (const sectorId of Array.from(sectorRouteUnsubs.keys())) {
                    if (!validSectors.has(sectorId)) removeSector(sectorId);
                }
                recalcCoverage();
            });

            gymCoverageUnsubscribers.push(() => {
                sectorsUnsub();
                for (const unsub of sectorRouteUnsubs.values()) if (typeof unsub === 'function') unsub();
                for (const unsub of routeReviewUnsubs.values()) if (typeof unsub === 'function') unsub();
                sectorRouteUnsubs.clear();
                routeReviewUnsubs.clear();
                reviewEntries.clear();
            });
        }

        function buildCoverageStats(days) {
            const now = new Date();
            const afterDays = new Date(now);
            afterDays.setDate(afterDays.getDate() - days);
            const after30 = new Date(now);
            after30.setDate(after30.getDate() - 30);
            const periods = [7, 30, 90];

            const gymUsers = new Set();
            const gymActive30 = new Set();
            const gymActivePeriod = new Set();
            const gymTrend = new Map(periods.map(d => [d, new Set()]));
            const sectors = new Map();
            const userActivity = new Map();
            const userActiveDays = new Map();
            const userMainSectorCount = new Map();
            const activeNowWindow = new Set();
            const activePrevWindow = new Set();
            let routesLast30Days = 0;
            const afterPrevWindow = new Date(now);
            afterPrevWindow.setDate(afterPrevWindow.getDate() - (days * 2));
            for (const [routeKey, reviewsMap] of adminCoverageSnapshot.reviewsByRoute.entries()) {
                const [sectorId] = routeKey.split('/');
                if (!sectors.has(sectorId)) {
                    sectors.set(sectorId, {
                        sectorId,
                        sectorName: adminCoverageSnapshot.sectorNames.get(sectorId) || sectorId,
                        routes: new Set(),
                        users: new Set(),
                        active30: new Set(),
                        activePeriod: new Set(),
                        trend: new Map(periods.map(d => [d, new Set()])),
                        userActivity: new Map(),
                        userDays: new Map()
                    });
                }
                const sec = sectors.get(sectorId);
                sec.routes.add(routeKey);

                for (const review of reviewsMap.values()) {
                    if (!review.uid) continue;
                    gymUsers.add(review.uid);
                    sec.users.add(review.uid);
                    if (review.dt && review.dt >= after30) { gymActive30.add(review.uid); sec.active30.add(review.uid); }
                    if (review.dt && review.dt >= afterDays) { gymActivePeriod.add(review.uid); sec.activePeriod.add(review.uid); activeNowWindow.add(review.uid); }
                    if (review.dt && review.dt >= afterPrevWindow && review.dt < afterDays) activePrevWindow.add(review.uid);
                    for (const p of periods) {
                        const ap = new Date(now);
                        ap.setDate(ap.getDate() - p);
                        if (review.dt && review.dt >= ap) {
                            gymTrend.get(p).add(review.uid);
                            sec.trend.get(p).add(review.uid);
                        }
                    }
                    sec.userActivity.set(review.uid, (sec.userActivity.get(review.uid) || 0) + 1);
                    if (review.dt) {
                        const dKey = review.dt.toISOString().slice(0, 10);
                        if (!sec.userDays.has(review.uid)) sec.userDays.set(review.uid, new Set());
                        sec.userDays.get(review.uid).add(dKey);
                    }
                }
            }

            const sectorsData = Array.from(sectors.values()).map(sec => {
                const topUsers = Array.from(sec.userActivity.entries())
                    .sort((a,b) => b[1]-a[1])
                    .slice(0, 3)
                    .map(([uid, count]) => ({ username: resolveUsername(uid, 'Climber'), count }));
                for (const [uid, count] of sec.userActivity.entries()) {
                    userActivity.set(uid, (userActivity.get(uid) || 0) + count);
                    if (!userMainSectorCount.has(uid)) userMainSectorCount.set(uid, new Map());
                    userMainSectorCount.get(uid).set(sec.sectorName, count);
                }
                for (const [uid, daySet] of sec.userDays.entries()) {
                    userActiveDays.set(uid, Math.max(userActiveDays.get(uid) || 0, daySet.size));
                }
                routesLast30Days += sec.routes.size;
                const total = sec.users.size;
                const active = sec.activePeriod.size;
                const coverage = total > 0 ? Math.round((active/total)*100) : 0;
                return {
                    sectorId: sec.sectorId,
                    sectorName: sec.sectorName,
                    routeCount: sec.routes.size,
                    totalUsers: total,
                    active30: sec.active30.size,
                    activePeriod: active,
                    coveragePct: coverage,
                    trend: periods.map(p => ({ days: p, users: sec.trend.get(p).size })),
                    topUsers
                };
            }).sort((a,b)=>b.activePeriod-a.activePeriod);

            const gymTotal = gymUsers.size;
            const gymPeriodActive = gymActivePeriod.size;
            const userMainSector = new Map();
            for (const [uid, sectorsMap] of userMainSectorCount.entries()) {
                const top = Array.from(sectorsMap.entries()).sort((a,b) => b[1]-a[1])[0];
                userMainSector.set(uid, top ? top[0] : '-');
            }
            const nowWindowCount = activeNowWindow.size;
            const prevWindowCount = activePrevWindow.size;
            const trendDeltaPct = prevWindowCount > 0
                ? Math.round(((nowWindowCount - prevWindowCount) / prevWindowCount) * 100)
                : (nowWindowCount > 0 ? 100 : 0);
            return {
                periodDays: days,
                totalUsersGym: gymTotal,
                activeUsersLast30Days: gymActive30.size,
                selectedCoverage: gymTotal > 0 ? Math.round((gymPeriodActive/gymTotal)*100) : 0,
                trend: periods.map(p => ({ days: p, users: gymTrend.get(p).size })),
                sectors: sectorsData,
                routesLast30Days,
                trendDeltaPct,
                userActivity,
                userActiveDays,
                userMainSector
            };
        }

        function startAdminCoverageSubscriptions(gymId) {
            stopAdminCoverageListeners();
            adminCoverageSnapshot.gymId = gymId;
            const routeReviewUnsubs = new Map();
            const routeUnsubs = new Map();

            function dropRoute(routeKey) {
                const unsub = routeReviewUnsubs.get(routeKey);
                if (typeof unsub === 'function') unsub();
                routeReviewUnsubs.delete(routeKey);
                adminCoverageSnapshot.reviewsByRoute.delete(routeKey);
            }

            const sectorsUnsub = onSnapshot(collection(db, `gyms/${gymId}/Sectors`), (sectorsSnap) => {
                const currentSectors = new Set();
                sectorsSnap.forEach((sectorDoc) => {
                    const sectorId = sectorDoc.id;
                    currentSectors.add(sectorId);
                    adminCoverageSnapshot.sectorNames.set(sectorId, sectorDoc.data()?.name || sectorId);
                    if (routeUnsubs.has(sectorId)) return;

                    const routesUnsub = onSnapshot(collection(db, `gyms/${gymId}/Sectors/${sectorId}/routes`), (routesSnap) => {
                        const currentRoutes = new Set();
                        routesSnap.forEach((routeDoc) => {
                            const routeKey = `${sectorId}/${routeDoc.id}`;
                            currentRoutes.add(routeKey);
                            if (routeReviewUnsubs.has(routeKey)) return;

                            const reviewsUnsub = onSnapshot(collection(db, `gyms/${gymId}/Sectors/${sectorId}/routes/${routeDoc.id}/reviews`), (reviewsSnap) => {
                                const m = new Map();
                                reviewsSnap.forEach((rvDoc) => {
                                    const d = rvDoc.data() || {};
                                    m.set(rvDoc.id, { uid: d.userId || null, dt: normalizeDateFromReview(d) });
                                });
                                adminCoverageSnapshot.reviewsByRoute.set(routeKey, m);
                                renderAdminCoverage();
                            });
                            routeReviewUnsubs.set(routeKey, reviewsUnsub);
                        });

                        for (const existing of Array.from(routeReviewUnsubs.keys())) {
                            if (!existing.startsWith(`${sectorId}/`)) continue;
                            if (!currentRoutes.has(existing)) dropRoute(existing);
                        }
                        renderAdminCoverage();
                    });

                    routeUnsubs.set(sectorId, routesUnsub);
                });

                for (const sectorId of Array.from(routeUnsubs.keys())) {
                    if (currentSectors.has(sectorId)) continue;
                    const unsub = routeUnsubs.get(sectorId);
                    if (typeof unsub === 'function') unsub();
                    routeUnsubs.delete(sectorId);
                    adminCoverageSnapshot.sectorNames.delete(sectorId);
                    for (const routeKey of Array.from(routeReviewUnsubs.keys())) {
                        if (routeKey.startsWith(`${sectorId}/`)) dropRoute(routeKey);
                    }
                }
                renderAdminCoverage();
            });

            adminCoverageUnsubscribers.push(() => {
                sectorsUnsub();
                for (const unsub of routeUnsubs.values()) if (typeof unsub === 'function') unsub();
                for (const unsub of routeReviewUnsubs.values()) if (typeof unsub === 'function') unsub();
            });

            const filter = document.getElementById('admin-coverage-period');
            if (filter) filter.onchange = () => renderAdminCoverage();
        }

            cleanupModelLoadGuards();
            showLoading(t('loading.loading3d'));

                if (token !== currentModelLoadToken) return;
                cleanupModelLoadGuards();
                hideLoading();
            };
            const onError = () => failModelLoad(t('errors.modelLoadFailed'), token);

            viewer.addEventListener('load', onLoad);
            viewer.addEventListener('error', onError);
            currentModelLoadCleanup = () => {
                viewer.removeEventListener('load', onLoad);
                viewer.removeEventListener('error', onError);
            };
            currentModelLoadTimeout = setTimeout(() => failModelLoad(t('errors.modelLoadTimeout'), token), 15000);

            try {
                const snap = await getDoc(doc(db, "gyms", gId, "Sectors", sId));

            const isClimbed = state === 'climbed';

            actions.innerHTML = '';
            form.style.display = state ? 'grid' : 'none';
            saveBtn.style.display = state ? 'block' : 'none';
            document.getElementById('tracker-final-grade-wrap').style.display = isClimbed ? 'block' : 'none';
            document.getElementById('tracker-completion-wrap').style.display = isClimbed ? 'block' : 'none';

            if (!state) {
                actions.innerHTML = `
                    <button type="button" class="btn-sec" id="tracker-add-project">${t('viewer.addToProject')}</button>
                    <button type="button" class="btn-sec" id="tracker-add-climbed">${t('viewer.markAsClimbed')}</button>
                `;
                document.getElementById('tracker-add-project').onclick = () => upsertRouteProgress('project', true);
                document.getElementById('tracker-add-climbed').onclick = () => upsertRouteProgress('climbed', true);
                return;
            }

            actions.innerHTML = `<span class="tracker-state-pill">${isClimbed ? t('viewer.climbed') : t('viewer.project')}</span>${isProject ? `<button type="button" class="btn-sec" id="tracker-mark-climbed">${t('viewer.markAsClimbed')}</button>` : ''}`;
            if (isProject) {
                const mk = document.getElementById('tracker-mark-climbed');
                if (mk) mk.onclick = () => upsertRouteProgress('climbed', false);
            }

            document.getElementById('tracker-attempt-count').value = socialTrackerState?.attemptCount || 1;
            document.getElementById('tracker-final-grade').value = socialTrackerState?.finalGrade || '';
            document.getElementById('tracker-first-attempt').value = socialTrackerState?.firstAttemptDate || toYYYYMMDD(new Date());
            document.getElementById('tracker-completion-date').value = socialTrackerState?.completionDate || toYYYYMMDD(new Date());
            document.getElementById('tracker-notes').value = socialTrackerState?.notes || '';
            document.getElementById('tracker-share-feed').checked = !!socialTrackerState?.shareOnFeed;
            saveBtn.textContent = isClimbed ? t('viewer.saveClimbed') : t('viewer.saveProject');
            saveBtn.onclick = () => upsertRouteProgress(state, false);
        }

        async function upsertRouteProgress(targetState, isInitial) {
            if (!activeUser || !socialRouteContext) { alert(t('errors.authRequired')); return; }
            const key = `${socialRouteContext.gymId}__${socialRouteContext.sectorId}__${socialRouteContext.routeId}`;
            const nowDate = toYYYYMMDD(new Date());
            const prev = socialTrackerState || {};
            const nextState = targetState;
            const attempt = parseInt(document.getElementById('tracker-attempt-count')?.value || (prev.attemptCount || 1), 10) || 1;
            const finalGrade = nextState === 'climbed' ? (document.getElementById('tracker-final-grade')?.value || prev.finalGrade || null) : null;
            const firstAttemptDate = document.getElementById('tracker-first-attempt')?.value || prev.firstAttemptDate || nowDate;
            const completionDate = nextState === 'climbed' ? (document.getElementById('tracker-completion-date')?.value || prev.completionDate || nowDate) : null;
            const notes = document.getElementById('tracker-notes')?.value || prev.notes || '';
            const shareOnFeed = !!document.getElementById('tracker-share-feed')?.checked;
            const gradeMap = gymLevelOrderMap.get(socialRouteContext.gymId) || new Map();
            const finalGradeOrder = finalGrade && gradeMap.has(normalizeLevelValue(finalGrade)) ? gradeMap.get(normalizeLevelValue(finalGrade)) : null;
            const payload = {
                userId: activeUser.uid,
                gymId: socialRouteContext.gymId,
                sectorId: socialRouteContext.sectorId,
                routeId: socialRouteContext.routeId,
                state: nextState,
                attemptCount: attempt,
                finalGrade,
                finalGradeOrder,
                firstAttemptDate,
                completionDate,
                notes,
                shareOnFeed,
                routeGrade: socialRouteContext.routeGrade,
                routeLabel: socialRouteContext.routeGrade,
                gymName: document.getElementById('user-gym-detail-name')?.textContent || socialRouteContext.gymId,
                sectorName: document.querySelector('#main-list-user .card b')?.textContent || socialRouteContext.sectorId,
                updatedAt: new Date().toISOString()
            };
            try {
                await setDoc(doc(db, 'users', activeUser.uid, 'routeProgress', key), payload, { merge: true });
                if (shareOnFeed) {
                    await setDoc(doc(db, `gyms/${socialRouteContext.gymId}/Sectors/${socialRouteContext.sectorId}/routes/${socialRouteContext.routeId}/progressFeed`, activeUser.uid), {
                        userId: activeUser.uid,
                        userName: currentUserName || 'Climber',
                        state: nextState,
                        date: new Date(),
                        notes: notes || ''
                    }, { merge: true });
                }
                alert(t('viewer.trackerSaved'));
                renderProfileDashboard();
            } catch (e) { alertWriteError(e); }
        }

        async function getRouteProgress(routeId) {
            if (!activeUser || !socialRouteContext) return null;
            const key = `${socialRouteContext.gymId}__${socialRouteContext.sectorId}__${routeId}`;
            const snap = await getDoc(doc(db, 'users', activeUser.uid, 'routeProgress', key));
            return snap.exists() ? snap.data() : null;
        }
        async function createOrUpdateRouteProgress(routeId, payload) {
            if (!activeUser || !socialRouteContext) return;
            const key = `${socialRouteContext.gymId}__${socialRouteContext.sectorId}__${routeId}`;
            await setDoc(doc(db, 'users', activeUser.uid, 'routeProgress', key), payload, { merge: true });
        }
        window.getRouteProgressEndpoint = getRouteProgress;
        window.updateRouteProgressEndpoint = createOrUpdateRouteProgress;

        window.submitReview = async () => {
            const signedUser = activeUser || auth.currentUser;
            if (!signedUser) return alert(t('errors.authRequired'));
            if(selectedStars === 0) return alert(t('viewer.selectStar'));
            const commentInput = document.getElementById('user-comment');
            const gradeInput = document.getElementById('public-proposed-grade');
            const text = commentInput?.value || '';
            const proposedGrade = (gradeInput?.value || '').trim();
            const reviewRef = doc(db, `gyms/${activeGymId}/Sectors/${activeSectorId}/routes/${activeRouteId}/reviews`, signedUser.uid);
            try {
                let existingReview = null;
                try {
                    existingReview = await getDoc(reviewRef);
                } catch (_) {
                    existingReview = null;
                }
                if (existingReview?.exists()) {
                    alert(t('viewer.reviewAlreadySent'));
                    return;
                }
                const routeSnap = await getDoc(doc(db, `gyms/${activeGymId}/Sectors/${activeSectorId}/routes`, activeRouteId));
                const routeData = routeSnap.exists() ? (routeSnap.data() || {}) : {};
                const gradeLabel = normalizeLevelValue(routeData.grade || proposedGrade || '-');
                const orderMap = gymLevelOrderMap.get(activeGymId) || new Map();
                const climbedOrder = orderMap.has(gradeLabel) ? orderMap.get(gradeLabel) : null;
                await setDoc(reviewRef, {
                    rating: selectedStars,
                    text: text || "",
                    proposedGrade: proposedGrade || null,
                    climbedGrade: gradeLabel,
                    climbedGradeOrder: climbedOrder,
                    date: new Date(),
                    userId: signedUser.uid,
                    userName: currentUserName || 'Climber'
                }, { merge: false });
                const gymSnap = await getDoc(doc(db, 'gyms', activeGymId));
                const gymName = gymSnap.exists() ? (gymSnap.data()?.name || activeGymId) : activeGymId;
                const statResult = await upsertUserGymStats(signedUser.uid, activeGymId, gymName, gradeLabel, climbedOrder, 1);
                await createSocialActivity({ userId: signedUser.uid, gymId: activeGymId, gymName, type: 'route', grade: gradeLabel, attempts: 1, isNewMax: false, streakDays: statResult.streakDays });
                if (statResult.isNewMax) await createSocialActivity({ userId: signedUser.uid, gymId: activeGymId, gymName, type: 'new_max', grade: gradeLabel, attempts: 1, isNewMax: true, streakDays: statResult.streakDays });
                if (statResult.streakDays > 1) await createSocialActivity({ userId: signedUser.uid, gymId: activeGymId, gymName, type: 'streak', grade: null, attempts: 1, isNewMax: false, streakDays: statResult.streakDays });
                if (commentInput) commentInput.value = "";
                if (gradeInput) gradeInput.value = "";
                alert(t('viewer.reviewSuccess'));
            } catch (e) { alertWriteError(e); }
        };

        // --- EDITOR ADMIN ---
        const tapGestureState = {
            isPointerDown: false,
            isDragging: false,
            isMultiTouch: false,
            startX: 0,
            startY: 0,
            startTime: 0,
            pointerId: null,
            pointerType: null
        };
        const activeTouchPointers = new Set();

        const TAP_MAX_DISTANCE_PX = 10;
        const TAP_MAX_DURATION_MS = 300;

        function resetTapGestureState() {
            tapGestureState.isPointerDown = false;
            tapGestureState.isDragging = false;
            tapGestureState.isMultiTouch = false;
            tapGestureState.startX = 0;
            tapGestureState.startY = 0;
            tapGestureState.startTime = 0;
            tapGestureState.pointerId = null;
            tapGestureState.pointerType = null;
        }

        function isTapGesture(endX, endY, endTime) {
            if (tapGestureState.isDragging || tapGestureState.isMultiTouch) return false;
            const distance = Math.hypot(endX - tapGestureState.startX, endY - tapGestureState.startY);
            const duration = endTime - tapGestureState.startTime;
            return distance < TAP_MAX_DISTANCE_PX && duration <= TAP_MAX_DURATION_MS;
        }

        function handleAdminTap(clientX, clientY) {
            if(currentMode !== 'admin' || activeGymId !== realUserGymId) return;
            const hit = mainViewer.positionAndNormalFromPoint(clientX, clientY);
            if(!hit) return;
            activeRouteId = null;
            tempPos = hit.position.toString();
            tempNorm = hit.normal.toString();
            const ghost = document.getElementById('ghost');
            ghost.dataset.position = tempPos;
            ghost.dataset.normal = tempNorm;
            ghost.style.display = 'block';
            document.getElementById('btn-delete-route').style.display = 'none';
            document.getElementById('admin-editor-panel').style.display = 'block';
        }

        const mainViewer = document.getElementById('main-viewer');

        mainViewer.addEventListener('pointerdown', (e) => {
            if (e.pointerType === 'touch') {
                activeTouchPointers.add(e.pointerId);
                if (activeTouchPointers.size > 1) {
                    tapGestureState.isMultiTouch = true;
                    tapGestureState.isDragging = true;
                    return;
                }
            }
            tapGestureState.isPointerDown = true;
            tapGestureState.isDragging = false;
            tapGestureState.isMultiTouch = false;
            tapGestureState.startX = e.clientX;
            tapGestureState.startY = e.clientY;
            tapGestureState.startTime = performance.now();
            tapGestureState.pointerId = e.pointerId;
            tapGestureState.pointerType = e.pointerType;
        }, { passive: true });

        mainViewer.addEventListener('pointermove', (e) => {
            if (!tapGestureState.isPointerDown || tapGestureState.pointerId !== e.pointerId) return;
            if (tapGestureState.pointerType === 'touch' && activeTouchPointers.size > 1) {
                tapGestureState.isMultiTouch = true;
                tapGestureState.isDragging = true;
                return;
            }
            const distance = Math.hypot(e.clientX - tapGestureState.startX, e.clientY - tapGestureState.startY);
            if (distance >= TAP_MAX_DISTANCE_PX) tapGestureState.isDragging = true;
        }, { passive: true });

        mainViewer.addEventListener('pointerup', (e) => {
            if (e.pointerType === 'touch') activeTouchPointers.delete(e.pointerId);
            if (!tapGestureState.isPointerDown || tapGestureState.pointerId !== e.pointerId) {
                resetTapGestureState();
                return;
            }
            const isValidTap = isTapGesture(e.clientX, e.clientY, performance.now());
            if (isValidTap) handleAdminTap(e.clientX, e.clientY);
            resetTapGestureState();
        }, { passive: true });

        mainViewer.addEventListener('pointercancel', (e) => {
            if (e.pointerType === 'touch') activeTouchPointers.delete(e.pointerId);
            resetTapGestureState();
        }, { passive: true });

        mainViewer.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) {
                tapGestureState.isMultiTouch = true;
                tapGestureState.isDragging = true;
            }
        }, { passive: true });

        window.saveRoute = async () => {
            const gradeValue = document.getElementById('route-grade').value.trim();
            if (!gradeValue) return alert(t('errors.completeData'));
            const data = { grade: gradeValue, color: document.getElementById('route-color').value };
            if(activeRouteId) await updateDoc(doc(db, `gyms/${activeGymId}/Sectors/${activeSectorId}/routes`, activeRouteId), data);
            else await addDoc(collection(db, `gyms/${activeGymId}/Sectors/${activeSectorId}/routes`), { ...data, position: tempPos, normal: tempNorm });
            window.cancelAdminEdit();
        };

        window.deleteRoute = async () => { if(confirm(t('viewer.confirmDelete'))) { await deleteDoc(doc(db, `gyms/${activeGymId}/Sectors/${activeSectorId}/routes`, activeRouteId)); window.cancelAdminEdit(); } };

        window.goToAuth = () => showView('view-auth');
        window.logout = () => { stopFollowingProgressSubscriptions(); stopFollowsSubscription(); signOut(auth).then(() => location.reload()); };
        window.switchMode = async () => {
            if (userRole !== 'admin') return;
            currentMode = currentMode === 'admin' ? 'user' : 'admin';
            await initDashboard();
        };
        window.closeViewer = () => { cleanupModelLoadGuards(); document.getElementById('viewer-container').style.display = 'none'; hideLoading(); };
        window.cancelAdminEdit = () => { document.getElementById('admin-editor-panel').style.display = 'none'; document.getElementById('ghost').style.display = 'none'; };
        function showView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
